[package]
name = "gam-inference"
version = "0.3.124"
edition = "2024"
rust-version = "1.93"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
gam = { path = "../.." }
gam-predict = { path = "../gam-predict" }
faer = "0.24.0"
general-mcmc = { package = "general-mcmc", version = "0.9", default-features = false }
log = "0.4.29"
ndarray = { version = "0.17.2", features = ["serde", "rayon"] }
rand = "0.10.1"
rayon = "1.12.0"
serde = { version = "1.0.228", features = ["derive"] }
statrs = "0.18.0"

[lints.rust]
warnings = "deny"
