name: setup-bench-r
description: Set up R for benchmark jobs with an explicit fallback path
inputs:
  r-version:
    description: "R version to install for benchmark jobs"
    required: false
    default: "4.4.3"
runs:
  using: composite
  steps:
    - name: Set up R with setup-r
      id: setup-r
      continue-on-error: true
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ inputs.r-version }}

    - name: Install R from CRAN apt repo
      if: ${{ steps.setup-r.outcome != 'success' }}
      shell: bash
      run: |
        set -euo pipefail
        . /etc/os-release
        sudo apt-get update
        sudo apt-get install --yes --no-install-recommends ca-certificates dirmngr gpg wget
        wget -qO- https://cloud.r-project.org/bin/linux/ubuntu/marutter_pubkey.asc \
          | gpg --dearmor \
          | sudo tee /usr/share/keyrings/cran.gpg >/dev/null
        echo "deb [signed-by=/usr/share/keyrings/cran.gpg] https://cloud.r-project.org/bin/linux/ubuntu ${VERSION_CODENAME}-cran40/" \
          | sudo tee /etc/apt/sources.list.d/cran-r.list >/dev/null
        sudo apt-get update
        sudo apt-get install --yes --no-install-recommends r-base r-base-dev

    - name: Verify R is available
      shell: bash
      run: |
        set -euo pipefail
        command -v Rscript
        Rscript --version
