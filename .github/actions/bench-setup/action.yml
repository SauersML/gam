name: bench-setup
description: Shared setup for benchmark jobs
inputs:
  install-runtime-deps:
    description: "Install benchmark Python/R dependencies in the job environment"
    required: false
    default: "true"
  r-version:
    description: "R version to install for benchmark jobs"
    required: false
    default: "4.4.3"
runs:
  using: composite
  steps:
    # This is a *local* composite action (`uses: ./.github/actions/bench-setup`).
    # The runner can only resolve it after the repository has already been
    # checked out, so a checkout step here could never bootstrap the very
    # checkout it depends on — and it would clobber a caller's deliberate
    # checkout config (e.g. benchmark.yml's `fetch-depth: 0` for the build.rs
    # author gate, #1458). Every caller therefore runs `actions/checkout`
    # itself before invoking this action.
    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Set up R
      uses: ./.github/actions/setup-bench-r
      with:
        r-version: ${{ inputs.r-version }}

    - name: Cache Python packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-bench-pip-${{ hashFiles('.github/actions/bench-setup/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-bench-pip-

    - name: Cache R user library
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.r-lib
        key: ${{ runner.os }}-bench-rlib-${{ hashFiles('.github/actions/bench-setup/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-bench-rlib-

    - name: Cache cargo artifacts
      uses: Swatinem/rust-cache@v2

    - name: Install benchmark runtime deps
      if: ${{ inputs.install-runtime-deps == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        # `r-lib/actions/setup-r` exports its own R_LIBS_USER. Pin it in a
        # local once so the install path, the verification check, and any
        # downstream `cp` all read the same value — earlier versions called
        # `Sys.getenv("R_LIBS_USER")` separately in each place, which
        # produced silent install / check / copy mismatches when the env
        # was re-exported between steps.
        LIB_PATH="${R_LIBS_USER:?R_LIBS_USER must be set by setup-r}"
        mkdir -p "${LIB_PATH}"
        python3 --version
        Rscript --version
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install numpy pandas scikit-learn lifelines scikit-survival xgboost
        # Prefer Posit's binary CRAN mirror (set by r-lib/actions/setup-r as
        # RSPM) for fast, reliable Linux binary installs. Source builds from
        # cloud.r-project.org regularly fail on the runner for packages with
        # heavy system dependencies (mboost/gamboostLSS/bamlss/brms), and
        # install.packages does NOT error when individual packages fail —
        # leaving a corrupt runtime cache that breaks every shard for days.
        # Verify every required package is loadable and fail the job
        # otherwise so the cache is not saved with missing pieces.
        LIB_PATH="${LIB_PATH}" Rscript -e '
          lib_path <- Sys.getenv("LIB_PATH")
          stopifnot(nzchar(lib_path))
          cat("install lib:", lib_path, "\n")
          rspm <- Sys.getenv("RSPM")
          repos <- if (nzchar(rspm)) c(CRAN = rspm) else c(CRAN = "https://cloud.r-project.org")
          required <- c("mgcv","jsonlite","survival","glmnet","gamlss",
                        "gamlss.dist","gamboostLSS","mboost","bamlss","brms")
          install.packages(required, repos = repos,
                           lib = lib_path,
                           Ncpus = max(1L, parallel::detectCores() - 1L))
          installed <- rownames(installed.packages(lib.loc = lib_path))
          missing <- setdiff(required, installed)
          cat("installed in ", lib_path, " (", length(installed), " pkgs):\n  ",
              paste(installed, collapse = ", "), "\n", sep = "")
          if (length(missing) > 0L) {
            cat("MISSING from ", lib_path, ":\n  ",
                paste(missing, collapse = ", "), "\n", sep = "")
            stop("install.packages failed to install: ",
                 paste(missing, collapse = ", "))
          }
          # Loading each package end-to-end catches partial installs whose
          # DESCRIPTION made it into `installed.packages()` but whose
          # shared libraries did not link (the failure mode that was
          # leaving the runtime cache half-built for weeks).
          for (pkg in required) {
            ok <- requireNamespace(pkg, quietly = TRUE)
            if (!isTRUE(ok)) {
              stop("R package installed but not loadable: ", pkg)
            }
          }
          cat("R packages installed and loadable:", paste(required, collapse = ", "), "\n")
        '
