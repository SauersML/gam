name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: false  # disabled: do not run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Token failover: try CLAUDE_CODE_ALT_OAUTH_TOKEN first; if that run is
      # rate-limited the action exits non-zero, and the fallback step below
      # re-runs with CLAUDE_CODE_OAUTH_TOKEN. Both are valid tokens on
      # different accounts whose rate limits reset at different times.
      - name: Run Claude Code (primary — ALT token)
        id: claude_primary
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_ALT_OAUTH_TOKEN }}
          show_full_output: false
          additional_permissions: |
            actions: read

      - name: Run Claude Code (fallback — original token)
        id: claude_fallback
        if: steps.claude_primary.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: false
          additional_permissions: |
            actions: read

      - name: Print Claude transcript
        if: always()
        run: bash .github/scripts/print-claude-transcript.sh '${{ steps.claude_fallback.outputs.execution_file || steps.claude_primary.outputs.execution_file }}'

