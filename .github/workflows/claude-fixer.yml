name: Claude Fixer (one issue, done properly)

on:
  schedule:
    - cron: "*/29 * * * *"

concurrency:
  group: claude-fixer
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install gam CLI
        run: |
          set -euxo pipefail
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install gamfit
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install gamfit numpy pandas scipy scikit-learn pyarrow requests
          python -c "import gamfit; print(gamfit.__version__)"

      - name: Run Claude fixer agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Hi Claude. You have the run of this repo, an Ubuntu runner, and
            as long as you need.

            `gam` is a Rust generalized additive model crate; `gamfit` is its
            Python wrapper (both already installed). A sibling agent files
            bug issues with failing tests committed directly to `main` —
            those are the inbox. Humans file issues too. Either is fair game.

            ## The goal

            Pick one open issue. Solve it properly. Open a PR.

            "Properly" here means the absolute ideal solution — beautiful,
            principled, root-cause, long-term correct, fully verified, fully
            implemented. Not the shortest patch that makes the failing test
            green. If the right fix means rethinking an abstraction,
            redesigning a numeric scheme, replacing a placeholder, or
            sequencing several internally consistent changes — do that. The
            failing test passing is necessary but not sufficient; the
            *underlying behaviour* must be correct in the general case, not
            just for the repro.

            ## You are not racing the clock

            There is no time pressure. A single issue may legitimately take
            many runs of this workflow over days or weeks. The job has a
            6-hour ceiling per run only because GitHub enforces it; the work
            itself has none. If you need to stop mid-fix, leave the branch
            in an honest, well-commented state with a status comment on the
            issue describing exactly where you are and what's next, so a
            future run (probably you again, fresh context) can pick up
            cleanly. Continuity across runs is the point of the per-issue
            branch.

            ## Picking the issue (with a real lock, not just etiquette)

            You get to choose. Survey open issues — `gh issue list --state
            open --limit 200` plus `gh issue view <N>` on anything that
            catches your eye. Pick what you want to work on based on
            whatever criteria you find compelling (hardest, most beautiful,
            longest-stalled, freshest, most under-attended subsystem —
            your call).

            But you must not pick an issue another concurrent run is
            already working on. Concurrent runs are real here — the cron
            is tight and individual fixes can take hours. Use this lock
            protocol exactly:

            **1. Compute who-is-busy.** An issue `<N>` is considered
            actively claimed if ANY of these hold:
              a. Its most recent comment whose body starts with
                 `🔒 claim:` is younger than 45 minutes AND names a run-id
                 different from yours.
              b. Branch `fix/issue-<N>` exists on `origin` and was pushed
                 to in the last 45 minutes (`gh api repos/{owner}/{repo}/branches/fix/issue-<N>`
                 or `git for-each-ref --format='%(committerdate:iso) %(refname)' refs/remotes/origin/fix/issue-<N>`).
              c. An open PR linked to `<N>` had a commit pushed in the
                 last 45 minutes.
            45 minutes is the heartbeat window: longer than one cron tick,
            short enough that abandoned claims expire on their own.

            **2. Pick from the unclaimed set.** Free choice within it.

            **3. Claim atomically.** Before doing any real work, post a
            comment on the chosen issue whose first line is exactly:
                `🔒 claim: run ${{ github.run_id }} attempt ${{ github.run_attempt }}`
            Then `sleep 15` and re-fetch the issue's comments. If a
            different run posted its own `🔒 claim:` comment at a
            timestamp earlier than yours (or simultaneously and with a
            lower run-id), you lost the race — drop the issue, pick
            another, repeat. If you won, proceed.

            **4. Heartbeat while working.** Push to `fix/issue-<N>` (even
            a tiny WIP commit) or post a brief progress comment at least
            every 40 minutes. This keeps your claim alive for any other
            run that wakes up during your work.

            **5. Release on exit.** When you stop — finished or handing
            off mid-fix to a future run — post a final comment whose first
            line is exactly:
                `🔓 release: run ${{ github.run_id }}` followed by a
            one-paragraph status (done / paused at step X). This lets the
            next run skip the 45-minute wait if you finished cleanly.

            ## Bailing is not on the table

            Once you've picked an issue, you do not abandon it. There is
            no "this turns out not to be a real bug" exit, no "blocked on
            something external" exit, no "duplicate" exit, no "too hard"
            exit. If the issue as filed is wrong-shaped — the failing
            test isn't actually wrong, the root cause is in a dependency,
            the fix requires a redesign three layers down — your job is
            to remove the blocker, not name it.

              - Dep is buggy? Vendor it, patch it, replace it, write the
                fix upstream and pin to your fork in the meantime.
              - Fix requires redesigning a subsystem? Redesign the
                subsystem.
              - The failing test asserts something subtly wrong? Fix the
                test in the same PR with an explanation, and still solve
                whatever real problem the issue points at.
              - Issue is a "duplicate" of another open one? Solve both in
                one PR and close both.
              - Need infrastructure that doesn't exist yet (a benchmark
                harness, a property-test generator, a numerical
                cross-checker)? Build it.
              - Will it take many runs? Many runs is fine. Hand off via
                the branch and a clear status comment; pick up next time.

            The only acceptable terminal states are: the PR is open and
            the fix is genuinely complete, OR work is paused mid-flight
            with the next concrete step documented. Not "I gave up."

            ## Branching and PRs (allowed here, unlike the bug-hunt agent)

            For each issue you work on, use a stable branch named exactly
            `fix/issue-<N>` where `<N>` is the issue number. If that branch
            already exists on `origin`, check it out and continue the work
            in progress. If not, create it from latest `main`. Push to it
            often. When you believe the fix is complete and verified, open
            (or update) a PR titled `fix: <one-line summary> (closes #<N>)`
            with a body that explains the root cause, the chosen approach
            and why, what was rejected and why, and the verification you
            ran. Mark the issue closed by the PR with the standard
            `Closes #<N>` line.

            ## Verification bar

            "Fully verified" means: the originally-failing test passes; you
            added at least one additional test that would have caught a
            regression of the same root cause from a different angle; you
            ran the relevant existing tests for the touched subsystem and
            they pass; you reasoned explicitly about edge cases (degeneracy,
            extreme magnitudes, ill-conditioning, parallel/GPU paths if
            applicable) and either tested or documented why each is handled.

            Have fun. Take your time. Get it perfect.
