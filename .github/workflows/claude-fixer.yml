name: Claude Fixer (one issue, done properly)

on:
  schedule:
    # Every 10 minutes, midnight–07:30 US Central (CDT = UTC−5 ⇒ 05:00–12:30
    # UTC). GitHub cron is UTC-fixed, so under winter CST (UTC−6) the window
    # reads 23:00–06:30 Central; adjust the hours if that matters.
    - cron: "*/10 5-11 * * *"
    - cron: "0,10,20,30 12 * * *"
  workflow_dispatch:


permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: read

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install gam CLI
        run: |
          set -euxo pipefail
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Try to build gamfit from source (non-fatal)
        continue-on-error: true
        run: |
          set -uxo pipefail
          python -m pip install --upgrade pip maturin
          python -m pip install numpy pandas scipy scikit-learn pyarrow requests
          python -m pip install . && \
            (cd /tmp && python -c "import gamfit; print('gamfit ok')") || \
            echo "::warning::gamfit source build failed — agent can still use the gam CLI, or fix the build as part of its work"

      - name: Run Claude fixer agent
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Suppress the raw stream-json dump; a readable transcript of just
          # Claude's messages is rendered from execution_file after the run.
          show_full_output: false
          claude_args: >-
            --model claude-opus-4-8
            --dangerously-skip-permissions
            --allowedTools "Bash,Edit,Read,Write,Glob,Grep,WebFetch,WebSearch,TodoWrite,Task,NotebookEdit,KillBash,BashOutput"
          additional_permissions: |
            actions: read
          prompt: |
            Hi Claude. You have the run of this repo, an Ubuntu runner, and
            as long as you need.

            `gam` is a Rust generalized additive model crate; `gamfit` is its
            Python wrapper (both already installed). A sibling agent files
            bug issues with failing tests committed directly to `main` —
            those are the inbox. Humans file issues too. Either is fair game.

            ## The goal

            Pick one open issue. Solve it properly, committing and pushing
            to `main` as you go — small commits pushed continuously as the
            work progresses, NOT one big drop at the end and NOT on a side
            branch. When that one is done, if there are closely related open
            issues (same subsystem, same root cause cluster, same failure
            mode), you may pick another one and chain it in the same run.
            See "Chaining related issues" below.

            "Properly" here means the absolute ideal solution — beautiful,
            principled, root-cause, long-term correct, fully verified, fully
            implemented. Not the shortest patch that makes the failing test
            green. If the right fix means rethinking an abstraction,
            redesigning a numeric scheme, replacing a placeholder, or
            sequencing several internally consistent changes — do that. The
            failing test passing is necessary but not sufficient; the
            *underlying behaviour* must be correct in the general case, not
            just for the repro.

            ## You are not racing the clock

            There is no time pressure and no turn budget. If the right
            fix takes ten turns, take ten. If it takes ten thousand turns
            and a week's worth of work compressed into one session, take
            that. Stay on the issue until the fix is complete and pushed to
            `main` (no branches, no PRs). Don't pace yourself, don't pause voluntarily, don't
            split the work into "today I'll do part of it." Drive it
            straight through to done in this session — but push each
            coherent step to main as you reach it, don't hold the work.

            ## Picking the issue (with a real lock, not just etiquette)

            You get to choose. Survey open issues — `gh issue list --state
            open --limit 200` plus `gh issue view <N>` on anything that
            catches your eye. Pick what you want to work on based on
            whatever criteria you find compelling (hardest, most beautiful,
            longest-stalled, freshest, most under-attended subsystem —
            your call).

            But you must not pick an issue another concurrent run is
            already working on. Concurrent runs are real here — the cron
            is tight and individual fixes can take hours. Use this lock
            protocol exactly:

            **1. Compute who-is-busy.** An issue `<N>` is considered
            actively claimed if ANY of these hold:
              a. Its most recent comment whose body starts with
                 `🔒 claim:` is younger than 45 minutes AND names a run-id
                 different from yours.
              b. A commit whose message references `#<N>` (e.g.
                 `fix(...) #<N>` or `Closes #<N>`) was pushed to `main` by a
                 different run in the last 45 minutes
                 (`git log --since='45 minutes ago' --grep='#<N>' origin/main`).
            45 minutes is the heartbeat window: longer than one cron tick,
            short enough that abandoned claims expire on their own.

            **2. Pick from the unclaimed set.** Free choice within it.

            **3. Claim atomically.** Before doing any real work, post a
            comment on the chosen issue whose first line is exactly:
                `🔒 claim: run ${{ github.run_id }} attempt ${{ github.run_attempt }}`
            Then `sleep 15` and re-fetch the issue's comments. If a
            different run posted its own `🔒 claim:` comment at a
            timestamp earlier than yours (or simultaneously and with a
            lower run-id), you lost the race — drop the issue, pick
            another, repeat. If you won, proceed.

            **4. Commit to main as you work.** Commit and push to `main`
            after every meaningful edit — continuously, as the work
            progresses, not on a timer and never batched to the end. As
            soon as you've made a coherent change, push it before starting
            the next one. WIP commits are encouraged; messy intermediate
            state on main is fine — CI and the PyPI publish step are the
            real gates, not main, so a transient red main is acceptable.
            Reference the issue in commit subjects (`fix(...) #<N>`) and
            drop a short progress comment on the issue now and then so the
            thread shows a live trail. Don't sit silently for an hour and
            dump everything at the end, and don't hold finished work back.
            Commit and push after each edit.

            **5. Release on finish.** When the fix is complete and pushed
            to main, post a final comment whose first line is exactly:
                `🔓 release: run ${{ github.run_id }}` followed by a
            one-paragraph summary. This lets any other run skip the
            45-minute wait.

            **One claim at a time.** Do NOT lock a batch of issues up
            front. Lock the next issue only when you're actually about to
            start working on it. If you survey and pick three candidates,
            still claim only the first; the others stay unclaimed for
            other runs to grab.

            **Exception — closely related cluster.** If two or three open
            issues share the same root cause and you'll genuinely fix them
            in one coherent diff (e.g., the same broken abstraction is
            surfacing as three symptoms), you may claim that small cluster
            together at the start. Each one still gets its own 🔒 claim:
            comment. The bar is: the fixes are inseparable, not just
            adjacent.

            ## Chaining related issues serially

            After you've pushed the complete fix for your first issue to
            main and posted the 🔓 release:, you may pick another issue and
            start a new claim → fix → release cycle in the same run, *as
            long as* the next issue is closely related to the work you just
            did (same subsystem, same root cause cluster, same numerical
            failure mode). Chaining unrelated work in one run hurts the
            quality bar — start fresh territory in its own clean cycle.

            Each issue in the chain gets its own claim cycle (steps 1-5),
            committed straight to main. Don't claim them all upfront —
            claim the next one only when you're about to start it, so other
            concurrent runs can pick up unrelated issues in the meantime.

            ## Removing blockers is part of the job

            Once you've picked an issue, you carry it through. Whatever
            stands between you and the fix — a missing abstraction, a
            buggy dep, a wrong-shaped subsystem, infra that doesn't exist
            yet — is part of the work. The terminal state is: the
            complete, verified fix pushed to main and the issue closed.

            ## Commit directly to main — no branches, no PRs

            Work on `main` and push continuously as you go (step 4). Do NOT
            create a `fix/issue-<N>` branch and do NOT open a PR — main is
            the work surface here; CI and the PyPI publish step are the
            release gates. If main has moved when you push, `git pull
            --rebase` first (never `git stash` / `--autostash` — commit your
            work first) and resolve any conflict by editing, never by
            discarding another run's commits. Close the issue by putting
            `Closes #<N>` in the message of the commit that completes the
            fix (it auto-closes when that lands on main), or close it
            explicitly with `gh issue close` in your 🔓 release step. Your
            commit messages carry what a PR body would: the commit that
            completes a fix should explain the root cause, the approach and
            why, what you rejected, and the verification you ran.

            ## Verification bar

            "Fully verified" means: the originally-failing test passes; you
            added at least one additional test that would have caught a
            regression of the same root cause from a different angle; you
            ran the relevant existing tests for the touched subsystem and
            they pass; you reasoned explicitly about edge cases (degeneracy,
            extreme magnitudes, ill-conditioning, parallel/GPU paths if
            applicable) and either tested or documented why each is handled.

            ## Scope

            Be many times more ambitious than you think you should be.
            Everything is in scope. Take large risks. Don't stop without
            editing and pushing massive projects to completion.
            If the build is broken just fix it and continue.
            
            Have fun. Take your time. Get it perfect.

      - name: Print Claude transcript
        if: always()
        run: bash .github/scripts/print-claude-transcript.sh '${{ steps.claude.outputs.execution_file }}'
