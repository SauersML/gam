name: Rolling wheel (warm-start artifact)

# Permanent warm-start: every push to main rebuilds the x86_64 manylinux wheel
# plus CLI and pins both to the rolling `wheel-latest` prerelease. Compute boxes
# and validation workflows download one verified runtime in seconds instead of
# paying a cold cargo build:
#
#   gh release download wheel-latest --repo SauersML/gam -p 'gamfit-*.whl' -D dist/
#   pip install --force-reinstall dist/gamfit-*.whl
#
# The wheel is built in a manylinux_2_28 container so it runs on MSI's Rocky 8
# (glibc 2.28) as well as modern cloud images — a plain ubuntu-runner build
# would tag manylinux_2_35 and refuse to install on the cluster. sccache keeps
# rebuilds warm across runs. `concurrency` cancels superseded builds so only
# the newest SHA spends minutes.
#
# This channel NEVER publishes to PyPI — pypi-wheels.yml stays the version-gated
# release path; this is the fleet's iteration artifact. It builds under the
# iteration profile (LTO off, CGU 16: 2-4x faster rebuilds for ~10% runtime),
# so use it for correctness/quality/acceptance work — NOT for wall-clock perf
# measurements, which need a real release-profile build.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Main has one newest-writer lane, so superseded automatic builds are canceled.
# An explicitly dispatched validation ref gets its own lane: main churn cannot
# starve a proof build, and that branch never writes the rolling release.
concurrency:
  group: runtime-${{ github.event_name == 'push' && 'main' || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # build.rs consults git history (author guard / SPEC HEAD-diff check);
          # a shallow clone with depth 2 keeps a parent commit available.
          fetch-depth: 2

      - name: Build manylinux_2_28 x86_64 wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --strip -o dist -i python3.10
          manylinux: 2_28
          sccache: true
          # build.rs queries git history (author guard); inside the manylinux
          # container the repo is owned by the runner uid while git runs as
          # root, so git refuses with "dubious ownership" unless marked safe.
          before-script-linux: |
            git config --global --add safe.directory "$(pwd)"
            # maturin-action configures the GHA sccache backend before entering
            # the container but normally installs the executable only AFTER
            # this hook. Install it now so the CLI pre-build gets the same warm
            # compiler cache as the wheel; both still share one target tree.
            uv tool install "sccache>=0.10.0"
            cargo build --release -p gam-cli
            mkdir -p dist
            cp target/release/gam dist/gam
        env:
          # Iteration profile — same knobs as the MSI warm builder: 2-4x faster
          # rebuilds for ~10% runtime. Numerics are unaffected.
          CARGO_PROFILE_RELEASE_LTO: "off"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"

      - name: Seal exact runtime provenance
        shell: bash
        run: |
          set -euo pipefail
          WHEEL=$(ls dist/gamfit-*.whl)
          test -x dist/gam
          {
            echo "commit=${GITHUB_SHA}"
            (cd dist && sha256sum "$(basename "$WHEEL")" gam)
          } > dist/RUNTIME_PROVENANCE.txt

      - name: Pin newest main runtime to rolling release
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          WHEEL=$(ls dist/gamfit-*.whl)
          gh release view wheel-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create wheel-latest --repo "$GITHUB_REPOSITORY" --prerelease \
              --title "Rolling main wheel" \
              --notes "Continuously replaced by the newest green-main build. Not a versioned release."
          gh release upload wheel-latest "$WHEEL" dist/gam --repo "$GITHUB_REPOSITORY" --clobber
          gh release upload wheel-latest dist/RUNTIME_PROVENANCE.txt --repo "$GITHUB_REPOSITORY" --clobber

      - name: Also keep it as a run artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamfit-runtime-${{ github.sha }}
          path: |
            dist/gamfit-*.whl
            dist/gam
            dist/RUNTIME_PROVENANCE.txt
          retention-days: 14
