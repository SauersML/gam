name: Large-scale

on:
  workflow_dispatch:
  schedule:
    # Hourly short run; skip 07:00 UTC to avoid colliding with the daily extended run.
    - cron: "0 0-6,8-23 * * *"
    # Daily extended run at 02:00 America/Chicago (CDT) — runs without the 50-min job cap.
    - cron: "0 7 * * *"

concurrency:
  group: large-scale-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event.schedule == '0 7 * * *' && 4320 || 50 }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      cache_key: ${{ steps.cache_key.outputs.cache_key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/bench-setup

      - name: Compute cache key
        id: cache_key
        shell: bash
        run: |
          set -euo pipefail
          key="large-scale-${{ runner.os }}-${{ hashFiles('bench/large_scale/runner.py', 'bench/large_scale/large_scale.yml', '.github/workflows/large_scale.yml', 'Cargo.toml') }}"
          echo "cache_key=${key}" >> "${GITHUB_OUTPUT}"

      - name: Restore prepared cohort cache
        id: prep_cache
        uses: actions/cache/restore@v4
        with:
          path: bench/large_scale/prepared
          key: ${{ steps.cache_key.outputs.cache_key }}

      - name: Prepare full cohort
        if: ${{ steps.prep_cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 bench/large_scale/runner.py prepare --config bench/large_scale/large_scale.yml --out-dir bench/large_scale/prepared

      - name: Save prepared cohort cache
        if: ${{ steps.prep_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: bench/large_scale/prepared
          key: ${{ steps.cache_key.outputs.cache_key }}

      - name: Build method matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          matrix=$(python3 bench/large_scale/runner.py matrix --config bench/large_scale/large_scale.yml)
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

      - name: Upload prepared cohort
        uses: actions/upload-artifact@v4
        with:
          name: large-scale-prepared
          path: bench/large_scale/prepared
          if-no-files-found: error

  bootstrap-runtime:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event.schedule == '0 7 * * *' && 4320 || 50 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # #1458: full history so build.rs author gate resolves real last editor, not HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build gam binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release -p gam-cli
          ls -l target/release/gam

      - name: Build gamfit._rust Python extension
        # bench/large_scale/runner.py loads `gamfit._rust` via
        # bench/_rust_loader.py for survival_* and classification_*
        # helpers (e.g. _survival_score_grid, survival_concordance,
        # classification_metrics). Without this step the runner aborts the
        # shard with `RuntimeError: gamfit Rust extension is not built`
        # the moment any survival/classification method is exercised.
        # Build via `maturin build` (not `develop`, which requires an
        # active virtualenv the hosted runner does not provide), then
        # extract `_rust*.so` from the wheel and stage it next to the
        # `gam` binary so the benchmark job ships both through the same
        # shared artifact.
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade 'maturin>=1.7,<2'
          rm -rf dist
          maturin build --release -i python3 -o dist
          python3 .github/scripts/workflow_tasks.py extract_maturin_wheel target/release
          ls -l target/release/_rust*.so

      - name: Upload gam binary and Python extension
        uses: actions/upload-artifact@v4
        with:
          name: large-scale-gam-binary
          path: |
            target/release/gam
            target/release/_rust*.so
          if-no-files-found: error

  benchmark:
    needs:
      - prepare
      - bootstrap-runtime
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event.schedule == '0 7 * * *' && 4320 || 50 }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      # Daily run leaves this empty so runner.py disables the per-command timeout entirely.
      BENCH_CMD_TIMEOUT_SEC: ${{ github.event.schedule == '0 7 * * *' && '' || '2400' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/bench-setup

      - name: Download prepared cohort
        uses: actions/download-artifact@v4
        with:
          name: large-scale-prepared
          path: bench/large_scale/prepared

      - name: Download prebuilt gam binary and Python extension
        uses: actions/download-artifact@v4
        with:
          name: large-scale-gam-binary
          path: bench/large_scale/bin

      - name: Stage gam binary and gamfit._rust extension
        # The runner imports gamfit._rust via bench/_rust_loader.py, which
        # scans the source-tree `gamfit/` directory (the in-tree package
        # shadows site-packages on sys.path because the runner does not
        # install the wheel). Drop the artifact's `_rust*.so` directly
        # there so the loader finds it; without this the bench shard
        # aborts the first survival/classification call with `RuntimeError:
        # gamfit Rust extension is not built`.
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p target/release
          cp bench/large_scale/bin/gam target/release/gam
          chmod +x target/release/gam
          ls -l target/release/gam
          installed=0
          for so in bench/large_scale/bin/_rust*.so; do
            cp "$so" "gamfit/$(basename "$so")"
            installed=$((installed + 1))
          done
          if [ "${installed}" -eq 0 ]; then
            echo "::error title=Missing gamfit extension::No _rust*.so in large-scale-gam-binary artifact (bootstrap-runtime did not build gamfit._rust)"
            exit 1
          fi
          ls -l gamfit/_rust*.so

      - name: Run benchmark method
        shell: bash
        env:
          GAM_RUST_BINARY: ${{ github.workspace }}/target/release/gam
        run: |
          set -euo pipefail
          mkdir -p bench/large_scale/results bench/large_scale/runs/${{ matrix.name }}
          python3 bench/large_scale/runner.py run-method \
            --config bench/large_scale/large_scale.yml \
            --prep-dir bench/large_scale/prepared \
            --method "${{ matrix.name }}" \
            --out-dir "bench/large_scale/runs/${{ matrix.name }}" \
            --out-json "bench/large_scale/results/${{ matrix.name }}.json"

      - name: Upload method artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: large-scale-${{ matrix.name }}
          path: |
            bench/large_scale/results/${{ matrix.name }}.json
            bench/large_scale/runs/${{ matrix.name }}
          if-no-files-found: warn

  aggregate:
    needs: benchmark
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event.schedule == '0 7 * * *' && 4320 || 50 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy matplotlib lifelines

      - name: Download prepared cohort
        uses: actions/download-artifact@v4
        with:
          name: large-scale-prepared
          path: bench/large_scale/prepared

      - name: Download method artifacts
        uses: actions/download-artifact@v4
        with:
          path: bench/large_scale/artifacts

      - name: Collect result jsons
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bench/large_scale/results
          find bench/large_scale/artifacts -path '*/results/*.json' -type f -print -exec cp {} bench/large_scale/results/ \;

      - name: Aggregate outputs
        shell: bash
        run: |
          set -euo pipefail
          python3 bench/large_scale/runner.py aggregate \
            --config bench/large_scale/large_scale.yml \
            --prep-dir bench/large_scale/prepared \
            --results-dir bench/large_scale/results \
            --out-dir bench/large_scale/final

      - name: Upload aggregate bundle
        uses: actions/upload-artifact@v4
        with:
          name: large-scale-bundle
          path: bench/large_scale/final/large_scale_bundle.zip
          if-no-files-found: error
