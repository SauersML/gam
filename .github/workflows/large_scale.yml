name: Large-scale

on:
  workflow_dispatch:
    inputs:
      scale:
        description: Cohort scale to validate
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full
  schedule:
    # Hourly smoke run; skip 07:00 UTC to avoid colliding with the daily full run.
    - cron: "0 0-6,8-23 * * *"
    # Daily full run at 02:00 America/Chicago (CDT); every job remains bounded to 50 minutes.
    - cron: "0 7 * * *"

concurrency:
  group: large-scale-${{ github.ref }}-${{ github.event_name == 'schedule' && github.event.schedule == '0 7 * * *' && 'full' || inputs.scale || 'smoke' }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      cache_key: ${{ steps.cache_key.outputs.cache_key }}
      scale: ${{ steps.scale.outputs.scale }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install prepare dependencies
        # Cohort preparation and matrix construction only import NumPy; the
        # configured methods are Rust-only, so R and benchmark ML stacks do not belong here.
        shell: bash
        run: python3 -m pip install numpy

      - name: Resolve cohort scale
        id: scale
        shell: bash
        run: |
          set -euo pipefail
          scale=smoke
          if [[ "${{ github.event_name }}" == "schedule" && "${{ github.event.schedule }}" == "0 7 * * *" ]]; then
            scale=full
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            scale="${{ inputs.scale }}"
          fi
          echo "scale=${scale}" >> "${GITHUB_OUTPUT}"
          echo "Large-scale cohort mode: ${scale}"

      - name: Compute cache key
        id: cache_key
        shell: bash
        run: |
          set -euo pipefail
          key="large-scale-${{ steps.scale.outputs.scale }}-${{ runner.os }}-${{ hashFiles('bench/large_scale/runner.py', 'bench/large_scale/large_scale.yml', '.github/workflows/large_scale.yml', 'Cargo.toml') }}"
          echo "cache_key=${key}" >> "${GITHUB_OUTPUT}"

      - name: Restore prepared cohort cache
        id: prep_cache
        uses: actions/cache/restore@v4
        with:
          path: bench/large_scale/prepared
          key: ${{ steps.cache_key.outputs.cache_key }}

      - name: Prepare cohort
        if: ${{ steps.prep_cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.scale.outputs.scale }}" == "smoke" ]]; then
            python3 bench/large_scale/runner.py prepare --smoke --config bench/large_scale/large_scale.yml --out-dir bench/large_scale/prepared
          else
            python3 bench/large_scale/runner.py prepare --config bench/large_scale/large_scale.yml --out-dir bench/large_scale/prepared
          fi

      - name: Save prepared cohort cache
        if: ${{ steps.prep_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: bench/large_scale/prepared
          key: ${{ steps.cache_key.outputs.cache_key }}

      - name: Build method matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          matrix=$(python3 bench/large_scale/runner.py matrix --config bench/large_scale/large_scale.yml)
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

      - name: Upload prepared cohort
        uses: actions/upload-artifact@v4
        with:
          name: large-scale-prepared
          path: bench/large_scale/prepared
          if-no-files-found: error

  bootstrap-runtime:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download exact warm runtime
        # The rolling manylinux build publishes the CLI and Python extension
        # from one source tree. Require this workflow's exact SHA and both
        # hashes: a missing/stale artifact fails immediately, never falls back
        # to a 24-minute in-workflow rebuild or mixes two estimator versions.
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist target/release
          gh release download wheel-latest --repo "$GITHUB_REPOSITORY" \
            --pattern 'gamfit-*.whl' \
            --pattern gam \
            --pattern RUNTIME_PROVENANCE.txt \
            --dir dist
          grep -Fx "commit=${GITHUB_SHA}" dist/RUNTIME_PROVENANCE.txt
          (
            cd dist
            tail -n +2 RUNTIME_PROVENANCE.txt | sha256sum --check --strict
          )
          cp dist/gam target/release/gam
          chmod +x target/release/gam
          python3 .github/scripts/workflow_tasks.py extract_maturin_wheel target/release
          ls -l target/release/gam
          ls -l target/release/_rust*.so

      - name: Upload gam binary and Python extension
        uses: actions/upload-artifact@v4
        with:
          name: large-scale-gam-binary
          path: |
            target/release/gam
            target/release/_rust*.so
          if-no-files-found: error

  preprocess-ctn:
    needs:
      - prepare
      - bootstrap-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      BENCH_CMD_TIMEOUT_SEC: ${{ needs.prepare.outputs.scale == 'full' && '2400' || '300' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install preprocessing dependencies
        shell: bash
        run: python3 -m pip install numpy

      - name: Download prepared cohort
        uses: actions/download-artifact@v4
        with:
          name: large-scale-prepared
          path: bench/large_scale/prepared

      - name: Download prebuilt gam binary
        uses: actions/download-artifact@v4
        with:
          name: large-scale-gam-binary
          path: bench/large_scale/bin

      - name: Fit and score shared Duchon CTN
        shell: bash
        env:
          GAM_RUST_BINARY: ${{ github.workspace }}/bench/large_scale/bin/gam
        run: |
          set -euo pipefail
          chmod +x "${GAM_RUST_BINARY}"
          python3 bench/large_scale/runner.py prepare-ctn \
            --config bench/large_scale/large_scale.yml \
            --prep-dir bench/large_scale/prepared \
            --out-dir bench/large_scale/ctn-prepared

      - name: Upload shared CTN cohort
        uses: actions/upload-artifact@v4
        with:
          name: large-scale-ctn-prepared
          path: bench/large_scale/ctn-prepared
          if-no-files-found: error

  benchmark:
    needs:
      - prepare
      - bootstrap-runtime
      - preprocess-ctn
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      # Smoke runs are the development signal and must fail fast. The daily
      # 400k cohort retains the wider mission envelope, but no job can outlive
      # the workflow's fixed 50-minute bound.
      BENCH_CMD_TIMEOUT_SEC: ${{ needs.prepare.outputs.scale == 'full' && '2400' || '300' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        # Shards consume the prebuilt Rust binary/extension. They need neither
        # Rust nor R/scikit packages in this job, only the runner's Python imports.
        shell: bash
        run: python3 -m pip install numpy pandas lifelines

      - name: Download shared CTN cohort
        uses: actions/download-artifact@v4
        with:
          name: large-scale-ctn-prepared
          path: bench/large_scale/ctn-prepared

      - name: Download prebuilt gam binary and Python extension
        uses: actions/download-artifact@v4
        with:
          name: large-scale-gam-binary
          path: bench/large_scale/bin

      - name: Stage gam binary and gamfit._rust extension
        # The runner imports gamfit._rust via bench/_rust_loader.py, which
        # scans the source-tree `gamfit/` directory (the in-tree package
        # shadows site-packages on sys.path because the runner does not
        # install the wheel). Drop the artifact's `_rust*.so` directly
        # there so the loader finds it; without this the bench shard
        # aborts the first survival/classification call with `RuntimeError:
        # gamfit Rust extension is not built`.
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p target/release
          cp bench/large_scale/bin/gam target/release/gam
          chmod +x target/release/gam
          ls -l target/release/gam
          installed=0
          for so in bench/large_scale/bin/_rust*.so; do
            cp "$so" "gamfit/$(basename "$so")"
            installed=$((installed + 1))
          done
          if [ "${installed}" -eq 0 ]; then
            echo "::error title=Missing gamfit extension::No _rust*.so in large-scale-gam-binary artifact (bootstrap-runtime did not build gamfit._rust)"
            exit 1
          fi
          ls -l gamfit/_rust*.so

      - name: Run benchmark method
        shell: bash
        env:
          GAM_RUST_BINARY: ${{ github.workspace }}/target/release/gam
        run: |
          set -euo pipefail
          mkdir -p bench/large_scale/results bench/large_scale/runs/${{ matrix.name }}
          python3 bench/large_scale/runner.py run-method \
            --config bench/large_scale/large_scale.yml \
            --prep-dir bench/large_scale/ctn-prepared \
            --method "${{ matrix.name }}" \
            --out-dir "bench/large_scale/runs/${{ matrix.name }}" \
            --out-json "bench/large_scale/results/${{ matrix.name }}.json"

      - name: Upload method artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: large-scale-${{ matrix.name }}
          path: |
            bench/large_scale/results/${{ matrix.name }}.json
            bench/large_scale/runs/${{ matrix.name }}
          if-no-files-found: warn

  aggregate:
    needs: benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy matplotlib lifelines

      - name: Download prepared cohort
        uses: actions/download-artifact@v4
        with:
          name: large-scale-prepared
          path: bench/large_scale/prepared

      - name: Download method artifacts
        uses: actions/download-artifact@v4
        with:
          path: bench/large_scale/artifacts

      - name: Collect result jsons
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bench/large_scale/results
          find bench/large_scale/artifacts -path '*/results/*.json' -type f -print -exec cp {} bench/large_scale/results/ \;

      - name: Aggregate outputs
        shell: bash
        run: |
          set -euo pipefail
          python3 bench/large_scale/runner.py aggregate \
            --config bench/large_scale/large_scale.yml \
            --prep-dir bench/large_scale/prepared \
            --results-dir bench/large_scale/results \
            --out-dir bench/large_scale/final

      - name: Upload aggregate bundle
        uses: actions/upload-artifact@v4
        with:
          name: large-scale-bundle
          path: bench/large_scale/final/large_scale_bundle.zip
          if-no-files-found: error
