name: Build and Release All

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Cargo.toml'
      - '**/*.rs'
      - '.github/workflows/build-release-all.yml'
  workflow_dispatch:

concurrency:
  group: build-release-all-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Content-addressed compiler cache shared across CI runs (GitHub Actions
  # backend). These release builds are the heaviest dep-graph compiles in the
  # repo, so warming sccache here is what makes every later run — and, via a
  # shared SCCACHE_BUCKET, local build.sh — start warm instead of cold. sccache
  # keys on flags too, so each matrix target keeps its own entries.
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

permissions:
  contents: write
  actions: read

jobs:
  # Throttle: skip this run if another run of THIS workflow started within
  # the last 15 minutes and was NOT cancelled. Cancelled runs don't count
  # — the next push should still produce a release.
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check recent non-cancelled runs
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_FILE: build-release-all.yml
          SELF_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          cutoff=$(date -u -d '15 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          echo "Cutoff (UTC): $cutoff"
          runs=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/${WORKFLOW_FILE}/runs?per_page=30" \
            --jq '.workflow_runs[] | {id: .id, status: .status, conclusion: .conclusion, created_at: .created_at}')
          echo "$runs"
          conflict=$(echo "$runs" | jq -s --arg cutoff "$cutoff" --arg self "$SELF_RUN_ID" '
            map(select(
              (.id|tostring) != $self
              and .created_at > $cutoff
              and .conclusion != "cancelled"
              and .status != "cancelled"
            )) | length')
          echo "Conflicting recent runs: $conflict"
          if [[ "$conflict" -gt 0 ]]; then
            echo "Another non-cancelled run started in the last 15 min — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # MacOS ARM (Apple Silicon) - GH Actions uses M1
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: gam
            asset_name: gam-macos-arm64
            cpu: apple-m1

          # MacOS Intel - use macos-15-intel which runs on Intel hardware
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: gam
            asset_name: gam-macos-intel
            cpu: x86-64-v3

          # Linux x86_64 (ubuntu-22.04 for wider glibc compatibility)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: gam
            asset_name: gam-linux-x64
            cpu: x86-64-v3

          # Linux ARM64 (ubuntu-22.04 for wider glibc compatibility)
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: gam
            asset_name: gam-linux-arm64
            cpu: neoverse-n1

          # Windows x86_64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_name: gam.exe
            asset_name: gam-windows-x64
            cpu: x86-64-v3

          # Windows ARM64 (native ARM runner)
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_name: gam.exe
            asset_name: gam-windows-arm64
            cpu: cortex-a76

    steps:
      - uses: actions/checkout@v5

      - name: Free runner disk space
        # ubuntu-latest / ubuntu-22.04 ship with ~14 GB free on /. On
        # x86_64-unknown-linux-gnu we additionally install the NVIDIA CUDA
        # Toolkit (~5–6 GB unpacked) and then run `cargo build --release`
        # against this dep graph (faer, burn, bevy_reflect, ndarray,
        # nalgebra, arrow, parquet, cudarc, …). The combined footprint has
        # been exhausting the disk during link, surfacing as
        # `System.IO.IOException: No space left on device` from the runner's
        # diagnostic log writer (which kills the whole job, not just the
        # build step). Wiping these preinstalled toolchains (.NET, Android
        # SDK, GHC, CodeQL, Boost) frees ~30 GB up-front so the CUDA install
        # and release link have headroom. Each `rm` is `|| true`-guarded so
        # a future runner image that drops one of these paths doesn't break
        # the step. Linux-only — macOS/Windows runners have a different
        # filesystem layout and don't share this pressure point.
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -uo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-}" || true
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Install NVIDIA CUDA Toolkit
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.2.2'

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          # Keep rustup/cargo shims owned by the toolchain setup step. Caching
          # ~/.cargo/bin can restore macOS runner rustup-init stubs over them,
          # which breaks `cargo +nightly`.
          cache-bin: false

      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup --version
          rustc +nightly --version
          cargo +nightly --version

      - name: Remove local cargo config
        # Prevent .cargo/config.toml's target-cpu=native from interfering with release builds
        shell: bash
        run: rm -f .cargo/config.toml

      - name: Build
        shell: bash
        env:
          # Use specific CPU target instead of 'native' to fix ring#2527 while keeping max optimization
          RUSTFLAGS: "-C target-cpu=${{ matrix.cpu }}"
          # Embed commit-addressable release tag in binary for version command
          GAM_RELEASE_TAG: "main-${{ github.sha }}"
        run: cargo +nightly build --release --target ${{ matrix.target }}


      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          tar -czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.artifact_name }} -Destination ${{ matrix.asset_name }}.exe
          Compress-Archive -Path ${{ matrix.asset_name }}.exe -DestinationPath ${{ matrix.asset_name }}.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Generate release tag
        id: tag
        run: echo "release_tag=main-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          files: artifacts/**/*
