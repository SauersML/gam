name: Claude Bug Hunt (real + synthetic data)

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: read

jobs:
  hunt:
    if: false  # disabled: do not run
    runs-on: ubuntu-latest
    timeout-minutes: 330

    env:
      # Single-sourced Claude prompt: BOTH the ALT primary and the ORIG
      # fallback step reference this, so they can never drift apart.
      CLAUDE_HUNT_PROMPT: |
            Hi Claude. You have the run of this repo and an Ubuntu runner.

            `gam` is a Rust generalized additive model crate. `gamfit` is
            its Python wrapper (installed for you; the `gam` CLI is on
            $PATH). Read around. The README, the docs/, the source, and the
            cool-math primitives sprinkled through `src/` will tell you
            what this library is actually trying to do.

            ## The goal

            Find real, interesting things that are broken or behave
            unexpectedly when you actually use this library — on real data
            you go fetch, or on large synthetic data you design. Then for
            EACH one:

              1. Add one new test file that currently fails because of the
                 bug, and commit it directly to `main`. The test must
                 assert something meaningful and well-posed. When the bug
                 is fixed, the test should start passing without further
                 edits. No snapshot tests, no tautologies.
              2. File a GitHub issue describing what's wrong, how to
                 reproduce it, what you observed vs what you expected, and
                 your best read of why it's happening (point at files and
                 lines you've read — no patch, that's deliberate).
                 Reference the committed test by path and SHA.

            ## Take on multiple issues — chain them in serial

            Don't stop after one. If your investigation surfaces a cluster
            of related bugs (same subsystem, same family, same numerical
            failure mode), knock them all out in one run: file the first
            issue + committed test, then move on to the next related bug,
            commit + file, and so on. Several smaller related issues each
            with their own failing test are MORE valuable to the maintainer
            than one big writeup.

            If you find a lot of bugs (50+), keep going as long as each one
            is genuinely distinct and well-posed. Don't pad — quality over
            quantity. But also don't artificially stop at one when you've
            uncovered a chain.

            Between issues, briefly run `gh issue list --label claude-bug-hunt
            --state open --limit 20` to make sure you're not duplicating a
            sibling agent's work. Cross-link related issues you file
            yourself in this run with `Related: #N` lines in the body.

            Everything stays on `main`. No new branches, no PRs, no
            worktrees, no destructive git. No new `.md` files anywhere —
            all narrative (writeup, notes, hypothesis, repro steps) goes
            in the GitHub issue body, not into the repo. The maintainer
            wants failing tests + issues piling up faster than they can
            be fixed — resist the temptation to patch; the failing test
            IS the deliverable.

            ## Diversity matters — you are one of many runs

            Many copies of you have already filed issues and tests, and
            many more will after you. Before picking what to investigate,
            look at what's already been hunted: `gh issue list --label
            claude-bug-hunt --state all --limit 100`, `ls tests/bug_hunt_*
            gamfit/tests/test_bug_hunt_* 2>/dev/null`. Then deliberately
            pick a subsystem, family, data shape, failure mode, or
            mathematical primitive that is **under-represented** in that
            history. Repeating yesterday's angle on a fresh dataset is
            still collapse. Surprise the maintainer.

            Recent commits (`git log --since=...`) are a separate signal —
            if a lot has changed recently in one area, freshly-touched
            code is often where new bugs hide. Use that to *target*, not
            to avoid.

            If you genuinely can't find anything real this run, that's a
            fine outcome. Say so in the workflow log and exit. Don't ship
            a contrived issue to look productive. But this is very unlikely.
            A more common failure mode is under-ambition. Find more chains.
            Look in CI jobs for failures and inaccuracies. Get creative.

            ## Figure it out MUCH more deeply — out-investigate the library

            Do not stop at surface behaviour. For every candidate, trace the
            mechanism through the WHOLE system until you can name the exact
            code path and state, in one sentence, why the output is wrong
            and what a correct implementation would produce. Read every lane,
            branch, and caller the value flows through; diff against related
            history; form a hypothesis and CONFIRM it empirically (a targeted
            probe, a finite-difference check, a measured before/after) before
            you commit a test or file an issue. A falsified hypothesis cheaply
            killed is progress — re-diagnose rather than ship a vague issue.
            The depth of your root-cause read is what makes the issue useful
            to the fixer: point at the precise line and the precise reason.

            ## Do not stop prematurely

            Under-ambition is the failure mode. Before you end the run, make
            sure you have (a) committed a well-posed failing test to `main`
            AND filed a precise issue for every real defect you found, and
            (b) actually exhausted the hunt — swept multiple subsystems, real
            AND large-synthetic data, edge regimes, and CI-log failures. If
            you are about to stop with nothing committed, that is a signal to
            look HARDER in one more subsystem, not to wrap up — unless you
            have genuinely and thoroughly searched and found nothing real, in
            which case say exactly what you searched and why it's clean.

            Have fun with it.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install gam CLI
        run: |
          set -euxo pipefail
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Try to build gamfit from source (non-fatal)
        continue-on-error: true
        run: |
          set -uxo pipefail
          python -m pip install --upgrade pip maturin
          python -m pip install numpy pandas scipy scikit-learn pyarrow requests
          python -m pip install . && \
            (cd /tmp && python -c "import gamfit; print('gamfit ok')") || \
            echo "::warning::gamfit source build failed — agent can still use the gam CLI from install.sh"

      - name: Run Claude bug-hunt agent (primary — ALT token)
        id: claude_primary
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_ALT_OAUTH_TOKEN }}
          # Suppress the raw stream-json dump; a readable transcript of just
          # Claude's messages is rendered from execution_file after the run.
          show_full_output: false
          claude_args: >-
            --model claude-opus-4-8
            --dangerously-skip-permissions
            --allowedTools "Bash,Edit,Read,Write,Glob,Grep,WebFetch,WebSearch,TodoWrite,Task,NotebookEdit,KillBash,BashOutput"
          additional_permissions: |
            actions: read
          prompt: ${{ env.CLAUDE_HUNT_PROMPT }}

      - name: Run Claude bug-hunt agent (fallback — original token)
        id: claude_fallback
        if: steps.claude_primary.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Suppress the raw stream-json dump; a readable transcript of just
          # Claude's messages is rendered from execution_file after the run.
          show_full_output: false
          claude_args: >-
            --model claude-opus-4-8
            --dangerously-skip-permissions
            --allowedTools "Bash,Edit,Read,Write,Glob,Grep,WebFetch,WebSearch,TodoWrite,Task,NotebookEdit,KillBash,BashOutput"
          additional_permissions: |
            actions: read
          prompt: ${{ env.CLAUDE_HUNT_PROMPT }}

      - name: Print Claude transcript
        if: always()
        run: bash .github/scripts/print-claude-transcript.sh '${{ steps.claude_fallback.outputs.execution_file || steps.claude_primary.outputs.execution_file }}'
