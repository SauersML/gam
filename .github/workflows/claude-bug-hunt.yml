name: Claude Bug Hunt (real + synthetic data)

on:
  schedule:
    - cron: "0 */2 * * *"

concurrency:
  group: claude-bug-hunt
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install gam CLI
        run: |
          set -euxo pipefail
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install gamfit
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install gamfit numpy pandas scipy scikit-learn pyarrow requests
          python -c "import gamfit; print(gamfit.__version__)"

      - name: Run Claude bug-hunt agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Hi Claude. You have the run of this repo and an Ubuntu runner.

            `gam` is a Rust generalized additive model crate with cool math
            inside it — Schwinger trick, Polya-Gamma augmentation, NUTS with
            whitening, Hermite probit derivatives, Tierney–Kadane, intrinsic
            smooths on S² and the cylinder/torus, REML/LAML with arrow-Schur
            penalty blocks, GPU paths, the works. `gamfit` is its Python
            wrapper (installed for you; the `gam` CLI is on $PATH).

            ## The goal

            Find one real, interesting thing that is broken or behaves
            unexpectedly when you actually use this library — on real data
            you go fetch, or on large synthetic data you design to stress
            something specific. Then:

              1. Add one new test file that currently fails because of the
                 bug, and commit it directly to `main`. The test should
                 assert something meaningful — recovery of a known truth,
                 an invariance, calibration, parity between gamfit and the
                 gam CLI, gradient-vs-finite-difference, REML monotonicity,
                 whatever fits the bug. Not a snapshot of a number, not a
                 tautology. When the bug is fixed, the test should start
                 passing without further edits. (CI on main going red is
                 the forcing function — that's intentional.)
              2. File a GitHub issue describing what's wrong, how to
                 reproduce it, what you observed vs what you expected, and
                 your best read of why it's happening (point at files and
                 lines you've read — no patch, that's deliberate).
                 Reference the committed test by path and SHA.

            Everything stays on `main`. No new branches, no PRs, no
            worktrees, no destructive git. The maintainer wants failing
            tests + issues piling up faster than they can be fixed; resist
            the temptation to patch — the failing test IS the deliverable.

            ## You decide everything else

            Pick the scenario that interests you. Real data: UCI, OpenML,
            NYC TLC, CDC, GWAS Catalog, 1000 Genomes slices, SUPPORT2,
            Rossmann, anything you find via web search that would actually
            stress a GAM. Synthetic: design something hard — N in the
            millions, geometric smooths with known symmetries, survival
            with time-varying covariates, nested ARD penalties, GPU/CPU
            parity if a CUDA device shows up (it probably won't on this
            runner — skip rather than fake it).

            No turn budget, no tool restrictions, no required structure
            for the issue body, no required labels (make any labels you
            want with `gh label create` if they don't exist). If you need
            to edit something outside the new test file to make the repro
            work cleanly — a tiny harness helper, a fixture, whatever — go
            ahead; just keep it honest and don't slide into fixing the
            actual bug. Everything commits to `main` directly.

            If you genuinely can't find anything real this run, that's a
            fine outcome. Say so in the workflow log and exit. Don't ship a
            contrived issue to look productive.

            Have fun with it. The math here is unusually rich; pick
            something that's actually interesting to dig into.
