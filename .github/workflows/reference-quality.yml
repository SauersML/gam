name: Reference Quality Suite

# End-to-end quality tests that benchmark gam against the MATURE, STANDARD tool
# for each capability (mgcv, gamlss, survival, flexsurv, VGAM, scam, lme4,
# cmprsk, mlt/tram, scikit-learn, statsmodels, pyGAM, lifelines, scikit-survival,
# properscoring, geomstats, ...). These live in tests/quality_vs_*.rs and use the
# Rust reference harness (src/test_support/reference.rs), which shells out to R /
# Python. A missing reference dependency is a HARD failure (no skipping) — so
# this job provisions the full reference stack.
#
# Philosophy: a test whose assertion FAILS because gam genuinely diverges from
# the mature reference is an honest, useful measurement, not something to paper
# over. This job therefore RUNS every quality test and reports a pass/fail/
# compile-error table, but does not gate the pipeline red on assertion failures.

on:
  # Periodic dashboard rather than per-commit: building+running 139 heavy
  # integration binaries is too expensive to do on every quality-test push, and
  # the concurrent src/ churn would otherwise re-trigger it constantly. The
  # schedule gives a warm-cache run every few hours; dispatch is on-demand.
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/reference-quality.yml"

# Do NOT cancel an in-progress run when a new push lands: this job is a slow
# (full R+Python stack install + ~130 test-binary builds) match-vs-diverge
# DASHBOARD, not a fast gate. Cancelling on every push means it never reaches
# the "Run quality suite" summary. Let each run finish; newer pushes queue.
concurrency:
  group: reference-quality-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reference-quality:
    name: Reference quality vs mature tools
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Free runner disk space
        run: |
          set -uo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-}" || true
          df -h /

      - name: Install Rust 1.93.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Cache all dependency crates (not just direct deps) under a shared
          # key so consecutive runs warm-restore the full dependency build (the
          # multi-GB faer/burn/ndarray/arrow chunk). The gam lib + the per-test
          # binaries still rebuild when src/ changes — that is inherent and not
          # cacheable, which is why the trigger below is periodic, not per-commit.
          cache-all-crates: true
          shared-key: reference-quality

      - name: Install system libraries for reference tools
        shell: bash
        run: |
          set -uo pipefail
          # Several reference packages link system libs that are NOT on the bare
          # runner, so they fail to load at test time and the test reports a
          # spurious "reference unavailable" divergence instead of a real metric:
          #   libudunits2  -> units/sf (spatial, manifold refs)
          #   libGLU/mesa  -> rgl (loaded transitively by some geometry refs)
          #   gsl          -> INLA and gsl-based refs
          #   gdal/geos/proj -> sf spatial stack
          # INLA additionally ships PRECOMPILED native binaries (the `inla` and
          # `fmesher` programs that its R layer dyn.load()s). On a runner those
          # programs fail to start — the "unable to load shared object"/dyn.load
          # error in the issue — unless their full runtime link set is present:
          #   libgfortran5 / libquadmath0 -> the Fortran-built numerics
          #   libgomp1                    -> OpenMP runtime the binaries thread on
          #   libmetis / libsuitesparse   -> the sparse-Cholesky path INLA calls
          #   libjpeg / libpng / libtiff  -> imaging libs linked by the bundled bin
          sudo apt-get update -y || true
          sudo apt-get install -y --no-install-recommends \
            libudunits2-dev libglu1-mesa-dev libgsl-dev \
            libgdal-dev libgeos-dev libproj-dev \
            libgfortran5 libquadmath0 libgomp1 \
            libmetis5 libsuitesparse-dev \
            libjpeg-turbo8 libpng16-16 libtiff6 || true

      - name: Set up R
        uses: ./.github/actions/setup-bench-r

      - name: Install R reference packages
        shell: bash
        run: |
          set -uo pipefail
          # Posit Public Package Manager serves Linux binaries -> fast installs.
          Rscript -e '
            options(repos = c(CRAN = "https://packagemanager.posit.co/cran/__linux__/jammy/latest"))
            pkgs <- c("mgcv","survival","gamlss","gamlss.dist","gamlss.cens",
                      "flexsurv","rstpm2","VGAM","nnet","MASS","ordinal","betareg",
                      "scam","splines2","cmprsk","lme4","nlme","fields","gss","GpGp",
                      "quantreg","mlt","tram","basefun","loo","jsonlite",
                      "spheresmooth","Directional","nprotreg","compositions",
                      "robCompositions","scoringrules","gamboostLSS","mboost","bamlss",
                      "gamlss.add")
            for (p in pkgs) if (!requireNamespace(p, quietly=TRUE))
              try(install.packages(p), silent=TRUE)
            # `scoringrules` is a pure-R CRAN package that is absent from the Posit
            # jammy BINARY snapshot (the "there is no package called scoringrules"
            # REF_ERROR in the issue). Retry it from SOURCE off canonical CRAN,
            # where it is always available, so its CRPS reference test can run.
            if (!requireNamespace("scoringrules", quietly=TRUE))
              try(install.packages("scoringrules", type = "source",
                                   repos = "https://cloud.r-project.org"), silent=TRUE)
            cat("installed R packages:\n")
            for (p in pkgs) cat(sprintf("  %-14s %s\n", p, requireNamespace(p, quietly=TRUE)))
          '
          # R-INLA is not on CRAN; it ships from its own repository. Best-effort
          # (large download); tests that need it fail loudly if it is unavailable.
          # INLA's loader pulls in the Bioconductor packages `graph`/`Rgraphviz`
          # (the run annotated "dependencies 'Rgraphviz','gsl','graph' are not
          # available" + a dyn.load failure) and `fmesher`, so install those
          # first (gsl/graphviz system libs come from the apt step above).
          Rscript -e '
            options(repos = c(getOption("repos"),
                              CRAN = "https://packagemanager.posit.co/cran/__linux__/jammy/latest"))
            if (!requireNamespace("BiocManager", quietly=TRUE)) try(install.packages("BiocManager"), silent=TRUE)
            for (p in c("graph","Rgraphviz"))
              if (!requireNamespace(p, quietly=TRUE)) try(BiocManager::install(p, update=FALSE, ask=FALSE), silent=TRUE)
            for (p in c("fmesher","sp","foreach"))
              if (!requireNamespace(p, quietly=TRUE)) try(install.packages(p), silent=TRUE)
          '
          Rscript -e '
            options(repos = c(getOption("repos"),
                              INLA = "https://inla.r-inla-download.org/R/stable",
                              CRAN = "https://packagemanager.posit.co/cran/__linux__/jammy/latest"))
            if (!requireNamespace("INLA", quietly=TRUE))
              try(install.packages("INLA", dependencies=TRUE), silent=TRUE)
            # The R package installs fine; the failure mode in the issue is that
            # its BUNDLED native binaries (the `inla`/`fmesher` programs the R
            # layer shells/dyn.loads) do not match this runner, so the namespace
            # load aborts. INLA ships per-OS native builds; fetch the one matching
            # this host non-interactively so the binary actually runs. Pin to the
            # Ubuntu build that matches the jammy package snapshot we install from.
            if (requireNamespace("INLA", quietly=TRUE)) {
              try({
                suppressMessages(library(INLA))
                INLA::inla.binary.install(os = "Ubuntu-22.04")
              }, silent = TRUE)
            }
            cat(sprintf("  %-14s %s\n", "INLA", requireNamespace("INLA", quietly=TRUE)))
          '

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python reference libraries
        shell: bash
        run: |
          set -uo pipefail
          python -m pip install --upgrade pip
          # Core (must succeed); heavy/optional ones best-effort so one failure
          # does not block the rest.
          pip install "numpy<2" pandas scipy scikit-learn statsmodels
          pip install pygam lifelines scikit-survival properscoring scoringrules || true
          pip install geomstats GPy gpytorch || true
          pip install numpyro arviz pymc || true
          pip install interpret ngboost || true
          pip install xgboostlss lightgbmlss || true
          python -c "import numpy,scipy,sklearn,statsmodels,pandas; print('core python refs ok')"

      - name: Verify R stack loads
        shell: bash
        run: |
          set -uo pipefail
          Rscript -e 'for (p in c("mgcv","gamlss","survival")) library(p, character.only=TRUE); cat("R core refs ok\n")'
          # Surface the EXACT load error for the two tools this job provisions but
          # cannot hard-require (large/native): INLA's bundled-binary dyn.load and
          # the source-built scoringrules. Non-fatal — the quality suite classifies
          # a still-missing tool as REF_ERROR — but the captured message tells us
          # precisely which system lib / binary arch is still missing if it recurs.
          Rscript -e '
            for (p in c("INLA","scoringrules")) {
              ok <- tryCatch({ suppressMessages(library(p, character.only=TRUE)); TRUE },
                             error = function(e) { cat(sprintf("%s load error: %s\n", p, conditionMessage(e))); FALSE })
              cat(sprintf("  %-12s loadable=%s\n", p, ok))
            }
          ' || true

      - name: Build quality tests
        shell: bash
        run: |
          set -uo pipefail
          mapfile -t files < <(ls tests/quality_vs_*.rs 2>/dev/null | xargs -n1 basename | sed 's/\.rs$//')
          echo "building ${#files[@]} quality test target(s) in ONE invocation (parallel codegen)"
          # A single multi---test invocation links all binaries in one cargo run.
          # The run step then EXECUTES each built binary DIRECTLY (globbed from
          # target/debug/deps) — invoking `cargo test` per target re-did
          # freshness/link work 141× and blew the timeout (the all-TIMEOUT bug).
          #
          # `cargo build --keep-going` (NOT `cargo test --no-run`, which rejects
          # --keep-going): `--test <name>` compiles each named test target to the
          # same target/debug/deps/<name>-<hash> binary the run step globs, so the
          # output is identical to --no-run. `--keep-going` is the point — without
          # it the FIRST target that fails to compile aborts the whole build, so
          # every still-unbuilt binary is missing and the run step files it as
          # BUILDFAIL: one real compile error masquerades as dozens (the
          # "1 defect + 54 collateral BUILDFAILs" cascade). With it, cargo builds
          # every target it can and only the genuinely-broken ones lack a binary,
          # so BUILDFAIL counts the real compile defects and nothing else.
          args=(); for t in "${files[@]}"; do args+=(--test "$t"); done
          cargo build --keep-going "${args[@]}" 2>&1 | tail -120 \
            || echo "build reported errors; missing binaries are flagged BUILDFAIL in the run step"

      - name: Run quality suite (resilient + streaming; full per-test capture)
        shell: bash
        run: |
          # GitHub's `shell: bash` runs with `-e`, which would abort this step at
          # the FIRST diverging/failing test (cargo test returns nonzero) before
          # the streaming loop and exit 0. Turn `-e` OFF: per-test failures are
          # the expected, tolerated outcome here; we classify and stream them.
          set +e -u -o pipefail
          mapfile -t files < <(ls tests/quality_vs_*.rs 2>/dev/null | xargs -n1 basename | sed 's/\.rs$//')
          N=${#files[@]}; i=0
          pass=0; metricoff=0; gamerr=0; referr=0; testerr=0; tmo=0; bf=0
          # EVERYTHING the run produced lands under one directory that is uploaded
          # wholesale: the full per-test stdout+stderr logs (no tail truncation),
          # a rich un-truncated TSV, and a JSONL stream. The job-summary table and
          # the totals are a VIEW on top of this complete captured data, never a
          # lossy replacement for it.
          OUT=/tmp/quality-report
          rm -rf "$OUT"; mkdir -p "$OUT/logs"
          RES="$OUT/quality_results.tsv"
          JSONL="$OUT/quality_results.jsonl"
          # Tab-separated, one header row, FULL (un-truncated) metric column so
          # every captured quality figure for every test is preserved verbatim.
          printf 'idx\toutcome\tcause\ttest\trc\tdur_s\tsub_passed\tsub_failed\tmetric\treason\n' > "$RES"
          : > "$JSONL"
          {
            echo "## Reference quality suite"
            echo ""
            echo "Each row is one test BINARY — often several sub-tests (a synthetic"
            echo "arm plus an \`_on_real_data\` arm); \`sub\` is passed/failed WITHIN the"
            echo "binary, and a single failing sub-test keeps the whole binary out of"
            echo "PASS. The \`outcome\` says exactly WHAT happened — it never collapses"
            echo "distinct situations into one vague word:"
            echo ""
            echo "- \`PASS\` — met the quality bar."
            echo "- \`METRIC_OFF\` — gam ran and produced output, but a quality metric"
            echo "  missed its bound (an honest accuracy/calibration finding, NOT an error)."
            echo "- \`GAM_ERROR\` — gam itself errored: the fit crashed, refused, or"
            echo "  failed to converge (no usable output)."
            echo "- \`REF_ERROR\` — the mature reference tool failed or is missing"
            echo "  (R/Python package, system lib, namespace, or its script) — not gam."
            echo "- \`TEST_ERROR\` — the test/harness setup is wrong (bad data, missing"
            echo "  fixture, mismatched column lengths) — fix the test, not gam."
            echo "- \`TIMEOUT\` — exceeded the 360s per-test wall-clock cap."
            echo ""
            echo "Full per-test logs + an un-truncated metric TSV + a JSONL stream are"
            echo "in the \`quality-results\` artifact."
            echo ""
            echo "| # | test | outcome | cause | sub p/f | dur | metrics | reason |"
            echo "|---|---|---|---|---|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          for t in "${files[@]}"; do
            i=$((i+1))
            outcome=""; cause=""; reason=""; rc=0; cap=360
            echo "::group::[$i/$N] $t"
            log="$OUT/logs/$t.log"
            # Newest executable binary for this test in target/debug/deps
            # (exclude .d/.rlib/etc.); built once by the build step above.
            bin=$(find target/debug/deps -maxdepth 1 -type f -perm -u+x -name "${t}-*" ! -name '*.*' -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)
            start=$SECONDS
            if [ -z "$bin" ] || [ ! -x "$bin" ]; then
              # No binary => the build step couldn't compile this test.
              outcome=BUILDFAIL; rc=-1
              echo "no executable binary found for $t — the build step could not compile it" > "$log"
            else
              # EXECUTE the pre-built binary directly — no cargo, no rebuild.
              # Per-test wall-clock cap bounds a hung fit/R/Python subprocess.
              # 124 = timed out, 137 = SIGKILL after.
              # A few tests are bounded by a correct-but-heavy REFERENCE tool
              # (INLA grid/SPDE-mesh integration; mgcv full-rank thin-plate
              # eigendecomposition on ~800 points), not by gam — they get a
              # larger budget so they finish and report real metrics instead of
              # a spurious TIMEOUT. gam-side slowness is filed as a perf bug, not
              # papered over with a bump.
              cap=360
              case "$t" in
                quality_vs_inla_rw2_spde_penalized_baseline|quality_vs_mgcv_quakes_spatial_smooth) cap=900 ;;
              esac
              timeout --kill-after=30 "$cap" "$bin" --nocapture --test-threads=1 > "$log" 2>&1
              rc=$?
            fi
            dur=$((SECONDS-start))
            # Sub-test tallies from the libtest summary line in this binary's log.
            res_line=$(grep -aE '^test result:' "$log" | tail -1)
            sub_passed=$(printf '%s' "$res_line" | grep -oaE '[0-9]+ passed' | grep -oaE '[0-9]+' | head -1); sub_passed=${sub_passed:-0}
            sub_failed=$(printf '%s' "$res_line" | grep -oaE '[0-9]+ failed' | grep -oaE '[0-9]+' | head -1); sub_failed=${sub_failed:-0}
            # ALL numeric quality figures emitted by the test, un-truncated. The
            # full log keeps everything regardless; this column is the structured,
            # greppable distillation of every metric the test printed.
            metric=$(grep -hoaE '(R2|r2|rmse|mae|rel_l2|l2|auc|deviance|nll|loglik|crps|acc|accuracy|logloss|concordance|c_index|seam|edf|pearson|spearman|coverage|width|bias|frechet|distance|geodesic|rho|ess|rhat|kl|wasserstein|calibration|brier|ci_|se_)[^ ,;)]*[=: ]+-?[0-9][0-9.eE+-]*' "$log" 2>/dev/null | tr '\n' ' ')
            # A reference tool failing/missing (R/Python package, system lib,
            # namespace, broken generated script) — this is NOT a gam result.
            refmarker=$(grep -aE 'there is no package called|could not find function|Error in library\(|package or namespace load failed|unable to load shared object|cannot open shared object|No module named|ModuleNotFoundError|IndentationError|reference .* body failed' "$log" | head -1)
            # First panic: "<thread> panicked at <file:line>:" then the message.
            panicmsg=$(awk '/panicked at/{loc=$0; getline; print loc " :: " $0; exit}' "$log")
            # gam-side fit errors (the fit crashed/refused/failed to converge).
            # `LayoutError`/`identifiability audit` are gam's OWN model-layout /
            # identifiability verdicts — they must classify as GAM_ERROR even
            # though their message contains the phrase "rows, expected" (which
            # used to be matched by the broader TEST_ERROR rule below and stole
            # them; that rule is now harness-origin-only).
            gamfit_re='IntegrationFailed|InvalidConfig|IdentifiabilityFailure|LayoutError|identifiability audit|Invalid input|could not broadcast|Newton step|transformation fit failed|workflow survival baseline failed|RemlOptimizationFailed|REML smoothing optimization'
            if [ "$outcome" = BUILDFAIL ]; then
              cause=build; reason=$(head -1 "$log"); bf=$((bf+1))
            elif [ "$rc" -eq 0 ]; then
              outcome=PASS; cause=ok; reason=""; pass=$((pass+1))
            elif [ "$rc" -eq 124 ] || [ "$rc" -eq 137 ]; then
              outcome=TIMEOUT; cause=timeout; reason="exceeded ${cap}s wall-clock"; tmo=$((tmo+1))
            elif [ -n "$refmarker" ]; then
              outcome=REF_ERROR; cause=reference_tool; reason="$refmarker"; referr=$((referr+1))
            elif printf '%s' "$panicmsg" | grep -qaE 'src/test_support/reference\.rs|No such file or directory'; then
              # Test/harness setup defect (bad data, missing fixture, length
              # mismatch). Gated on the panic ORIGINATING in the harness
              # (src/test_support/reference.rs — where write_columns_csv asserts
              # equal column lengths) rather than on the bare phrases
              # "rows, expected"/"reference column", which also appear in gam's
              # own identifiability/layout error messages and were misfiling
              # genuine GAM_ERRORs as TEST_ERROR.
              outcome=TEST_ERROR; cause=test_setup; reason="$panicmsg"; testerr=$((testerr+1))
            elif printf '%s' "$panicmsg" | grep -qaE "$gamfit_re" || printf '%s' "$panicmsg" | grep -qaE 'panicked at src/'; then
              outcome=GAM_ERROR; cause=gam_fit_failed; reason="$panicmsg"; gamerr=$((gamerr+1))
            else
              # gam produced output; a quality metric missed its bound. Honest
              # accuracy/calibration finding — not an error.
              outcome=METRIC_OFF; cause=quality_metric; reason="${panicmsg:-nonzero exit $rc}"; metricoff=$((metricoff+1))
            fi
            # Sanitize to single-line cells for the TSV / markdown table; the full
            # untouched text always remains in the per-test log artifact.
            metric_clean=$(printf '%s' "$metric" | tr '\t|' '  ' | tr -s ' ')
            reason_clean=$(printf '%s' "$reason" | tr '\t\n|' '   ' | tr -s ' ' | cut -c1-400)
            printf '%d\t%s\t%s\t%s\t%d\t%d\t%s\t%s\t%s\t%s\n' \
              "$i" "$outcome" "$cause" "$t" "$rc" "$dur" "$sub_passed" "$sub_failed" "$metric_clean" "$reason_clean" >> "$RES"
            printf '{"idx":%d,"outcome":"%s","cause":"%s","test":"%s","rc":%d,"dur_s":%d,"sub_passed":%s,"sub_failed":%s}\n' \
              "$i" "$outcome" "$cause" "$t" "$rc" "$dur" "$sub_passed" "$sub_failed" >> "$JSONL"
            printf '| %d | %s | %s | %s | %s/%s | %ss | %s | %s |\n' \
              "$i" "$t" "$outcome" "$cause" "$sub_passed" "$sub_failed" "$dur" "$metric_clean" "${reason_clean:0:200}" >> "$GITHUB_STEP_SUMMARY"
            echo "[$i/$N] $outcome/$cause  $t  rc=$rc dur=${dur}s sub=${sub_passed}p/${sub_failed}f"
            [ -n "$metric_clean" ] && echo "  metrics: $metric_clean"
            [ -n "$reason_clean" ] && echo "  reason:  $reason_clean"
            # Echo the FULL per-test log into the (collapsible) job-log group too —
            # no 20-line tail. The artifact is the canonical complete copy in case
            # GitHub caps the job log.
            echo "----- full log: $t -----"; cat "$log"; echo "----- end log: $t -----"
            echo "::endgroup::"
          done
          {
            echo ""
            echo "### Totals"
            echo ""
            echo "| outcome | count | meaning |"
            echo "|---|---|---|"
            echo "| PASS | $pass | met the quality bar |"
            echo "| METRIC_OFF | $metricoff | gam ran; a quality metric missed its bound |"
            echo "| GAM_ERROR | $gamerr | gam fit crashed / refused / failed to converge |"
            echo "| REF_ERROR | $referr | reference tool failed or missing |"
            echo "| TEST_ERROR | $testerr | test/harness setup defect |"
            echo "| TIMEOUT | $tmo | exceeded 360s |"
            echo "| BUILDFAIL | $bf | did not compile |"
            echo "| **total** | **$N** | |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "pass=$pass metric_off=$metricoff gam_error=$gamerr ref_error=$referr test_error=$testerr timeout=$tmo build_fail=$bf (of $N)"
          # Informational dashboard: divergences/timeouts are honest findings, not
          # pipeline failures.
          exit 0

      - name: Upload full quality report (always — survives timeout/cancel)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-results
          # The WHOLE report dir: rich un-truncated TSV + JSONL + every per-test
          # stdout/stderr log. "Everything that happened", not just the headlines.
          path: /tmp/quality-report
          if-no-files-found: ignore
