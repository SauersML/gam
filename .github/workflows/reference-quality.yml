name: Reference Quality Suite

# End-to-end quality tests that benchmark gam against the MATURE, STANDARD tool
# for each capability (mgcv, gamlss, survival, flexsurv, VGAM, scam, lme4,
# cmprsk, mlt/tram, scikit-learn, statsmodels, pyGAM, lifelines, scikit-survival,
# properscoring, geomstats, ...). These live under tests/quality/** and are
# included by the grouped tests/quality.rs integration target. They use the Rust
# reference harness (src/test_support/reference.rs), which shells out to R /
# Python. A missing reference dependency is a HARD failure (no skipping), so this
# job provisions the full reference stack.
#
# Philosophy: a test whose assertion FAILS because gam genuinely diverges from
# the mature reference is an honest, useful measurement. This job RUNS every
# quality test (no fail-fast — it collects EVERY failure and a pass/fail/
# compile-error table), and THEN GATES the pipeline red if any test landed in a
# gating bucket (METRIC_OFF/GAM_ERROR/TEST_ERROR/TIMEOUT/BUILDFAIL). REF_ERROR —
# the reference R/Python environment failing, not gam — is reported but NOT
# gated. Gating is what stops quality regressions from landing on main silently.

on:
  # Periodic dashboard rather than per-commit: building+running the heavy
  # grouped quality target is too expensive to do on every quality-test push, and
  # the concurrent src/ churn would otherwise re-trigger it constantly. The
  # schedule gives a warm-cache run every few hours; dispatch is on-demand.
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/reference-quality.yml"

# Do NOT cancel an in-progress run when a new push lands: this job is a slow
# (full R+Python stack install + grouped quality build/run) match-vs-diverge
# DASHBOARD, not a fast gate. Cancelling on every push means it never reaches
# the "Run quality suite" summary. Let each run finish; newer pushes queue.
concurrency:
  group: reference-quality-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reference-quality:
    name: Reference quality vs mature tools
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # #1458: full history so build.rs author gate resolves real last editor, not HEAD

      - name: Free runner disk space
        run: |
          set -uo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-}" || true
          df -h /

      - name: Install Rust 1.93.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Cache all dependency crates (not just direct deps) under a shared
          # key so consecutive runs warm-restore the full dependency build (the
          # multi-GB faer/burn/ndarray/arrow chunk). The gam lib + grouped
          # quality binary still rebuild when src/ changes — that is inherent
          # and not cacheable, which is why the trigger below is periodic, not
          # per-commit.
          cache-all-crates: true
          shared-key: reference-quality

      # Provision the full mature-tool reference stack (system libs + R + CRAN/
      # Bioconductor/INLA packages + Python + the scientific reference libs).
      # Shared with the Rust CI test shards (test.yml) via one composite action
      # so the two provisioning paths can never drift.
      - name: Install reference tool stack (R + Python mature comparators)
        uses: ./.github/actions/install-reference-tools

      - name: Build quality tests
        shell: bash
        run: |
          set -uo pipefail
          echo "building grouped quality integration target tests/quality.rs"
          # tests/quality.rs includes the moved tests/quality/** modules as one
          # integration target. Build that target once, then the run step executes
          # its libtest cases directly. Running one unfiltered grouped binary
          # would put the whole suite behind a single 360s cap.
          #
          # gam#1082: build the benchmark OPTIMIZED (`release-dev` = opt-level 3,
          # codegen-units=16, no LTO — the fast-compile optimized profile). The
          # default `test` profile compiles the gam crate at opt-level 0 (only its
          # *dependencies* get opt-2 via `[profile.test.package."*"]`), so the
          # benchmark was timing every fit on UNOPTIMIZED gam code — a perf profile
          # the shipped wheel (`release-pypi`, lto=fat opt-3) and CLI (`release`)
          # never run. perf shows the opt-0 hot path is dominated by ndarray
          # per-element bounds/stride checks (`index_checked`, `stride_offset_checked`,
          # `precondition_check`) that the optimizer elides, not by real FLOPs. This
          # makes the 360s budget measure production-representative cost; it is NOT a
          # budget bump (the per-test cap below is unchanged) — it stops measuring a
          # debug build no user experiences.
          cargo build --keep-going --profile release-dev --test quality 2>&1 | tail -120 \
            || echo "build reported errors; missing quality binary is flagged BUILDFAIL in the run step"
          # A handful of quality tests (RMST, competing risks) shell out to the
          # real `gam` CLI to exercise the end-to-end formula fit path. The CLI
          # binary was peeled into the `gam-cli` workspace member (#1521), so it
          # is NOT pulled in by `--test quality` and must be built explicitly
          # under the SAME profile — otherwise those tests spawn a nonexistent
          # `target/release-dev/gam` and report TEST_ERROR every run.
          echo "building the gam CLI binary (gam-cli) so CLI-shelling quality tests can spawn it"
          cargo build --keep-going --profile release-dev -p gam-cli --bin gam 2>&1 | tail -40 \
            || echo "gam CLI build reported errors; CLI-shelling quality tests will report TEST_ERROR"

      - name: Run quality suite (resilient + streaming; full per-test capture)
        shell: bash
        run: |
          # GitHub's `shell: bash` runs with `-e`, which would abort this step at
          # the FIRST diverging/failing test (cargo test returns nonzero) before
          # the streaming loop and exit 0. Turn `-e` OFF: per-test failures are
          # the expected, tolerated outcome here; we classify and stream them.
          set +e -u -o pipefail
          pass=0; metricoff=0; gamerr=0; referr=0; testerr=0; tmo=0; bf=0
          # REF_ERROR among comparators the job GUARANTEES are installed (the
          # install-reference-tools action hard-fails if mgcv/gamlss/survival do
          # not load). For those tests a lost reference is a genuine breakage, not the
          # tolerated "optional native tool missing" case (INLA/scoringrules/PyMC),
          # so it must gate the run rather than be absorbed by the 25% global floor.
          guaranteed_referr=0
          # EVERYTHING the run produced lands under one directory that is uploaded
          # wholesale: the full per-test stdout+stderr logs (no tail truncation),
          # a rich un-truncated TSV, and a JSONL stream. The job-summary table and
          # the totals are a VIEW on top of this complete captured data, never a
          # lossy replacement for it.
          OUT=/tmp/quality-report
          rm -rf "$OUT"; mkdir -p "$OUT/logs"
          RES="$OUT/quality_results.tsv"
          JSONL="$OUT/quality_results.jsonl"
          discovery_error=0
          # gam#1082: the quality target is built under the `release-dev` profile
          # (see the build step), so its binary lands in target/release-dev/deps.
          bin=$(find target/release-dev/deps -maxdepth 1 -type f -perm -u+x -name "quality-*" ! -name '*.*' -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)
          if [ -n "$bin" ] && [ -x "$bin" ]; then
            mapfile -t tests < <("$bin" --list 2>/dev/null | sed -n 's/: test$//p')
            if [ "${#tests[@]}" -eq 0 ]; then
              discovery_error=1
              tests=(quality_discovery)
            fi
          else
            tests=(quality)
          fi
          N=${#tests[@]}; i=0
          # Tab-separated, one header row, FULL (un-truncated) metric column so
          # every captured quality figure for every test is preserved verbatim.
          printf 'idx\toutcome\tcause\ttest\trc\tdur_s\tsub_passed\tsub_failed\tmetric\treason\n' > "$RES"
          : > "$JSONL"
          {
            echo "## Reference quality suite"
            echo ""
            echo "Each row is one exact libtest case from the grouped \`quality\`"
            echo "integration binary. Synthetic and \`_on_real_data\` arms are timed"
            echo "and classified independently, so grouping does not hide the slow"
            echo "test behind a whole-suite timeout. The \`outcome\` says exactly WHAT happened — it never collapses"
            echo "distinct situations into one vague word:"
            echo ""
            echo "- \`PASS\` — met the quality bar."
            echo "- \`METRIC_OFF\` — gam ran and produced output, but a quality metric"
            echo "  missed its bound (an honest accuracy/calibration finding, NOT an error)."
            echo "- \`GAM_ERROR\` — gam itself errored: the fit crashed, refused, or"
            echo "  failed to converge (no usable output)."
            echo "- \`REF_ERROR\` — the mature reference tool failed or is missing"
            echo "  (R/Python package, system lib, namespace, or its script) — not gam."
            echo "- \`TEST_ERROR\` — the test/harness setup is wrong (bad data, missing"
            echo "  fixture, mismatched column lengths) — fix the test, not gam."
            echo "- \`TIMEOUT\` — exceeded the per-test wall-clock cap."
            echo ""
            echo "Full per-test logs + an un-truncated metric TSV + a JSONL stream are"
            echo "in the \`quality-results\` artifact."
            echo ""
            echo "| # | test | outcome | cause | sub p/f | dur | metrics | reason |"
            echo "|---|---|---|---|---|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          for t in "${tests[@]}"; do
            i=$((i+1))
            outcome=""; cause=""; reason=""; rc=0; cap=360
            echo "::group::[$i/$N] $t"
            # Sanitize the log FILENAME: Rust test paths contain '::', which
            # upload-artifact rejects (colon is invalid on NTFS). Keep $t intact
            # for the test filter; only the on-disk filename is rewritten.
            tsafe="${t//:/_}"
            log="$OUT/logs/$tsafe.log"
            start=$SECONDS
            if [ "$discovery_error" -eq 1 ]; then
              outcome=TEST_ERROR; cause=test_discovery; rc=-1
              reason="quality binary listed zero libtest cases"
              echo "$reason" > "$log"
            elif [ -z "$bin" ] || [ ! -x "$bin" ]; then
              # No binary => the build step couldn't compile this test.
              outcome=BUILDFAIL; rc=-1
              echo "no executable binary found for grouped quality target — the build step could not compile it" > "$log"
            else
              # EXECUTE the pre-built binary directly — no cargo, no rebuild.
              # Per-test wall-clock cap bounds a hung fit/R/Python subprocess.
              # 124 = timed out, 137 = SIGKILL after.
              # A few tests are bounded by a correct-but-heavy REFERENCE tool
              # (INLA grid/SPDE-mesh integration; mgcv full-rank thin-plate
              # eigendecomposition on ~800 points), not by gam — they get a
              # larger budget so they finish and report real metrics instead of
              # a spurious TIMEOUT. gam-side slowness is filed as a perf bug, not
              # papered over with a bump.
              cap=360
              case "$t" in
                quality_vs_inla_rw2_spde_penalized_baseline::*|quality_vs_mgcv_quakes_spatial_smooth::*) cap=900 ;;
              esac
              timeout --kill-after=30 "$cap" "$bin" --exact "$t" --nocapture --test-threads=1 > "$log" 2>&1
              rc=$?
            fi
            dur=$((SECONDS-start))
            # Sub-test tallies from the libtest summary line in this binary's log.
            res_line=$(grep -aE '^test result:' "$log" | tail -1)
            sub_passed=$(printf '%s' "$res_line" | grep -oaE '[0-9]+ passed' | grep -oaE '[0-9]+' | head -1); sub_passed=${sub_passed:-0}
            sub_failed=$(printf '%s' "$res_line" | grep -oaE '[0-9]+ failed' | grep -oaE '[0-9]+' | head -1); sub_failed=${sub_failed:-0}
            # ALL numeric quality figures emitted by the test, un-truncated. The
            # full log keeps everything regardless; this column is the structured,
            # greppable distillation of every metric the test printed.
            metric=$(grep -hoaE '(R2|r2|rmse|mae|rel_l2|l2|auc|deviance|nll|loglik|crps|acc|accuracy|logloss|concordance|c_index|seam|edf|pearson|spearman|coverage|width|bias|frechet|distance|geodesic|rho|ess|rhat|kl|wasserstein|calibration|brier|ci_|se_)[^ ,;)]*[=: ]+-?[0-9][0-9.eE+-]*' "$log" 2>/dev/null | tr '\n' ' ')
            # A reference tool failing/missing (R/Python package, system lib,
            # namespace, broken generated script) — this is NOT a gam result.
            refmarker=$(grep -aE 'there is no package called|could not find function|Error in library\(|package or namespace load failed|unable to load shared object|cannot open shared object|No module named|ModuleNotFoundError|IndentationError|reference .* body failed' "$log" | head -1)
            # First panic: "<thread> panicked at <file:line>:" then the message.
            panicmsg=$(awk '/panicked at/{loc=$0; getline; print loc " :: " $0; exit}' "$log")
            # gam-side fit errors (the fit crashed/refused/failed to converge).
            # `LayoutError`/`identifiability audit` are gam's OWN model-layout /
            # identifiability verdicts — they must classify as GAM_ERROR even
            # though their message contains the phrase "rows, expected" (which
            # used to be matched by the broader TEST_ERROR rule below and stole
            # them; that rule is now harness-origin-only).
            gamfit_re='IntegrationFailed|InvalidConfig|IdentifiabilityFailure|LayoutError|identifiability audit|Invalid input|could not broadcast|Newton step|transformation fit failed|workflow survival baseline failed|RemlOptimizationFailed|REML smoothing optimization'
            if [ "$outcome" = TEST_ERROR ]; then
              testerr=$((testerr+1))
            elif [ "$outcome" = BUILDFAIL ]; then
              cause=build; reason=$(head -1 "$log"); bf=$((bf+1))
            elif [ "$rc" -eq 0 ]; then
              outcome=PASS; cause=ok; reason=""; pass=$((pass+1))
            elif [ "$rc" -eq 124 ] || [ "$rc" -eq 137 ]; then
              outcome=TIMEOUT; cause=timeout; reason="exceeded ${cap}s wall-clock"; tmo=$((tmo+1))
            elif [ -n "$refmarker" ]; then
              outcome=REF_ERROR; cause=reference_tool; reason="$refmarker"; referr=$((referr+1))
              # If the lost reference is one the job guarantees present, this REF_ERROR
              # is a real breakage masking a lost gam-vs-reference comparison. Tracked
              # by comparator name (mgcv/gamlss/survival are the hard-verified R refs).
              case "$t" in
                *mgcv*|*gamlss*|*survival*) guaranteed_referr=$((guaranteed_referr+1)) ;;
              esac
            elif printf '%s' "$panicmsg" | grep -qaE 'src/test_support/reference\.rs|No such file or directory'; then
              # Test/harness setup defect (bad data, missing fixture, length
              # mismatch). Gated on the panic ORIGINATING in the harness
              # (src/test_support/reference.rs — where write_columns_csv asserts
              # equal column lengths) rather than on the bare phrases
              # "rows, expected"/"reference column", which also appear in gam's
              # own identifiability/layout error messages and were misfiling
              # genuine GAM_ERRORs as TEST_ERROR.
              outcome=TEST_ERROR; cause=test_setup; reason="$panicmsg"; testerr=$((testerr+1))
            elif printf '%s' "$panicmsg" | grep -qaE "$gamfit_re" || printf '%s' "$panicmsg" | grep -qaE 'panicked at src/'; then
              outcome=GAM_ERROR; cause=gam_fit_failed; reason="$panicmsg"; gamerr=$((gamerr+1))
            else
              # gam produced output; a quality metric missed its bound. Honest
              # accuracy/calibration finding — not an error.
              outcome=METRIC_OFF; cause=quality_metric; reason="${panicmsg:-nonzero exit $rc}"; metricoff=$((metricoff+1))
            fi
            # Sanitize to single-line cells for the TSV / markdown table; the full
            # untouched text always remains in the per-test log artifact.
            metric_clean=$(printf '%s' "$metric" | tr '\t|' '  ' | tr -s ' ')
            reason_clean=$(printf '%s' "$reason" | tr '\t\n|' '   ' | tr -s ' ' | cut -c1-400)
            printf '%d\t%s\t%s\t%s\t%d\t%d\t%s\t%s\t%s\t%s\n' \
              "$i" "$outcome" "$cause" "$t" "$rc" "$dur" "$sub_passed" "$sub_failed" "$metric_clean" "$reason_clean" >> "$RES"
            printf '{"idx":%d,"outcome":"%s","cause":"%s","test":"%s","rc":%d,"dur_s":%d,"sub_passed":%s,"sub_failed":%s}\n' \
              "$i" "$outcome" "$cause" "$t" "$rc" "$dur" "$sub_passed" "$sub_failed" >> "$JSONL"
            printf '| %d | %s | %s | %s | %s/%s | %ss | %s | %s |\n' \
              "$i" "$t" "$outcome" "$cause" "$sub_passed" "$sub_failed" "$dur" "$metric_clean" "${reason_clean:0:200}" >> "$GITHUB_STEP_SUMMARY"
            echo "[$i/$N] $outcome/$cause  $t  rc=$rc dur=${dur}s sub=${sub_passed}p/${sub_failed}f"
            [ -n "$metric_clean" ] && echo "  metrics: $metric_clean"
            [ -n "$reason_clean" ] && echo "  reason:  $reason_clean"
            # Echo the FULL per-test log into the (collapsible) job-log group too —
            # no 20-line tail. The artifact is the canonical complete copy in case
            # GitHub caps the job log.
            echo "----- full log: $t -----"; cat "$log"; echo "----- end log: $t -----"
            echo "::endgroup::"
          done
          {
            echo ""
            echo "### Totals"
            echo ""
            echo "| outcome | count | meaning |"
            echo "|---|---|---|"
            echo "| PASS | $pass | met the quality bar |"
            echo "| METRIC_OFF | $metricoff | gam ran; a quality metric missed its bound |"
            echo "| GAM_ERROR | $gamerr | gam fit crashed / refused / failed to converge |"
            echo "| REF_ERROR | $referr | reference tool failed or missing |"
            echo "| TEST_ERROR | $testerr | test/harness setup defect |"
            echo "| TIMEOUT | $tmo | exceeded per-test wall-clock cap |"
            echo "| BUILDFAIL | $bf | did not compile |"
            echo "| **total** | **$N** | |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "pass=$pass metric_off=$metricoff gam_error=$gamerr ref_error=$referr test_error=$testerr timeout=$tmo build_fail=$bf (of $N)"
          # GATE the pipeline. The suite is the ONLY end-to-end measurement of gam
          # quality vs the mature standard tools; if it cannot go red, every quality
          # regression lands on main silently (the #1087 meta-bug). We ran ALL N
          # tests above (no fail-fast — every failure is collected and streamed);
          # now we exit non-zero if ANY test landed in a GATING bucket, after
          # printing exactly which ones did and why.
          #
          # Gating buckets = genuine gam/test defects + honest quality misses:
          #   METRIC_OFF  gam ran but a quality metric missed its bound
          #   GAM_ERROR   gam fit crashed / refused / failed to converge
          #   TEST_ERROR  test/harness setup defect
          #   TIMEOUT     exceeded the per-test wall-clock cap
          #   BUILDFAIL   did not compile
          # NOT gated: REF_ERROR — the reference R/Python environment failed or is
          # missing (not a gam result; tracked separately, #1070/#1071). It is
          # reported below but never masks or triggers the gam-side gate.
          gating=$((metricoff + gamerr + testerr + tmo + bf))
          if [ "$gating" -gt 0 ]; then
            echo ""
            echo "::error::Reference Quality Suite FAILED: ${gating} test(s) in gating buckets (METRIC_OFF=${metricoff} GAM_ERROR=${gamerr} TEST_ERROR=${testerr} TIMEOUT=${tmo} BUILDFAIL=${bf}); REF_ERROR=${referr} not gated."
            echo "----- gating failures (outcome  test  reason) -----"
            # Reprint the offending rows from the TSV (skip header; field 2 = outcome).
            awk -F'\t' 'NR>1 && $2!="PASS" && $2!="REF_ERROR" {printf "  %-11s %s\n    %s\n", $2, $4, $10}' "$RES"
            echo "---------------------------------------------------"
            {
              echo ""
              echo "### Gate: FAILED"
              echo ""
              echo "${gating} test(s) in gating buckets (METRIC_OFF/GAM_ERROR/TEST_ERROR/TIMEOUT/BUILDFAIL)."
              echo "REF_ERROR (${referr}) is reference-environment, not gated."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          # PER-COMPARATOR COVERAGE FLOOR (#1082, GPT-5.5 Pro concern: "quality runs
          # passing without reference coverage"). The 25% global floor below tolerates
          # missing OPTIONAL native references (INLA/scoringrules/PyMC). But the job
          # HARD-VERIFIES that mgcv/gamlss/survival load before running (the
          # install-reference-tools action fails otherwise), so a REF_ERROR on any test
          # backed by one of those is NOT a missing-infra waiver — it is a genuine
          # breakage that silently dropped a gam-vs-mature-tool comparison. Require
          # 100% reference coverage for the guaranteed comparators: a single such
          # REF_ERROR fails the run, no percentage tolerance.
          if [ "$guaranteed_referr" -gt 0 ]; then
            echo ""
            echo "::error::Reference Quality Suite UNTRUSTWORTHY: ${guaranteed_referr} test(s) backed by a GUARANTEED reference (mgcv/gamlss/survival) hit REF_ERROR. Those tools are verified-present before the run, so this is a real reference breakage that dropped a gam-vs-reference comparison — not an optional-tool waiver. 100% coverage is required for guaranteed comparators."
            echo "----- guaranteed-comparator REF_ERROR rows (test  reason) -----"
            awk -F'\t' 'NR>1 && $2=="REF_ERROR" && ($4 ~ /mgcv/ || $4 ~ /gamlss/ || $4 ~ /survival/) {printf "  %s\n    %s\n", $4, $10}' "$RES"
            echo "---------------------------------------------------------------"
            {
              echo ""
              echo "### Gate: FAILED (guaranteed-comparator reference coverage)"
              echo ""
              echo "${guaranteed_referr} test(s) backed by a hard-verified reference (mgcv/gamlss/survival) were REF_ERROR. Those references are guaranteed installed, so the lost comparison is a real breakage; 100% coverage is required for them."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          # REFERENCE-COVERAGE FLOOR. REF_ERROR is non-blaming per-test (it is the
          # reference env, not a gam result), but the suite's ENTIRE value is the
          # gam-vs-mature-tool comparison. If the reference environment is broadly
          # broken, almost no comparison actually ran and the suite measured
          # nothing — it must NOT report green merely because the gam side did not
          # crash (the failure mode the #1087 meta-bug warns about). This is an
          # infrastructure failure (tracked #1070/#1071), reported distinctly from
          # a gam-side regression, but it still fails the job: a run cannot be
          # green when more than a quarter of the suite lost its reference.
          if [ "$N" -gt 0 ] && [ $((referr * 4)) -gt "$N" ]; then
            echo ""
            echo "::error::Reference Quality Suite UNTRUSTWORTHY: ${referr}/${N} test(s) lost their reference (>25%); reference environment is broken, so the suite proved almost nothing. Not a gam regression (see #1070/#1071), but the run cannot be green."
            {
              echo ""
              echo "### Gate: FAILED (reference coverage)"
              echo ""
              echo "${referr}/${N} tests were REF_ERROR (>25%). The reference R/Python environment is broken; the gam-vs-reference comparison did not run for most of the suite, so a green result here would be meaningless."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Gate: PASSED — every test met its quality bar; guaranteed-comparator reference coverage 100% (mgcv/gamlss/survival REF_ERROR=0); optional-reference REF_ERROR=${referr}/${N} within the 25% floor."
          { echo ""; echo "### Gate: PASSED"; } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full quality report (always — survives timeout/cancel)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-results
          # The WHOLE report dir: rich un-truncated TSV + JSONL + every per-test
          # stdout/stderr log. "Everything that happened", not just the headlines.
          path: /tmp/quality-report
          if-no-files-found: ignore
