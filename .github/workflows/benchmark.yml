name: Benchmark Suite

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

concurrency:
  group: benchmark-suite-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  CARGO_TERM_COLOR: always
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  R_LIBS_USER: ${{ github.workspace }}/.r-lib
  BENCH_R_VERSION: "4.4.3"
  BENCH_RUNTIME_CACHE_VERSION: v3

jobs:
  prepare:
    name: Prepare benchmark matrix
    runs-on: ubuntu-latest
    outputs:
      parallel_matrix: ${{ steps.matrix.outputs.parallel_matrix }}
      parallel_count: ${{ steps.matrix.outputs.parallel_count }}
      serial_matrix: ${{ steps.matrix.outputs.serial_matrix }}
      serial_count: ${{ steps.matrix.outputs.serial_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps for preflight
        # The two preflight steps below load bench/run_suite.py via
        # importlib, which top-level imports numpy and pandas (and pulls in
        # bench/_run_suite_*.py helpers that import the same two). Neither
        # scikit-learn nor lifelines is referenced anywhere on the
        # preflight code path now that 29a56c5 routed validation through
        # the pure-Python validate_scenario_schema dispatcher instead of
        # invoking the dataset loaders. lifelines drags in autograd-gamma,
        # an sdist-only package whose build is fragile across pip/
        # setuptools versions — installing it here just to immediately not
        # use it widens the failure surface of the matrix-prepare job for
        # no benefit.
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install numpy pandas

      - name: Preflight scenario schemas
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/workflow_tasks.py validate_schemas

      - name: Preflight geo_subpop16 simulation
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/workflow_tasks.py validate_geo_subpop

      - name: Build scenario matrix
        id: matrix
        shell: bash
        run: |
          python3 .github/scripts/workflow_tasks.py build_matrix

  bootstrap-runtime:
    name: Bootstrap benchmark runtime
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # #1458: full history so build.rs author gate resolves real last editor, not HEAD

      - name: Restore shared runtime cache
        id: runtime-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            bench/runtime/pydeps
            bench/runtime/r-lib
          key: ${{ runner.os }}-bench-runtime-${{ env.BENCH_RUNTIME_CACHE_VERSION }}-${{ hashFiles('.github/actions/bench-setup/action.yml', '.github/workflows/benchmark.yml') }}
          restore-keys: |
            ${{ runner.os }}-bench-runtime-${{ env.BENCH_RUNTIME_CACHE_VERSION }}-

      - name: Shared benchmark setup (cached)
        if: ${{ steps.runtime-cache.outputs.cache-hit != 'true' }}
        uses: ./.github/actions/bench-setup
        with:
          install-runtime-deps: "true"
          r-version: ${{ env.BENCH_R_VERSION }}

      # `Verify staged R library is complete` below shells out to Rscript
      # unconditionally, but `bench-setup` (the only step that installs R)
      # is gated on a cache miss. On every cache hit we therefore have to
      # bring R up ourselves; without this the verify step fails with
      # `Rscript: command not found` and the whole bootstrap job dies. The
      # r-lib toolcache makes the second install a fast no-op when
      # `bench-setup` already ran in the same job.
      - name: Set up R for runtime verification
        uses: ./.github/actions/setup-bench-r
        with:
          r-version: ${{ env.BENCH_R_VERSION }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build shared runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bench/runtime
          if [ "${{ steps.runtime-cache.outputs.cache-hit }}" != "true" ]; then
            mkdir -p bench/runtime/pydeps bench/runtime/r-lib
            if [ ! -d "${R_LIBS_USER}" ]; then
              echo "::error title=Missing R library::R_LIBS_USER=${R_LIBS_USER} does not exist after bench-setup; cannot stage R packages for shards."
              exit 1
            fi
            # Hard-fail on copy errors: prior `|| true` here swallowed
            # partial-copy failures and shipped a runtime artifact that
            # was missing R packages (gamboostLSS, mboost, ...) into the
            # bench shards, where every scenario then died on
            # `library(gamboostLSS)`.
            cp -a "${R_LIBS_USER}/." bench/runtime/r-lib/
            python3 -m pip install --upgrade pip setuptools wheel
            python3 -m pip install --target bench/runtime/pydeps numpy pandas scikit-learn lifelines scikit-survival xgboost matplotlib
          fi
          cargo build --release -p gam-cli
          cp target/release/gam bench/runtime/gam
          chmod +x bench/runtime/gam
          # Build the gamfit._rust PyO3 extension that bench/run_suite.py
          # loads. We use `maturin build` rather than `maturin develop`
          # because maturin 1.x's develop subcommand requires an active
          # virtualenv (the GHA hosted runner's system python is not
          # inside one), which fails the whole bootstrap step with
          # "Couldn't find a virtualenv or conda environment". `build`
          # has no such requirement; we then crack open the produced
          # wheel and drop the compiled extension into the source-tree
          # `gamfit/` so each shard ships through the same shared
          # runtime artifact as before.
          python3 -m pip install --upgrade 'maturin>=1.7,<2'
          rm -rf dist
          maturin build --release -i python3 -o dist
          python3 .github/scripts/workflow_tasks.py extract_maturin_wheel
          # Ship the freshly-built extension through the shared runtime
          # artifact so each shard does not have to recompile it.
          cp gamfit/_rust*.so bench/runtime/

      - name: Verify staged R library is complete
        shell: bash
        env:
          STAGED_R_LIB: ${{ github.workspace }}/bench/runtime/r-lib
        run: |
          set -euo pipefail
          # Run the same `library(...)` smoke check the shards run, but
          # do it here, ONCE, against the staged `bench/runtime/r-lib` so
          # a missing R package fails the bootstrap (and refuses to save
          # an incomplete cache or upload an incomplete artifact) instead
          # of fanning the failure out to every shard. Restricting
          # `.libPaths` to the staged tree (rather than just adding it
          # to the search) is important: setup-r leaves the installed
          # `/home/runner/work/_temp/Library` tree visible to this job,
          # which would mask a missing package in the staged tree.
          STAGED_R_LIB="${STAGED_R_LIB}" Rscript -e '
            staged <- Sys.getenv("STAGED_R_LIB")
            stopifnot(nzchar(staged))
            .libPaths(staged)
            required <- c("mgcv","jsonlite","survival","glmnet","gamlss",
                          "gamlss.dist","gamboostLSS","mboost","bamlss","brms")
            installed <- rownames(installed.packages(lib.loc = staged))
            cat("staged lib: ", staged, "\n",
                "staged pkgs: ", length(installed), "\n", sep = "")
            missing <- setdiff(required, installed)
            if (length(missing) > 0L) {
              stop("staged R lib is missing required packages: ",
                   paste(missing, collapse = ", "))
            }
            for (pkg in required) {
              if (!isTRUE(requireNamespace(pkg, quietly = TRUE))) {
                stop("staged R lib has unloadable package: ", pkg)
              }
            }
            cat("staged R lib OK; all required packages loadable\n")
          '

      - name: Save shared runtime cache
        if: ${{ steps.runtime-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            bench/runtime/pydeps
            bench/runtime/r-lib
          key: ${{ steps.runtime-cache.outputs.cache-primary-key }}

      - name: Upload shared runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-runtime
          path: bench/runtime
          if-no-files-found: error

  bench-shard:
    name: Bench ${{ matrix.scenario }}
    needs:
      - prepare
      - bootstrap-runtime
    if: ${{ needs.prepare.outputs.parallel_count != '0' }}
    runs-on: ubuntu-latest
    # GH ceiling is a safety net only — the bench command is wrapped in
    # GNU `timeout` set a few minutes shorter so a timeout produces a
    # workflow `failure` (not `cancelled`). See "running benchmark shard"
    # below.
    #
    # #1390: a few nightly scenarios run the brms MCMC contender (full
    # Bayesian sampling, 4 chains x 2000 iter per CV fold). On the larger
    # daily-demand panels the five serial folds alone overran the default 42m
    # budget, so the GNU `timeout` killed the whole shard (exit 124) AFTER gam
    # had finished — discarding every result with no per-fold attribution. The
    # GH ceiling is therefore set high enough to cover the heavy-MCMC path; the
    # actual per-scenario budget is enforced by the scenario-aware GNU
    # `timeout` computed in "Run scenario shard" below, so light scenarios
    # still fail fast at ~42m.
    timeout-minutes: 150
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJSON(needs.prepare.outputs.parallel_matrix) }}
    env:
      BENCH_CI_PROFILE: ${{ github.event_name == 'schedule' && 'full' || 'lean' }}
      BENCH_RAYON_THREADS: "4"
      BENCH_BLAS_THREADS: "1"
      BENCH_CMD_TIMEOUT_SEC: "10800"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # #1458: full history so build.rs author gate resolves real last editor, not HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up R
        uses: ./.github/actions/setup-bench-r
        with:
          r-version: ${{ env.BENCH_R_VERSION }}

      - name: Download shared runtime
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 .github/scripts/workflow_tasks.py download_artifacts bench-runtime bench/runtime

      - name: Install gamfit Rust extension into source tree
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          installed=0
          for so in bench/runtime/_rust*.so; do
            cp "$so" "gamfit/$(basename "$so")"
            installed=$((installed + 1))
          done
          if [ "${installed}" -eq 0 ]; then
            echo "::error title=Missing gamfit extension::No _rust*.so in bench-runtime artifact (bootstrap-runtime did not build gamfit._rust)"
            exit 1
          fi
          ls -l gamfit/_rust*.so

      - name: Run scenario shard
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/bench/runtime/pydeps
          R_LIBS_USER: ${{ github.workspace }}/bench/runtime/r-lib
          BENCH_GAM_BIN: ${{ github.workspace }}/bench/runtime/gam
        run: |
          set -euo pipefail
          echo "== Benchmark shard diagnostics =="
          echo "pwd: $(pwd)"
          echo "scenario: ${{ matrix.scenario }}"
          echo "python: $(command -v python3)"
          python3 --version
          echo "Rscript: $(command -v Rscript)"
          Rscript --version
          echo "BENCH_GAM_BIN=${BENCH_GAM_BIN}"
          echo "BENCH_CI_PROFILE=${BENCH_CI_PROFILE}"
          echo "BENCH_RAYON_THREADS=${BENCH_RAYON_THREADS}"
          echo "BENCH_BLAS_THREADS=${BENCH_BLAS_THREADS}"
          echo "BENCH_CMD_TIMEOUT_SEC=${BENCH_CMD_TIMEOUT_SEC}"
          echo "PYTHONPATH=${PYTHONPATH}"
          echo "R_LIBS_USER=${R_LIBS_USER}"
          echo "bench/runtime tree:"
          ls -la bench/runtime || true
          ls -la bench/runtime/pydeps | sed -n '1,40p' || true
          ls -la bench/runtime/r-lib | sed -n '1,40p' || true
          echo "gam binary before chmod:"
          ls -l "${BENCH_GAM_BIN}" || true
          file "${BENCH_GAM_BIN}" || true
          chmod +x "${BENCH_GAM_BIN}" || true
          echo "gam binary after chmod:"
          ls -l "${BENCH_GAM_BIN}" || true
          file "${BENCH_GAM_BIN}" || true
          test -x "${BENCH_GAM_BIN}"
          echo "smoke-import python deps"
          python3 .github/scripts/workflow_tasks.py check_python_deps
          echo "smoke-load R deps"
          Rscript -e 'library(mgcv); library(jsonlite); library(survival); library(glmnet); library(gamlss); library(gamlss.dist); library(gamboostLSS); library(mboost); library(bamlss); library(brms); cat("R deps ok\n")'
          mkdir -p bench/results-shards
          echo "running benchmark shard..."
          # Wrap the bench command in GNU timeout so an over-budget shard
          # FAILS (exit 124 / 137) rather than being cancelled by the GH
          # job-level timeout-minutes ceiling. We set the GNU timeout
          # several minutes shorter than that ceiling so the shard exits
          # cleanly before GH would auto-cancel; the explicit `exit 1`
          # below ensures the conclusion is `failure`, not `cancelled`.
          #
          # #1390: the budget is scenario-aware. Most scenarios keep the 42m
          # default so a genuinely slow/hung shard still fails fast. The
          # heavy-MCMC scenarios below run the brms contender (full Bayesian
          # sampling, 4 chains x 2000 iter per CV fold) on large daily-demand
          # panels, whose five serial folds alone exceed 42m; they get a larger
          # explicit budget (paired with the higher GH `timeout-minutes` and
          # the per-fold BENCH_BRMS_FOLD_TIMEOUT_SEC cap in
          # bench/_run_suite_external.py) so the full CV completes within budget
          # instead of being killed mid-MCMC. This raises coverage for those
          # scenarios; it does not drop any.
          case "${{ matrix.scenario }}" in
            us48_demand_31day)
              BENCH_SHARD_TIMEOUT="${BENCH_SHARD_TIMEOUT:-145m}"
              ;;
            *)
              BENCH_SHARD_TIMEOUT="${BENCH_SHARD_TIMEOUT:-42m}"
              ;;
          esac
          set +e
          timeout --signal=TERM --kill-after=30s "${BENCH_SHARD_TIMEOUT}" \
            python3 bench/run_suite.py \
              --scenarios bench/scenarios.json \
              --scenario-name "${{ matrix.scenario }}" \
              --out "bench/results-shards/${{ matrix.scenario }}.json"
          rc=$?
          set -e
          if [ "${rc}" -ne 0 ]; then
            if [ "${rc}" = "124" ] || [ "${rc}" = "137" ]; then
              echo "::error title=Benchmark shard timeout::Scenario ${{ matrix.scenario }} exceeded ${BENCH_SHARD_TIMEOUT} wall budget (exit ${rc}); failing the job rather than being cancelled by the GH job-level ceiling."
            else
              echo "::error title=Benchmark shard error::Scenario ${{ matrix.scenario }} failed with exit ${rc}."
            fi
            exit 1
          fi
          echo "shard output:"
          ls -l "bench/results-shards/${{ matrix.scenario }}.json"

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.scenario }}
          path: |
            bench/results-shards/${{ matrix.scenario }}.json
            bench/results-shards/figures/${{ matrix.scenario }}.png
          if-no-files-found: error

  bench-shard-serial:
    name: Bench ${{ matrix.scenario }} (serial)
    needs:
      - prepare
      - bootstrap-runtime
    if: ${{ needs.prepare.outputs.serial_count != '0' }}
    runs-on: ubuntu-24.04
    # GH ceiling is a safety net only — the bench command is wrapped in
    # GNU `timeout` set a few minutes shorter so a timeout produces a
    # workflow `failure` (not `cancelled`). See "running benchmark shard"
    # below.
    timeout-minutes: 47
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.prepare.outputs.serial_matrix) }}
    env:
      BENCH_CI_PROFILE: ${{ github.event_name == 'schedule' && 'full' || 'lean' }}
      BENCH_RAYON_THREADS: "4"
      BENCH_BLAS_THREADS: "1"
      BENCH_CMD_TIMEOUT_SEC: "10800"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # #1458: full history so build.rs author gate resolves real last editor, not HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up R
        uses: ./.github/actions/setup-bench-r
        with:
          r-version: ${{ env.BENCH_R_VERSION }}

      - name: Download shared runtime
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 .github/scripts/workflow_tasks.py download_artifacts bench-runtime bench/runtime

      - name: Install gamfit Rust extension into source tree
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          installed=0
          for so in bench/runtime/_rust*.so; do
            cp "$so" "gamfit/$(basename "$so")"
            installed=$((installed + 1))
          done
          if [ "${installed}" -eq 0 ]; then
            echo "::error title=Missing gamfit extension::No _rust*.so in bench-runtime artifact (bootstrap-runtime did not build gamfit._rust)"
            exit 1
          fi
          ls -l gamfit/_rust*.so

      - name: Run scenario shard
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/bench/runtime/pydeps
          R_LIBS_USER: ${{ github.workspace }}/bench/runtime/r-lib
          BENCH_GAM_BIN: ${{ github.workspace }}/bench/runtime/gam
        run: |
          set -euo pipefail
          echo "== Benchmark shard diagnostics =="
          echo "pwd: $(pwd)"
          echo "scenario: ${{ matrix.scenario }}"
          echo "python: $(command -v python3)"
          python3 --version
          echo "Rscript: $(command -v Rscript)"
          Rscript --version
          echo "BENCH_GAM_BIN=${BENCH_GAM_BIN}"
          echo "BENCH_CI_PROFILE=${BENCH_CI_PROFILE}"
          echo "BENCH_RAYON_THREADS=${BENCH_RAYON_THREADS}"
          echo "BENCH_BLAS_THREADS=${BENCH_BLAS_THREADS}"
          echo "BENCH_CMD_TIMEOUT_SEC=${BENCH_CMD_TIMEOUT_SEC}"
          echo "PYTHONPATH=${PYTHONPATH}"
          echo "R_LIBS_USER=${R_LIBS_USER}"
          echo "bench/runtime tree:"
          ls -la bench/runtime || true
          ls -la bench/runtime/pydeps | sed -n '1,40p' || true
          ls -la bench/runtime/r-lib | sed -n '1,40p' || true
          echo "gam binary before chmod:"
          ls -l "${BENCH_GAM_BIN}" || true
          file "${BENCH_GAM_BIN}" || true
          chmod +x "${BENCH_GAM_BIN}" || true
          echo "gam binary after chmod:"
          ls -l "${BENCH_GAM_BIN}" || true
          file "${BENCH_GAM_BIN}" || true
          test -x "${BENCH_GAM_BIN}"
          echo "smoke-import python deps"
          python3 .github/scripts/workflow_tasks.py check_python_deps
          echo "smoke-load R deps"
          Rscript -e 'library(mgcv); library(jsonlite); library(survival); library(glmnet); library(gamlss); library(gamlss.dist); library(gamboostLSS); library(mboost); library(bamlss); library(brms); cat("R deps ok\n")'
          mkdir -p bench/results-shards
          echo "running benchmark shard..."
          # Wrap the bench command in GNU timeout so an over-budget shard
          # FAILS (exit 124 / 137) rather than being cancelled by the GH
          # job-level timeout-minutes ceiling. We set the GNU timeout
          # several minutes shorter than that ceiling so the shard exits
          # cleanly before GH would auto-cancel; the explicit `exit 1`
          # below ensures the conclusion is `failure`, not `cancelled`.
          #
          # #1390: the budget is scenario-aware. Most scenarios keep the 42m
          # default so a genuinely slow/hung shard still fails fast. The
          # heavy-MCMC scenarios below run the brms contender (full Bayesian
          # sampling, 4 chains x 2000 iter per CV fold) on large daily-demand
          # panels, whose five serial folds alone exceed 42m; they get a larger
          # explicit budget (paired with the higher GH `timeout-minutes` and
          # the per-fold BENCH_BRMS_FOLD_TIMEOUT_SEC cap in
          # bench/_run_suite_external.py) so the full CV completes within budget
          # instead of being killed mid-MCMC. This raises coverage for those
          # scenarios; it does not drop any.
          case "${{ matrix.scenario }}" in
            us48_demand_31day)
              BENCH_SHARD_TIMEOUT="${BENCH_SHARD_TIMEOUT:-145m}"
              ;;
            *)
              BENCH_SHARD_TIMEOUT="${BENCH_SHARD_TIMEOUT:-42m}"
              ;;
          esac
          set +e
          timeout --signal=TERM --kill-after=30s "${BENCH_SHARD_TIMEOUT}" \
            python3 bench/run_suite.py \
              --scenarios bench/scenarios.json \
              --scenario-name "${{ matrix.scenario }}" \
              --out "bench/results-shards/${{ matrix.scenario }}.json"
          rc=$?
          set -e
          if [ "${rc}" -ne 0 ]; then
            if [ "${rc}" = "124" ] || [ "${rc}" = "137" ]; then
              echo "::error title=Benchmark shard timeout::Scenario ${{ matrix.scenario }} exceeded ${BENCH_SHARD_TIMEOUT} wall budget (exit ${rc}); failing the job rather than being cancelled by the GH job-level ceiling."
            else
              echo "::error title=Benchmark shard error::Scenario ${{ matrix.scenario }} failed with exit ${rc}."
            fi
            exit 1
          fi
          echo "shard output:"
          ls -l "bench/results-shards/${{ matrix.scenario }}.json"

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.scenario }}
          path: |
            bench/results-shards/${{ matrix.scenario }}.json
            bench/results-shards/figures/${{ matrix.scenario }}.png
          if-no-files-found: error

  aggregate:
    name: Aggregate benchmark results
    needs:
      - bench-shard
      - bench-shard-serial
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout for figure generation
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # #1458: full history so build.rs author gate resolves real last editor, not HEAD
          sparse-checkout: bench

      - name: Download all shard artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 .github/scripts/workflow_tasks.py download_artifacts bench_ bench/artifacts

      - name: Merge shard JSON outputs
        shell: bash
        run: |
          python3 .github/scripts/workflow_tasks.py format_results

      - name: Upload merged nightly results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-nightly
          path: bench/results.nightly.json
          if-no-files-found: error

      - name: Generate merged figures
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --quiet matplotlib numpy pandas
          python3 bench/generate_figures.py bench/results.nightly.json bench/figures bench/figures.zip

      - name: Upload benchmark figures
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-figures
          path: bench/figures.zip
          if-no-files-found: warn
