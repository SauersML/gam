name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # #1458: full history so build.rs author gate resolves real last editor, not HEAD

      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly
          override: true

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Verify tag, package versions, and changelog agree
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"           # e.g. v0.3.78
          TAG_VER="${TAG#v}"                         # e.g. 0.3.78
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          PYPROJECT_VERSION=$(grep '^version' pyproject.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG_VER" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VER) does not match Cargo.toml gam version ($CARGO_VERSION)"
            exit 1
          fi
          # The top changelog entry must name this tag and both package versions,
          # so a release cannot ship without an updated, accurate CHANGELOG.md.
          TOP=$(grep -m1 '^## ' CHANGELOG.md || true)
          echo "Top changelog entry: $TOP"
          for needle in "$TAG" "gam $CARGO_VERSION" "gamfit $PYPROJECT_VERSION"; do
            case "$TOP" in
              *"$needle"*) : ;;
              *) echo "::error::Top CHANGELOG.md entry must mention '$needle' (got: $TOP)"; exit 1 ;;
            esac
          done

      - name: Extract release notes from CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          # Emit the first "## " section (the entry for this release).
          awk '/^## /{n++} n==1{print} n==2{exit}' CHANGELOG.md > RELEASE_NOTES.md
          echo "----- release notes -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release from changelog
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md --verify-tag
          fi

      - name: Publish the gam crate family to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_KEY }}
        run: |
          set -uo pipefail
          # Since #1521 split the monolith, `gam` path-depends on the
          # foundation crates (gam-runtime/gam-data/gam-math/gam-spec/
          # gam-linalg/gam-problem), so publishing `gam` alone fails
          # ("no matching package named `gam-data` found"). crates.io
          # requires every path dependency of a published crate to resolve
          # to a real registry version, so the family must be published
          # together, in dependency order, BEFORE `gam`. The order below is
          # topological: foundations with no intra-family deps first, then
          # gam-linalg (-> gam-runtime), gam-problem (-> gam-linalg), gam.
          # publish=false crates (gam-cli/gam-inference/gam-predict/
          # gam-pyffi) are not in `gam`'s normal-dependency closure
          # (gam-predict is a dev-dependency, stripped on publish) and are
          # intentionally omitted.
          publish_one() {
            local crate="$1"
            local out status
            out=$(cargo publish -p "$crate" --no-verify --allow-dirty 2>&1); status=$?
            echo "$out"
            [ "$status" -eq 0 ] && { echo "published $crate"; return 0; }
            # Idempotent: a mid-sequence retry skips already-published
            # crates (crates.io versions are immutable).
            echo "$out" | grep -qiE 'already (exists|uploaded)|already been (published|uploaded)|crate version .* is already' \
              && { echo "$crate already on crates.io — skipping"; return 0; }
            echo "::error::failed to publish $crate"; return 1
          }
          for crate in gam-runtime gam-data gam-math gam-spec gam-linalg gam-problem gam; do
            publish_one "$crate" || exit 1
          done
