name: Warm wheel (rolling main)

# PERMANENT WARM-START (#2231/#2234 campaign): every push to main rebuilds the
# x86_64 manylinux wheel and publishes it to the rolling `wheel-latest`
# pre-release, so ANY box (MSI node, cloud GPU, laptop) warm-starts gamfit with
# one line and ZERO local Rust builds:
#
#   pip install "$(curl -s https://api.github.com/repos/SauersML/gam/releases/tags/wheel-latest \
#     | python3 -c 'import json,sys; print([a["browser_download_url"] for a in json.load(sys.stdin)["assets"] if a["name"].endswith(".whl")][0])')"
#
# or simply:
#   gh release download wheel-latest -R SauersML/gam -p '*.whl' && pip install ./gamfit-*.whl
#
# Design notes:
# - `concurrency: cancel-in-progress` makes this "latest push wins" — the fleet
#   pushes to main continuously, and only the newest wheel matters.
# - This is deliberately x86_64-manylinux-only and NEVER publishes to PyPI: the
#   full multi-platform PyPI matrix stays in pypi-wheels.yml (version-gated).
#   This channel is the fleet's iteration artifact, not a release.
# - rust-cache keeps the compile warm INSIDE GHA; the wheel is what carries the
#   warmth OUT to boxes that have no cargo cache at all.

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'gamfit/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - 'build.rs'
  workflow_dispatch:

concurrency:
  group: warm-wheel
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  wheel:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: warm-wheel
          cache-on-failure: true
      - name: Build manylinux x86_64 wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: >-
            --release
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
          manylinux: auto
          sccache: true
        env:
          # Iteration profile: the warm wheel trades ~10% runtime for 2-4x
          # faster rebuilds (same knobs the MSI warm builder uses).
          CARGO_PROFILE_RELEASE_LTO: "off"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
      - name: Publish to the rolling wheel-latest pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release view wheel-latest -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create wheel-latest -R "$GITHUB_REPOSITORY" --prerelease \
              --title "Rolling main wheel" \
              --notes "Continuously rebuilt x86_64 manylinux wheel at main HEAD. Not a release — the fleet's warm-start artifact."
          gh release upload wheel-latest dist/*.whl -R "$GITHUB_REPOSITORY" --clobber
          gh release edit wheel-latest -R "$GITHUB_REPOSITORY" \
            --notes "Continuously rebuilt x86_64 manylinux wheel at main HEAD. Built from ${GITHUB_SHA} ($(date -u +%FT%TZ)). Not a release — the fleet's warm-start artifact."
