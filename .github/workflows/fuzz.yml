name: Fuzz vs mgcv

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Fuzz vs mgcv
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # #1458: full history so build.rs author gate resolves real last editor, not HEAD

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p gam-cli

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install --upgrade pip "maturin>=1.7,<2" numpy pandas scikit-learn lifelines

      - name: Build and install gamfit (maturin)
        # `bench/fuzz_vs_mgcv.py` imports the project's own `gamfit` Python
        # package (`gamfit._binding.rust_module`) for its scoring helpers, so
        # the fuzzer aborts at `ModuleNotFoundError: No module named 'gamfit'`
        # unless the maturin-built wheel is installed alongside the CLI build
        # that powers `_ensure_rust_binary`. Build into `dist/` and install
        # the wheel directly so the fuzzer can `import gamfit`.
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          maturin build --release -i python3 -o dist
          pip install --force-reinstall dist/*.whl

      - name: Set up R
        uses: ./.github/actions/setup-bench-r
        with:
          r-version: "4.4.3"

      - name: Install R packages
        run: Rscript -e 'install.packages(c("mgcv","jsonlite"), repos="https://cloud.r-project.org", Ncpus=max(1L, parallel::detectCores()-1L))'

      - name: Run fuzzer
        run: |
          set -o pipefail
          python bench/fuzz_vs_mgcv.py \
            --n-trials 100 \
            --top 30 \
            --rust-timeout 60 \
            --r-timeout 60 \
            --max-scenario-cost 200000 \
            --max-total-seconds 3300 \
            2>&1 | tee fuzz_output.txt

      - name: Upload fuzz results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-results
          path: |
            bench/fuzz_results.jsonl
            fuzz_output.txt
          if-no-files-found: warn
