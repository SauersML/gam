name: Fuzz vs mgcv

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  CARGO_TERM_COLOR: always
  GAM_SKIP_LINT_CHECKS: "1"
  # Enable per-iteration REML/PIRLS diagnostic logs so CI stderr shows
  # where timeouts are spinning. Threshold-gated trace/factorize logs
  # (>100ms) also emit without these vars, but the per-iter beacons need
  # them. See solver/visualizer.rs::{pirls,reml}_info_enabled.
  GAM_LOG_PIRLS_INFO: "1"
  GAM_LOG_REML_INFO: "1"
  # Verbose data-loading instrumentation: emits per-substage timings
  # (delim_open+headers, delim_stream+infer, delim_finalize_schema,
  # delim_assemble_array2, ffi_string_records, ffi_encode_inferred, parquet_*)
  # below the default 100ms threshold. See solver/visualizer.rs::data_info_enabled.
  GAM_LOG_DATA_INFO: "1"
  RUST_LOG: "info"

jobs:
  fuzz:
    name: Fuzz vs mgcv
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --bin gam

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install numpy pandas scikit-learn lifelines

      - name: Set up R
        uses: ./.github/actions/setup-bench-r
        with:
          r-version: "4.4.3"

      - name: Install R packages
        run: Rscript -e 'install.packages(c("mgcv","jsonlite"), repos="https://cloud.r-project.org", Ncpus=max(1L, parallel::detectCores()-1L))'

      - name: Run fuzzer
        run: |
          set -o pipefail
          python bench/fuzz_vs_mgcv.py \
            --n-trials 100 \
            --top 30 \
            --rust-timeout 60 \
            --r-timeout 60 \
            --max-total-seconds 3300 \
            2>&1 | tee fuzz_output.txt

      - name: Upload fuzz results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-results
          path: |
            bench/fuzz_results.jsonl
            fuzz_output.txt
          if-no-files-found: warn
