name: Validate One

# Minimal, single-job, on-demand validation for the issue-fixer agents.
#
# WHY THIS EXISTS
# ---------------
# The full `Rust CI` (test.yml) is an 11+-job fan-out (build archive + N test
# shards + pyffi + aggregate + python-tests). When the runner pool is saturated
# by matrix jobs (Publish wheels, Build and Release All, the 6h Claude Fixer),
# that whole graph sits QUEUED for a long time, so a fixer waiting to confirm a
# one-line fix gets no feedback. This workflow is ONE ubuntu-latest job with a
# tiny footprint that schedules into any small runner gap and fails fast. Rust
# filters consume the exact-SHA nextest archive produced by test.yml: Validate
# One NEVER rebuilds or relinks Rust tests. If no exact archive exists, it fails
# immediately and tells the caller to dispatch Rust CI.
#
# Python and torch filters consume the exact-SHA manylinux wheel produced by
# wheel-nightly.yml. They run from runner.temp so the checked-out source package
# cannot shadow the installed wheel. Validate One therefore compiles nothing:
# Rust uses a nextest archive; Python uses the rolling runtime artifact.
#
# TORCH PATH (opt-in): torch is NOT installed by any CI workflow, so the
# tests/torch/ suite (#1890/#1891/#1893/#1939/#1942/#2011/#2015/#2021/#2022/#2023
# cluster) has no validation path. Set `torch_filter` to pip-install the CPU
# torch wheel and run tests/torch. It is OFF by default (the wheel is a heavy
# ~200MB download) so the normal fast path stays lean — only torch-cluster
# validations pay the cost.

on:
  workflow_dispatch:
    inputs:
      rust_filter:
        description: "Rust test-name substring(s), whitespace-separated. Empty = skip Rust."
        default: ""
        required: false
      rust_package:
        description: "Optional Cargo package for focused Rust tests. Empty = archived workspace."
        default: ""
        required: false
      py_filter:
        description: "pytest -k expression. Empty = skip Python."
        default: ""
        required: false
      torch_filter:
        description: "pytest -k expr over tests/torch (pip-installs CPU torch). Empty = skip torch."
        default: ""
        required: false
      issue:
        description: "Issue number, for labeling / concurrency keying only."
        default: ""
        required: false

# Key concurrency on the issue so two DIFFERENT issues validating at once do not
# cancel each other; a newer dispatch for the SAME issue supersedes the older.
concurrency:
  group: validate-one-${{ github.event.inputs.issue }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate one (issue ${{ github.event.inputs.issue }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install cargo-nextest
        if: ${{ github.event.inputs.rust_filter != '' }}
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      # The prebuilt gam-pyffi test binary embeds Python, and some tests exercise
      # the NumPy C API. Establish that runtime interpreter explicitly; the
      # Python/torch paths below reuse it.
      - name: Set up Python 3.11
        if: ${{ (github.event.inputs.rust_filter != '' && github.event.inputs.rust_package == 'gam-pyffi') || github.event.inputs.py_filter != '' || github.event.inputs.torch_filter != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Provide NumPy to embedded gam-pyffi tests
        if: ${{ github.event.inputs.rust_filter != '' && github.event.inputs.rust_package == 'gam-pyffi' }}
        run: |
          python -m pip install --upgrade "numpy<2"
          python -c "import numpy; print('numpy', numpy.__version__, numpy.get_include())"

      # ---- Python runtime: exact-SHA prebuilt wheel only ------------------
      - name: Download and install exact-SHA rolling wheel
        if: ${{ github.event.inputs.py_filter != '' || github.event.inputs.torch_filter != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id=$(gh run list --repo "$GITHUB_REPOSITORY" \
            --workflow wheel-nightly.yml \
            --commit "$GITHUB_SHA" \
            --limit 20 \
            --json databaseId,conclusion \
            --jq 'map(select(.conclusion == "success"))[0].databaseId // empty')
          if [[ -z "$run_id" ]]; then
            echo "::error::No successful rolling-wheel run exists for exact commit ${GITHUB_SHA}. Wait for wheel-nightly.yml; Validate One never builds an extension."
            exit 1
          fi
          runtime_sha=$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" \
            --json headSha --jq .headSha)
          if [[ "$runtime_sha" != "$GITHUB_SHA" ]]; then
            echo "::error::Rolling-wheel provenance mismatch: requested ${GITHUB_SHA}, run ${run_id} is ${runtime_sha}."
            exit 1
          fi
          artifact_name="gamfit-runtime-${GITHUB_SHA}"
          gh run download "$run_id" --repo "$GITHUB_REPOSITORY" \
            --name "$artifact_name" --dir python-runtime
          grep -Fx "commit=${GITHUB_SHA}" python-runtime/RUNTIME_PROVENANCE.txt
          wheel=$(find python-runtime -maxdepth 1 -type f -name 'gamfit-*.whl' -print -quit)
          if [[ -z "$wheel" || ! -s "$wheel" ]]; then
            echo "::error::Runtime artifact ${artifact_name} contains no non-empty gamfit wheel."
            exit 1
          fi
          python -m pip install --force-reinstall "$wheel"
          (
            cd "$RUNNER_TEMP"
            python -c "import gamfit, gamfit._rust; print('exact runtime import ok:', gamfit.__version__)"
          )

      # ---- Rust path: exact-SHA prebuilt archive only ----------------------
      - name: Download exact-SHA Rust test archive
        if: ${{ github.event.inputs.rust_filter != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUST_PACKAGE: ${{ github.event.inputs.rust_package }}
        run: |
          set -euo pipefail
          archive_name=nx-archive
          archive_file=nx.tar.zst
          if [[ "$RUST_PACKAGE" == "gam-pyffi" ]]; then
            archive_name=nx-pyffi-archive
            archive_file=nx-pyffi.tar.zst
          fi

          # Find a Rust CI run for THIS commit only. It may still be running:
          # its build job uploads the archive before the long run shards finish.
          run_id=$(gh run list --repo "$GITHUB_REPOSITORY" \
            --workflow test.yml \
            --commit "$GITHUB_SHA" \
            --limit 20 \
            --json databaseId,status,conclusion \
            --jq 'map(select(.status == "in_progress" or .conclusion == "success"))[0].databaseId // empty')
          if [[ -z "$run_id" ]]; then
            echo "::error::No Rust CI run exists for exact commit ${GITHUB_SHA}. Dispatch Rust CI for this SHA; Validate One never performs a source-build fallback."
            exit 1
          fi
          archive_sha=$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" \
            --json headSha --jq .headSha)
          if [[ "$archive_sha" != "$GITHUB_SHA" ]]; then
            echo "::error::Rust archive provenance mismatch: requested ${GITHUB_SHA}, run ${run_id} is ${archive_sha}."
            exit 1
          fi
          if ! gh run download "$run_id" --repo "$GITHUB_REPOSITORY" \
            --name "$archive_name" --dir rust-archive; then
            echo "::error::Rust CI run ${run_id} has not produced ${archive_name} for ${GITHUB_SHA}. Wait for its build job; no source-build fallback is permitted."
            exit 1
          fi
          test -s "rust-archive/${archive_file}"
          printf 'run_id=%s\ncommit=%s\nartifact=%s\n' \
            "$run_id" "$GITHUB_SHA" "$archive_name" \
            | tee rust-archive/PROVENANCE.txt

      - name: Run Rust tests from exact-SHA archive
        if: ${{ github.event.inputs.rust_filter != '' }}
        shell: bash
        env:
          RUST_FILTER: ${{ github.event.inputs.rust_filter }}
          RUST_PACKAGE: ${{ github.event.inputs.rust_package }}
        run: |
          set -euo pipefail
          archive_file=rust-archive/nx.tar.zst
          if [[ "$RUST_PACKAGE" == "gam-pyffi" ]]; then
            archive_file=rust-archive/nx-pyffi.tar.zst
          fi
          if [[ -n "$RUST_PACKAGE" && ! "$RUST_PACKAGE" =~ ^[A-Za-z0-9_-]+$ ]]; then
            echo "::error::rust_package contains unsupported characters: ${RUST_PACKAGE}"
            exit 1
          fi

          # Treat the whitespace-separated input as independent literal
          # substrings. Restrict the alphabet before embedding each literal
          # into nextest's filter expression.
          read -r -a filters <<< "$RUST_FILTER"
          for filter in "${filters[@]}"; do
            if [[ ! "$filter" =~ ^[A-Za-z0-9_:.-]+$ ]]; then
              echo "::error::rust_filter '${filter}' is not a bare Rust test-name substring."
              exit 1
            fi
            expression="test(~${filter})"
            if [[ -n "$RUST_PACKAGE" ]]; then
              expression="package(=${RUST_PACKAGE}) and ${expression}"
            fi

            # Prove the expression selects at least one archived test before
            # execution. Archive list/run perform no compilation or relinking.
            selected=$(cargo nextest list \
              --archive-file "$archive_file" \
              --workspace-remap . \
              -E "$expression" 2>/dev/null | grep -cE '^\s' || true)
            if [[ "${selected:-0}" -eq 0 ]]; then
              echo "::error::rust_filter '${filter}' selected ZERO tests in ${archive_file}."
              exit 1
            fi
            echo "Running ${selected} archived test(s): ${expression}"
            cargo nextest run \
              --archive-file "$archive_file" \
              --workspace-remap . \
              --profile ci --config-file .config/nextest.toml \
              --test-threads 1 \
              -E "$expression"
          done

      - name: Install Python test extras
        if: ${{ github.event.inputs.py_filter != '' || github.event.inputs.torch_filter != '' }}
        run: |
          python -m pip install \
            'pytest>=8' 'numpy>=1.26' 'pandas>=2.0' 'scipy>=1.11' \
            'pyarrow>=14' 'matplotlib>=3.8' 'scikit-learn>=1.4' requests

      - name: Run Python tests (filtered, fail-fast)
        if: ${{ github.event.inputs.py_filter != '' }}
        working-directory: ${{ runner.temp }}
        run: python -m pytest "${{ github.workspace }}/tests/" -k "${{ github.event.inputs.py_filter }}" -p no:cacheprovider -x -q --tb=short

      # ---- torch path (opt-in; only when a torch_filter was given) ----------
      - name: Install CPU torch wheel
        if: ${{ github.event.inputs.torch_filter != '' }}
        run: python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run torch tests (filtered, fail-fast)
        if: ${{ github.event.inputs.torch_filter != '' }}
        working-directory: ${{ runner.temp }}
        run: python -m pytest "${{ github.workspace }}/tests/torch" -k "${{ github.event.inputs.torch_filter }}" -p no:cacheprovider -x -q --tb=short

      - name: Guard against an empty request
        if: ${{ github.event.inputs.rust_filter == '' && github.event.inputs.py_filter == '' && github.event.inputs.torch_filter == '' }}
        run: |
          echo "::error::None of rust_filter / py_filter / torch_filter was provided; nothing to validate."
          exit 1
