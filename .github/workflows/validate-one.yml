name: Validate One

# Minimal, single-job, on-demand validation for the issue-fixer agents.
#
# WHY THIS EXISTS
# ---------------
# The full `Rust CI` (test.yml) is an 11+-job fan-out (build archive + N test
# shards + pyffi + aggregate + python-tests). When the runner pool is saturated
# by matrix jobs (Publish wheels, Build and Release All, the 6h Claude Fixer),
# that whole graph sits QUEUED for a long time, so a fixer waiting to confirm a
# one-line fix gets no feedback. This workflow is ONE ubuntu-latest job with a
# tiny footprint that schedules into any small runner gap and fails fast, giving
# a fixer quick per-issue signal. Reserve the full test.yml for a final
# confirmation.
#
# It deliberately mirrors test.yml's `python-tests` job for the Python path
# (Rust 1.93.0, rust-cache, maturin build+wheel-install, the gamfit/_rust .so
# copy that defeats the cwd source-package shadowing) so a pass/fail here means
# the same thing it would in the full suite. sccache is intentionally NOT used
# (test.yml enables it only after a backend reachability probe; here a plain
# Swatinem/rust-cache@v2 keeps builds warm after the first run without the
# reachability hard-fail surface).
#
# TORCH PATH (opt-in): torch is NOT installed by any CI workflow, so the
# tests/torch/ suite (#1890/#1891/#1893/#1939/#1942/#2011/#2015/#2021/#2022/#2023
# cluster) has no validation path. Set `torch_filter` to pip-install the CPU
# torch wheel and run tests/torch. It is OFF by default (the wheel is a heavy
# ~200MB download) so the normal fast path stays lean — only torch-cluster
# validations pay the cost.

on:
  workflow_dispatch:
    inputs:
      rust_filter:
        description: "cargo test name filter(s), whitespace-separated. Empty = skip Rust."
        default: ""
        required: false
      rust_package:
        description: "Optional Cargo package for focused Rust tests. Empty = workspace minus gam-pyffi."
        default: ""
        required: false
      py_filter:
        description: "pytest -k expression. Empty = skip Python."
        default: ""
        required: false
      torch_filter:
        description: "pytest -k expr over tests/torch (pip-installs CPU torch). Empty = skip torch."
        default: ""
        required: false
      issue:
        description: "Issue number, for labeling / concurrency keying only."
        default: ""
        required: false

# Key concurrency on the issue so two DIFFERENT issues validating at once do not
# cancel each other; a newer dispatch for the SAME issue supersedes the older.
concurrency:
  group: validate-one-${{ github.event.inputs.issue }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  validate:
    name: Validate one (issue ${{ github.event.inputs.issue }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # The build.rs human-author gate reads the real last editor of
          # build.rs; a depth-1 clone makes `git log` return HEAD and
          # false-fails every Claude-authored HEAD (#1458). Any cargo build/test
          # below trips that gate, so fetch full history.
          fetch-depth: 0

      - name: Install Rust 1.93.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # ---- Rust path (only when a rust_filter was given) -------------------
      - name: Run Rust tests (filtered)
        if: ${{ github.event.inputs.rust_filter != '' }}
        shell: bash
        env:
          RUST_FILTER: ${{ github.event.inputs.rust_filter }}
          RUST_PACKAGE: ${{ github.event.inputs.rust_package }}
        run: |
          set -euo pipefail
          # `--exclude gam-pyffi`: gam-pyffi's default-on `extension-module`
          # feature tells pyo3 NOT to link libpython (symbols are resolved by the
          # host interpreter at import time), so building its TEST binary here
          # fails at link with `undefined symbol: Py*`. test.yml handles this by
          # archiving the main workspace with `--exclude gam-pyffi` and gam-pyffi
          # separately under `--no-default-features`; mirror the exclusion so the
          # filtered Rust path links for every non-pyffi crate (the Python path
          # below already exercises the built extension for pyffi coverage).
          # Cargo accepts exactly one TESTNAME positional argument.  Treat a
          # whitespace-separated input as a list of independent substring
          # filters instead of forwarding it as several invalid positionals.
          # Array expansion stays quoted, so a filter can never become an option
          # or shell syntax.
          read -r -a filters <<< "$RUST_FILTER"
          for filter in "${filters[@]}"; do
            # Reject nextest filter-expression DSL (gam#2268): plain `cargo test`
            # treats `test(NAME)` as a literal substring, matches zero tests, and
            # exits 0 -> a silent false green. Fail early with a clear message.
            if [[ "$filter" == *"test("* ]]; then
              echo "::error::rust_filter '${filter}' looks like nextest DSL 'test(...)'. validate-one runs plain 'cargo test'; pass a BARE substring (e.g. my_test_name), not test(my_test_name)."
              exit 1
            fi
            if [[ -n "$RUST_PACKAGE" ]]; then
              echo "cargo test -p ${RUST_PACKAGE} -- ${filter}"
              cargo test -p "$RUST_PACKAGE" -- "${filter}" --nocapture 2>&1 | tee cargo_filter_out.log
            else
              echo "cargo test --workspace --exclude gam-pyffi -- ${filter}"
              cargo test --workspace --exclude gam-pyffi -- "${filter}" --nocapture 2>&1 | tee cargo_filter_out.log
            fi
            # False-green guard (gam#2268): a filter that matches zero tests makes
            # cargo exit 0 with nothing run. Require >=1 test actually executed,
            # summing passed+failed across every binary's `test result:` line.
            ran=$(awk '/test result:/ { for (i = 1; i < NF; i++) { if ($(i + 1) == "passed;") p += $i; if ($(i + 1) == "failed;") f += $i } } END { print p + f + 0 }' cargo_filter_out.log)
            if [[ "${ran:-0}" -eq 0 ]]; then
              echo "::error::rust_filter '${filter}' matched ZERO tests (all filtered out) -- this would be a false green. Use a bare substring that matches a real test name."
              exit 1
            fi
            echo "rust_filter '${filter}' executed ${ran} test(s)."
          done

      # ---- Python/torch shared prerequisites (either filter needs the extension) ----
      - name: Set up Python 3.11
        if: ${{ github.event.inputs.py_filter != '' || github.event.inputs.torch_filter != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install maturin
        if: ${{ github.event.inputs.py_filter != '' || github.event.inputs.torch_filter != '' }}
        run: python -m pip install --upgrade pip "maturin>=1.7,<2"

      - name: Build and install gam extension (maturin build + wheel install)
        if: ${{ github.event.inputs.py_filter != '' || github.event.inputs.torch_filter != '' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          maturin build --release -i python3 -o dist
          python -m pip install --force-reinstall dist/*.whl
          # pytest runs from the repo root, where the source ./gamfit/ package
          # shadows the installed wheel on sys.path (cwd searched first). The
          # source tree has no compiled extension, so `import gamfit._rust`
          # fails. Copy the just-built extension from the installed wheel into
          # the source tree so the cwd-shadowed import resolves the real module.
          SITE="$(python -c 'import sysconfig; print(sysconfig.get_paths()["purelib"])')"
          cp "$SITE"/gamfit/_rust*.so gamfit/ 2>/dev/null || true
          ls -la gamfit/_rust*.so || { echo "::error::compiled gamfit._rust extension not found in $SITE/gamfit after wheel install"; exit 1; }

      - name: Install Python test extras
        if: ${{ github.event.inputs.py_filter != '' || github.event.inputs.torch_filter != '' }}
        run: |
          python -m pip install \
            'pytest>=8' 'numpy>=1.26' 'pandas>=2.0' 'scipy>=1.11' \
            'pyarrow>=14' 'matplotlib>=3.8' 'scikit-learn>=1.4' requests

      - name: Run Python tests (filtered, fail-fast)
        if: ${{ github.event.inputs.py_filter != '' }}
        run: python -m pytest tests/ -k "${{ github.event.inputs.py_filter }}" -p no:cacheprovider -x -q --tb=short

      # ---- torch path (opt-in; only when a torch_filter was given) ----------
      - name: Install CPU torch wheel
        if: ${{ github.event.inputs.torch_filter != '' }}
        run: python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run torch tests (filtered, fail-fast)
        if: ${{ github.event.inputs.torch_filter != '' }}
        run: python -m pytest tests/torch -k "${{ github.event.inputs.torch_filter }}" -p no:cacheprovider -x -q --tb=short

      - name: Guard against an empty request
        if: ${{ github.event.inputs.rust_filter == '' && github.event.inputs.py_filter == '' && github.event.inputs.torch_filter == '' }}
        run: |
          echo "::error::None of rust_filter / py_filter / torch_filter was provided; nothing to validate."
          exit 1
