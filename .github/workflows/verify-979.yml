name: "Verify #979"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/verify-979.yml"
      - "src/families/custom_family/**"
      - "src/families/survival/marginal_slope/**"
      - "tests/survival/**"
  workflow_dispatch:

concurrency:
  group: verify-979-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  verify-979:
    name: Survival and flex close gates
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Free runner disk space
        shell: bash
        run: |
          set -uo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-}" || true
          df -h /

      - name: Install Rust 1.93.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Run #979 close gates
        shell: bash
        env:
          RUSTFLAGS: "-C link-arg=-Wl,--threads=1"
          CARGO_BUILD_JOBS: "1"
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
          CARGO_PROFILE_DEV_SPLIT_DEBUGINFO: "off"
        run: |
          set -uo pipefail
          echo "verifying #979 close gates at $(git rev-parse HEAD)"
          cargo test --release --test survival \
            survival_marginal_slope_matern_logslope_converges_within_budget -- --nocapture
          cargo test --release \
            flex_contracted_tower_matches_independent_rigid_tower_and_catches_sign_flip -- --nocapture
          cargo test --release \
            flex_contracted_tower_matches_independent_fd_witness_nonzero_deviation -- --nocapture
