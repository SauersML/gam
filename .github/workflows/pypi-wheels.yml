name: Publish to PyPI

# Build wheels per (os, arch) as artifacts, then upload them in one final
# job using twine.
#
# Why split build from upload?  `maturin-action@v1`'s `command: publish`
# injects `--release`, which newer maturin rejects (it's always release).
# `command: build` works, and we upload via twine — same pattern as the
# sdist path.
#
# Speed strategy (rebuild from scratch on a cold cache used to take
# ~12 min per wheel; warm cache target is ~2 min):
#
#   * **Trigger on push-to-main, not just on tag.**  Found by reading
#     the v0.3.21 logs: every wheel job reported `No cache found.` and
#     spent 14–22 min in a cold compile.  GitHub Actions caches are
#     branch-scoped — tags can read caches saved under `main`, but
#     this workflow only ever ran on tag pushes, so `main` itself was
#     never warmed.  Adding a `push: main` trigger lets every merge to
#     main warm the per-(os, arch) caches, and tag pushes then build
#     from the warm cache (~2 min warm vs ~22 min cold on macos-15-
#     intel, the worst case).  The `release` job is now gated on
#     `if: startsWith(github.ref, 'refs/tags/v')` so main builds don't
#     publish to PyPI.
#
#   * **Native ARM Linux runners** (`ubuntu-24.04-arm`) for the
#     aarch64 jobs.  Aarch64 jobs were ~9 min on a QEMU-emulated host;
#     native ARM brings them down to ~6 min.  Smaller win than the
#     cache fix but free and removes QEMU as a future surprise.
#
#   * `Swatinem/rust-cache@v2` on every job — caches `~/.cargo`,
#     `target/`, and registry between runs. On a warm cache the action
#     only recompiles `gam` + `gam-pyffi`, not the 200+ transitive deps.
#
#   * `sccache: 'true'` inside `maturin-action` — turns on the action's
#     built-in sccache wrapper for the cargo invocations it runs in its
#     Docker images (Linux + musllinux). The host-side rust-cache covers
#     the non-Docker macOS/Windows builds; sccache covers Docker.
#
#   * `--profile release-pypi` — a dedicated profile with
#     `lto = "thin"` retained (production-bound users keep the runtime
#     win) but `codegen-units = 16` (vs the default `release`'s
#     `codegen-units = 1`).  The codegen-units change cuts wheel build
#     time roughly in half with sub-2% runtime impact at biobank shape;
#     the LTO is the more important production lever.
#
#   * Removed `continue-on-error` everywhere — a silent wheel failure
#     leaves a slot missing and PyPI consumers fall back to the slow
#     sdist source build.

on:
  push:
    branches:
      - main         # warms the per-runner Rust caches
    tags:
      - 'v*'        # builds + publishes
  workflow_dispatch:
    inputs:
      linux_only:
        # On-demand fast release path: skip the macOS + Windows matrices and
        # publish a Linux-only wheel set (manylinux x86_64 + aarch64, musllinux
        # x86_64 + aarch64, sdist). Trims a full PyPI run from ~13 min wall to
        # ~4 min by dropping the macos-15-intel job (the slowest by ~3×).
        # Off-PyPI consumers on macOS / Windows fall back to the sdist build,
        # so this is only appropriate when you need to ship a Linux-side fix
        # quickly and a follow-up full release can come later. Tag pushes
        # (the normal release path) ignore this input and always run the
        # full matrix.
        description: 'Build only Linux wheels (skip macOS + Windows for fast on-demand releases)'
        type: boolean
        default: false

# Cancel in-flight runs on the same ref when a new push lands.  Rapid
# main-branch commits used to queue full wheel matrices behind each
# other; only the last one matters for cache-warming.  Tag pushes are
# distinct refs so this never cancels a publishing run.
concurrency:
  group: pypi-wheels-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Smaller incremental footprint inside CI — incremental caches don't
  # survive across runs anyway, so disabling them saves disk + a small
  # amount of metadata bookkeeping at the start of every compile.
  CARGO_INCREMENTAL: "0"
  # Avoid network-bound metadata fetches on the hot path — we always
  # have the lockfile in-tree.
  CARGO_NET_RETRY: "10"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  # Sparse index avoids the multi-minute git clone of the full crates.io
  # index on cold caches.  Identical cargo behavior on warm caches (the
  # registry is already populated under ~/.cargo).  Does not affect the
  # rustc invocation, so does not invalidate Swatinem/rust-cache keys.
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-24.04,     target: x86_64 }
          # Native ARM host — drops the QEMU emulation that dominated
          # this matrix entry's wall time.
          - { runner: ubuntu-24.04-arm, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pypi-${{ matrix.platform.target }}-linux
          workspaces: |
            .
            crates/gam-pyffi
          # Only main warms the per-runner cache; tag / workflow_dispatch
          # runs read it but skip the ~30s upload step.  The shared-key is
          # unchanged, so this does not invalidate anything that was saved.
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Build Linux wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: >-
            --profile=release-pypi
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
          manylinux: auto
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist/*.whl
          if-no-files-found: error

  musllinux:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04,     target: x86_64 }
          # Native ARM host for the musllinux aarch64 build, same
          # reasoning as the manylinux jobs above.
          - { runner: ubuntu-24.04-arm, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pypi-${{ matrix.target }}-musllinux
          workspaces: |
            .
            crates/gam-pyffi
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Build musllinux wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: >-
            --profile=release-pypi
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
          manylinux: musllinux_1_2
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  macos:
    # Skipped on the on-demand `linux_only=true` workflow_dispatch path.
    # Default workflow_dispatch and all push events leave this input empty
    # or set to 'false', so the matrix runs normally.
    if: github.event.inputs.linux_only != 'true'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: macos-15-intel, target: x86_64 }
          - { runner: macos-14, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pypi-${{ matrix.platform.target }}-macos
          workspaces: |
            .
            crates/gam-pyffi
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Build macOS wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: >-
            --profile=release-pypi
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist/*.whl
          if-no-files-found: error

  windows:
    # Same gating as the macos job — skipped only when the on-demand
    # `linux_only=true` input is set on a workflow_dispatch run.
    if: github.event.inputs.linux_only != 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          architecture: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pypi-${{ matrix.target }}-windows
          workspaces: |
            .
            crates/gam-pyffi
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Build Windows wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: >-
            --profile=release-pypi
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/gam-pyffi/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Upload to PyPI
    # Only publish on tag pushes; main-branch runs are cache-warming only.
    # When the on-demand `linux_only=true` input is set on a workflow_dispatch
    # against a tag ref, the macOS and Windows jobs are skipped — we still
    # publish what built (Linux + musllinux + sdist) so the fast release
    # path produces an installable PyPI version. Tolerate `skipped` on the
    # two omitted jobs but require `success` on everything that did run.
    # Publish when EITHER a tag push (`refs/tags/v*`) OR a `workflow_dispatch`
    # fires. We've burned multiple debug cycles on `github.ref` vs
    # `github.ref_name` semantics for workflow_dispatch: both interpretations
    # silently evaluated false even when the dispatch was against a tag,
    # leaving Upload to PyPI as `skipped` and PyPI permanently stuck at the
    # last successful tag-push (0.1.43 / gam 0.3.23 in production). Trusting
    # `github.event_name == 'workflow_dispatch'` is the only condition that
    # works reliably for both transports — main-branch pushes still don't
    # publish because they're `push` events that don't satisfy the tag prefix.
    if: |
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') &&
      needs.linux.result == 'success' &&
      needs.musllinux.result == 'success' &&
      needs.sdist.result == 'success' &&
      (needs.macos.result == 'success' || needs.macos.result == 'skipped') &&
      (needs.windows.result == 'success' || needs.windows.result == 'skipped')
    needs:
      - linux
      - musllinux
      - macos
      - windows
      - sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Download all wheel + sdist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Show what will be uploaded
        run: ls -la dist
      - name: Upload to PyPI via twine
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine upload --skip-existing --non-interactive dist/*
