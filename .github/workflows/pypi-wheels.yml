name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-22.04, target: x86_64 }
          - { runner: ubuntu-22.04, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Publish Linux wheels
        uses: PyO3/maturin-action@v1
        continue-on-error: true
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: publish
          target: ${{ matrix.platform.target }}
          args: >-
            --strip
            --skip-existing
            --manifest-path crates/gam-pyffi/Cargo.toml
          manylinux: auto

  musllinux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Publish musllinux wheels
        uses: PyO3/maturin-action@v1
        continue-on-error: true
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: publish
          target: ${{ matrix.target }}
          args: >-
            --strip
            --skip-existing
            --manifest-path crates/gam-pyffi/Cargo.toml
          manylinux: musllinux_1_2

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: macos-13, target: x86_64 }
          - { runner: macos-14, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Publish macOS wheels
        uses: PyO3/maturin-action@v1
        continue-on-error: true
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: publish
          target: ${{ matrix.platform.target }}
          args: >-
            --strip
            --skip-existing
            --manifest-path crates/gam-pyffi/Cargo.toml

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          architecture: ${{ matrix.target }}
      - name: Publish Windows wheels
        uses: PyO3/maturin-action@v1
        continue-on-error: true
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: publish
          target: ${{ matrix.target }}
          args: >-
            --strip
            --skip-existing
            --manifest-path crates/gam-pyffi/Cargo.toml

  sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/gam-pyffi/Cargo.toml
      - name: Publish sdist
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine upload --skip-existing --non-interactive \
            -u __token__ -p "$MATURIN_PYPI_TOKEN" dist/*.tar.gz
