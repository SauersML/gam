name: Build wheels and publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI (otherwise dry-run wheel build)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform.target }} on ${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-latest,  target: x86_64,   manylinux: auto }
          - { os: ubuntu-latest,  target: aarch64,  manylinux: 2_28 }
          - { os: macos-14,       target: aarch64,  manylinux: auto }
          - { os: macos-13,       target: x86_64,   manylinux: auto }
          - { os: windows-latest, target: x64,      manylinux: auto }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: >-
            --release
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/gam-pyffi/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    environment:
      name: pypi
      url: https://pypi.org/p/gamfit
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          PY_VERSION=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          if [ "$TAG" != "$PY_VERSION" ]; then
            echo "Tag $TAG does not match pyproject.toml version $PY_VERSION"
            exit 1
          fi

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
