name: Publish to PyPI

# Build wheels per (os, arch) as artifacts, then upload them in one final
# job using twine.
#
# Why split build from upload?  `maturin-action@v1`'s `command: publish`
# injects `--release`, which newer maturin rejects (it's always release).
# `command: build` works, and we upload via twine — same pattern as the
# sdist path.
#
# Speed strategy (rebuild from scratch on a cold cache used to take
# ~12 min per wheel; warm cache target is ~2 min):
#
#   * `Swatinem/rust-cache@v2` on every job — caches `~/.cargo`,
#     `target/`, and registry between runs. On a warm cache the action
#     only recompiles `gam` + `gam-pyffi`, not the 200+ transitive deps.
#
#   * `sccache: 'true'` inside `maturin-action` — turns on the action's
#     built-in sccache wrapper for the cargo invocations it runs in its
#     Docker images (Linux + musllinux). The host-side rust-cache covers
#     the non-Docker macOS/Windows builds; sccache covers Docker.
#
#   * `--profile release-pypi` — a dedicated profile with
#     `lto = "thin"` retained (production-bound users keep the runtime
#     win) but `codegen-units = 16` (vs the default `release`'s
#     `codegen-units = 1`).  The codegen-units change cuts wheel build
#     time roughly in half with sub-2% runtime impact at biobank shape;
#     the LTO is the more important production lever.
#
#   * Removed `continue-on-error` everywhere — a silent wheel failure
#     leaves a slot missing and PyPI consumers fall back to the slow
#     sdist source build.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  # Smaller incremental footprint inside CI — incremental caches don't
  # survive across runs anyway, so disabling them saves disk + a small
  # amount of metadata bookkeeping at the start of every compile.
  CARGO_INCREMENTAL: "0"
  # Avoid network-bound metadata fetches on the hot path — we always
  # have the lockfile in-tree.
  CARGO_NET_RETRY: "10"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-22.04, target: x86_64 }
          - { runner: ubuntu-22.04, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pypi-${{ matrix.platform.target }}-linux
          workspaces: |
            .
            crates/gam-pyffi
      - name: Build Linux wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: >-
            --release
            --profile=release-pypi
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
          manylinux: auto
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist/*.whl
          if-no-files-found: error

  musllinux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pypi-${{ matrix.target }}-musllinux
          workspaces: |
            .
            crates/gam-pyffi
      - name: Build musllinux wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: >-
            --release
            --profile=release-pypi
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
          manylinux: musllinux_1_2
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: macos-15-intel, target: x86_64 }
          - { runner: macos-14, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pypi-${{ matrix.platform.target }}-macos
          workspaces: |
            .
            crates/gam-pyffi
      - name: Build macOS wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: >-
            --release
            --profile=release-pypi
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist/*.whl
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          architecture: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pypi-${{ matrix.target }}-windows
          workspaces: |
            .
            crates/gam-pyffi
      - name: Build Windows wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: >-
            --release
            --profile=release-pypi
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/gam-pyffi/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Upload to PyPI
    needs:
      - linux
      - musllinux
      - macos
      - windows
      - sdist
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Download all wheel + sdist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Show what will be uploaded
        run: ls -la dist
      - name: Upload to PyPI via twine
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine upload --skip-existing --non-interactive dist/*
