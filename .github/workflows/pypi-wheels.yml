name: Publish to PyPI

# Build wheels per (os, arch) as artifacts, then upload them in one final
# job using twine. Why split build from upload?
#
# `maturin-action@v1`'s `command: publish` injects `--release` into the
# maturin invocation, but newer maturin's `publish` subcommand rejects it
# (it's always release). Every wheel job was failing at that line, but
# `continue-on-error: true` swallowed the error so only the sdist made it
# to PyPI — leaving downstream consumers (`uv sync` / `pip install`) to
# fall back to the source build path. That's the "Building gamfit from sdist"
# 5× in parallel symptom.
#
# `command: build` does NOT trigger the `--release` injection, so the
# wheels actually get built. We then upload them all via `twine upload`
# in the `release` job — same pattern the existing sdist path uses, and
# the standard PyO3 wheel-distribution recipe.
#
# `continue-on-error: true` is removed everywhere: real failures need to
# fail loudly so the wheel slot doesn't silently disappear.

on:
  push:
    branches:
      - main         # only runs when pyproject.toml `[project].version` changed
    tags:
      - 'v*'        # builds + publishes
  workflow_dispatch:
    inputs:
      linux_only:
        # On-demand fast release path: skip the macOS + Windows matrices and
        # publish a Linux-only wheel set (manylinux x86_64 + aarch64, musllinux
        # x86_64 + aarch64, sdist). Trims a full PyPI run from ~13 min wall to
        # ~4 min by dropping the macos-15-intel job (the slowest by ~3×).
        # Off-PyPI consumers on macOS / Windows fall back to the sdist build,
        # so this is only appropriate when you need to ship a Linux-side fix
        # quickly and a follow-up full release can come later. Tag pushes
        # (the normal release path) ignore this input and always run the
        # full matrix.
        description: 'Build only Linux wheels (skip macOS + Windows for fast on-demand releases)'
        type: boolean
        default: false

permissions:
  contents: read

env:
  # Smaller incremental footprint inside CI — incremental caches don't
  # survive across runs anyway, so disabling them saves disk + a small
  # amount of metadata bookkeeping at the start of every compile.
  CARGO_INCREMENTAL: "0"
  # Avoid network-bound metadata fetches on the hot path — we always
  # have the lockfile in-tree.
  CARGO_NET_RETRY: "10"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  # Sparse index avoids the multi-minute git clone of the full crates.io
  # index on cold caches.  Identical cargo behavior on warm caches (the
  # registry is already populated under ~/.cargo).  Does not affect the
  # rustc invocation, so does not invalidate Swatinem/rust-cache keys.
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  # Gate: on a branch push, only proceed when the wheel version actually
  # changed. Tag pushes and workflow_dispatch always run (force-publish or
  # explicit release path).
  gate:
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the previous commit to diff the version line against.
          fetch-depth: 2
      - id: check
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" != "push" || "${GITHUB_REF}" != refs/heads/* ]]; then
            echo "Non-branch push (tag or dispatch) — always run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # If this exact commit is also a `v*` release tag, defer to the
          # tag-triggered run so a coordinated release (version bump pushed to
          # main together with its tag) publishes the wheels exactly once
          # instead of racing two identical twine uploads. The standalone
          # "bump pyproject on main, no tag" quick-fix path is unaffected.
          git fetch --tags --force --quiet origin 2>/dev/null || true
          if git tag --points-at HEAD | grep -q '^v'; then
            echo "Commit is tagged $(git tag --points-at HEAD | grep '^v' | head -n1) — deferring to the tag run."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Gate on the file that DRIVES the published wheel: maturin reads the
          # version from `[project].version` in pyproject.toml. The internal
          # crates/gam-pyffi/Cargo.toml version (publish = false) does NOT change
          # the artifact, so diffing it let a pyproject-only bump slip through as
          # should_run=false (issue #570). `^version[[:space:]]*=` matches exactly
          # the single `[project].version` line in pyproject.toml.
          manifest=pyproject.toml
          new_ver=$(grep -E '^version[[:space:]]*=' "$manifest" | head -n1)
          old_ver=$(git show "${GITHUB_EVENT_BEFORE:-HEAD^}:$manifest" 2>/dev/null | grep -E '^version[[:space:]]*=' | head -n1 || true)
          echo "old: $old_ver"
          echo "new: $new_ver"
          if [[ "$new_ver" != "$old_ver" ]]; then
            echo "Version changed — running publish."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged — skipping publish."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  linux:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: true
      matrix:
        # Fast on-demand path (linux_only=true) builds ONLY manylinux x86_64 —
        # the glibc target consumed on the biobank box — so the upload job is
        # not gated on the slower-to-schedule native-ARM runner. Full releases
        # (push with a version bump, or a v* tag) build x86_64 + aarch64.
        platform: ${{ (github.event.inputs.linux_only == 'true') && fromJSON('[{"runner":"ubuntu-24.04","target":"x86_64"}]') || fromJSON('[{"runner":"ubuntu-24.04","target":"x86_64"},{"runner":"ubuntu-24.04-arm","target":"aarch64"}]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build Linux wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # Cross-run compilation cache (GitHub Actions cache backend),
          # configured INSIDE the manylinux container by maturin-action.
          # CI runners are ephemeral, so without this every wheel recompiles
          # the whole dependency graph (faer, ndarray, pyo3, …) cold in
          # release mode — the dominant ~10 min cost. With sccache warm, only
          # the changed gam crate recompiles on subsequent releases.
          sccache: true
          target: ${{ matrix.platform.target }}
          args: >-
            --release
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist/*.whl
          if-no-files-found: error

  musllinux:
    needs: gate
    # Skipped on the fast linux_only path: musllinux + native-ARM wheels are
    # the long pole, and the biobank box is glibc x86_64. Full releases build them.
    if: needs.gate.outputs.should_run == 'true' && github.event.inputs.linux_only != 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { runner: ubuntu-24.04,     target: x86_64 }
          # Native ARM host for the musllinux aarch64 build, same
          # reasoning as the manylinux jobs above.
          - { runner: ubuntu-24.04-arm, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build musllinux wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          sccache: true
          target: ${{ matrix.target }}
          args: >-
            --release
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
          manylinux: musllinux_1_2
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  macos:
    needs: gate
    # Skipped on the on-demand `linux_only=true` workflow_dispatch path.
    # Default workflow_dispatch and all push events leave this input empty
    # or set to 'false', so the matrix runs normally.
    if: needs.gate.outputs.should_run == 'true' && github.event.inputs.linux_only != 'true'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: true
      matrix:
        platform:
          - { runner: macos-15-intel, target: x86_64 }
          - { runner: macos-14, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build macOS wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          sccache: true
          target: ${{ matrix.platform.target }}
          args: >-
            --release
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist/*.whl
          if-no-files-found: error

  windows:
    needs: gate
    # Same gating as the macos job — skipped only when the on-demand
    # `linux_only=true` input is set on a workflow_dispatch run.
    if: needs.gate.outputs.should_run == 'true' && github.event.inputs.linux_only != 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          architecture: ${{ matrix.target }}
      - name: Build Windows wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          sccache: true
          target: ${{ matrix.target }}
          args: >-
            --release
            --strip
            --out dist
            --manifest-path crates/gam-pyffi/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/gam-pyffi/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Upload to PyPI
    needs:
      - linux
      - musllinux
      - macos
      - windows
      - sdist
    # Publish whenever the Linux + musllinux + sdist artifacts succeeded. Under
    # `linux_only=true` the macos/windows jobs are SKIPPED — a default `needs`
    # would skip this upload job too (a job whose needs are skipped is skipped),
    # so the fast Linux-only path built wheels but never published. Gate on the
    # actual results instead: require the Linux set to succeed, allow macos/
    # windows to be skipped (just not failed). The gate's `should_run=false`
    # path skips the wheel jobs, so their result is `skipped` and this stays off.
    if: ${{ !cancelled() && needs.linux.result == 'success' && needs.sdist.result == 'success' && needs.musllinux.result != 'failure' && needs.macos.result != 'failure' && needs.windows.result != 'failure' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Download all wheel + sdist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Show what will be uploaded
        run: ls -la dist
      - name: Upload to PyPI via twine
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine upload --verbose --skip-existing --non-interactive dist/*
