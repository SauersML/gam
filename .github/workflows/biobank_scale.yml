name: Biobank Scale

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: biobank-scale-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      cache_key: ${{ steps.cache_key.outputs.cache_key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.3"

      - name: Install Python packages
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy matplotlib lifelines pandas xgboost scikit-learn

      - name: Install R packages
        shell: bash
        run: |
          set -euo pipefail
          Rscript -e 'install.packages(c("mgcv","survival","jsonlite"), repos="https://cloud.r-project.org")'

      - name: Compute cache key
        id: cache_key
        shell: bash
        run: |
          set -euo pipefail
          key="biobank-scale-${{ runner.os }}-${{ hashFiles('bench/biobank_scale/runner.py', 'bench/biobank_scale/biobank_scale.yml', '.github/workflows/biobank_scale.yml', 'Cargo.toml') }}"
          echo "cache_key=${key}" >> "${GITHUB_OUTPUT}"

      - name: Restore prepared cohort cache
        id: prep_cache
        uses: actions/cache/restore@v4
        with:
          path: bench/biobank_scale/prepared
          key: ${{ steps.cache_key.outputs.cache_key }}

      - name: Prepare full cohort
        if: ${{ steps.prep_cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 bench/biobank_scale/runner.py prepare --config bench/biobank_scale/biobank_scale.yml --out-dir bench/biobank_scale/prepared

      - name: Save prepared cohort cache
        if: ${{ steps.prep_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: bench/biobank_scale/prepared
          key: ${{ steps.cache_key.outputs.cache_key }}

      - name: Build method matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          matrix=$(python3 bench/biobank_scale/runner.py matrix --config bench/biobank_scale/biobank_scale.yml)
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

      - name: Upload prepared cohort
        uses: actions/upload-artifact@v4
        with:
          name: biobank-scale-prepared
          path: bench/biobank_scale/prepared
          if-no-files-found: error

  bootstrap-runtime:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build gam binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --bin gam
          ls -l target/release/gam

      - name: Upload gam binary
        uses: actions/upload-artifact@v4
        with:
          name: biobank-scale-gam-binary
          path: target/release/gam
          if-no-files-found: error

  benchmark:
    needs:
      - prepare
      - bootstrap-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      BENCH_CMD_TIMEOUT_SEC: "2400"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.3"

      - name: Install Python packages
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy matplotlib lifelines pandas xgboost scikit-learn

      - name: Install R packages
        shell: bash
        run: |
          set -euo pipefail
          Rscript -e 'install.packages(c("mgcv","survival","jsonlite"), repos="https://cloud.r-project.org")'

      - name: Download prepared cohort
        uses: actions/download-artifact@v4
        with:
          name: biobank-scale-prepared
          path: bench/biobank_scale/prepared

      - name: Download prebuilt gam binary
        uses: actions/download-artifact@v4
        with:
          name: biobank-scale-gam-binary
          path: bench/biobank_scale/bin

      - name: Stage gam binary into target/release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/release
          cp bench/biobank_scale/bin/gam target/release/gam
          chmod +x target/release/gam
          ls -l target/release/gam

      - name: Run benchmark method
        shell: bash
        env:
          GAM_RUST_BINARY: ${{ github.workspace }}/target/release/gam
        run: |
          set -euo pipefail
          mkdir -p bench/biobank_scale/results bench/biobank_scale/runs/${{ matrix.name }}
          python3 bench/biobank_scale/runner.py run-method \
            --config bench/biobank_scale/biobank_scale.yml \
            --prep-dir bench/biobank_scale/prepared \
            --method "${{ matrix.name }}" \
            --out-dir "bench/biobank_scale/runs/${{ matrix.name }}" \
            --out-json "bench/biobank_scale/results/${{ matrix.name }}.json"

      - name: Upload method artifact
        uses: actions/upload-artifact@v4
        with:
          name: biobank-scale-${{ matrix.name }}
          path: |
            bench/biobank_scale/results/${{ matrix.name }}.json
            bench/biobank_scale/runs/${{ matrix.name }}
          if-no-files-found: error

  aggregate:
    needs: benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy matplotlib lifelines

      - name: Download prepared cohort
        uses: actions/download-artifact@v4
        with:
          name: biobank-scale-prepared
          path: bench/biobank_scale/prepared

      - name: Download method artifacts
        uses: actions/download-artifact@v4
        with:
          path: bench/biobank_scale/artifacts

      - name: Collect result jsons
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bench/biobank_scale/results
          find bench/biobank_scale/artifacts -path '*/results/*.json' -type f -print -exec cp {} bench/biobank_scale/results/ \;

      - name: Aggregate outputs
        shell: bash
        run: |
          set -euo pipefail
          python3 bench/biobank_scale/runner.py aggregate \
            --config bench/biobank_scale/biobank_scale.yml \
            --prep-dir bench/biobank_scale/prepared \
            --results-dir bench/biobank_scale/results \
            --out-dir bench/biobank_scale/final

      - name: Upload aggregate bundle
        uses: actions/upload-artifact@v4
        with:
          name: biobank-scale-bundle
          path: bench/biobank_scale/final/biobank_scale_bundle.zip
          if-no-files-found: error
