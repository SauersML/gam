name: Claude Releaser (review main, improve, release)

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: write

jobs:
  check_unreleased:
    if: false  # disabled: do not run
    # Gate: the agent only has work when `main` has advanced since the
    # last release. On scheduled runs with nothing new to ship, skip the
    # heavy job so we don't burn a runner just to have Claude exit.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_unreleased: ${{ steps.check.outputs.has_unreleased }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for unreleased commits on main
        id: check
        run: |
          set -euxo pipefail
          last_release=$(git log -1 --grep='^release:' --format='%H' || true)
          if [ -n "$last_release" ]; then
            count=$(git rev-list --count "${last_release}..HEAD")
          else
            count=$(git rev-list --count HEAD)
          fi
          echo "commits on main since last release: $count"
          if [ "$count" -gt 0 ]; then
            echo "has_unreleased=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_unreleased=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check_unreleased
    if: needs.check_unreleased.outputs.has_unreleased == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install publishing tools
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install build twine maturin

      - name: Install gam CLI
        run: |
          set -euxo pipefail
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Claude merger agent
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_KEY }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_ALT_OAUTH_TOKEN }}
          # Suppress the raw stream-json dump; a readable transcript of just
          # Claude's messages is rendered from execution_file after the run.
          show_full_output: false
          claude_args: >-
            --model claude-opus-4-8
            --dangerously-skip-permissions
            --allowedTools "Bash,Edit,Read,Write,Glob,Grep,WebFetch,WebSearch,TodoWrite,Task,NotebookEdit,KillBash,BashOutput"
          additional_permissions: |
            actions: read
          prompt: |
            Hi Claude. You have the run of this repo, an Ubuntu runner, no
            turn budget, and as long as you need.

            Fixes land directly on `main` now — the fixer and bug-hunt
            agents commit straight to main, so there are no PRs to merge.
            Your job is to keep main releasable and to ship it. Each run,
            in order:

              1. Review the unreleased work on `main` (everything since the
                 last `release:` commit).
              2. Make it beautiful — if anything that landed is sub-bar
                 (missing tests, half-fix, brittle abstraction, sloppy
                 error handling), finish it properly by committing directly
                 to `main` and pushing as you go. Don't ship a half-fix.
              3. Bump versions and publish: crates.io for the Rust crate,
                 PyPI for the `gamfit` Python wheel.
              4. Monitor the publish workflows until they actually succeed
                 on the registries.

            ## 1 — Review the unreleased work on main

            Find the last release with `git log -1 --grep='^release:'
            --format='%H'`, then read what has landed since:
            `git log <last-release>..origin/main` and `git show` the diffs
            that look user-facing, following the issues they reference
            (`gh issue view <N>`). Build a clear picture of what this
            release would ship.

            If nothing of user-facing substance has landed since the last
            release, exit cleanly — you don't need to cut a release every
            run.

            ## 2 — Improve until it's beautiful

            If any landed change is sub-bar, fix it before you ship —
            commit the improvement directly to `main` and push as you go
            (pull --rebase first if main has moved; never stash). Missing
            tests, brittle abstraction, sloppy error handling, a
            half-implemented adjacent thing — bring it up to the same bar
            the fixer agent holds: principled, root-cause, long-term
            correct, fully verified.

            If a landed change only partially addressed its issue (fixed
            the reported symptom but not the deeper root cause), finish the
            deeper work on `main` before cutting the release. Do not ship a
            half-fix and tell yourself a follow-up will land later.

            DEAD-CODE REMOVAL GUARD (#871): `crates/gam-pyffi` (the published
            PyO3 wheel) imports many `pub` items from `gam` via `use gam::…`.
            Those items have no `gam`-internal caller, so they look dead to the
            `gam` crate and to `cargo check --lib` — but deleting them breaks
            the wheel, which only fails ~12 min into the release build. Before
            removing ANY `pub` module / fn / struct / re-export as "dead",
            verify workspace-wide reachability: `cargo check --workspace
            --all-targets` (at minimum `cargo check -p gam-pyffi`). If
            `gam-pyffi` references it (grep `crates/gam-pyffi/src` for the
            symbol/path), it is LIVE — keep it. Never gate a deletion on the
            `gam` crate alone.

            ## 3 — Bump versions and publish

            After every merge that lands user-facing code, cut a release:

              - **Rust crate (crates.io):** bump versions INDEPENDENTLY,
                not in lockstep. Bump ONLY (a) the member crates whose
                content actually changed since the last release
                (`git diff <last-release>..HEAD --stat -- crates/` tells
                you which), (b) their reverse-dependency closure — any
                crate whose Cargo.toml pins a bumped dep's version must
                update that pin and bump its own patch version — and
                (c) the root `gam` crate + workspace `Cargo.toml`, whose
                version is the release tag anchor and always bumps.
                Leave every other member crate's version (and its
                dependents' pins on it) UNTOUCHED. Rationale: a version
                string participates in cargo's fingerprint (`-C metadata`),
                so a lockstep bump of all ~30 member crates cold-starts
                every build cache in the fleet (CI shards, the MSI wheel
                builds, every dev box) for crates that did not change —
                tens of wasted compile-hours per release. Independent
                bumps make version invalidation coincide exactly with the
                rebuilds the content changes force anyway; crates.io is
                indifferent (unchanged crates simply skip publish — the
                "already uploaded" branch in publish.yml already tolerates
                this). Pick the right semver step from the merged diff:
                patch for fixes / internal cleanup, minor for new public
                surface, major for breaking changes. Commit directly to
                `main` with a message like `release: gam vX.Y.Z`.
              - **Python wrapper (PyPI):** bump `version` in
                `pyproject.toml` for `gamfit`. Same semver judgment.
                Commit to `main`: `release: gamfit vX.Y.Z`.

            Push the version-bump commits. Then trigger / let fire the
            repo's existing publish workflows (look under
            `.github/workflows/` — `publish.yml`, `pypi-wheels.yml`, etc.
            are the likely suspects; read them so you know what they
            expect — a pushed tag, a manual dispatch, a version change).
            If the existing flow needs a tag, create and push the tag
            (`git tag gam-vX.Y.Z`, `git push origin gam-vX.Y.Z` etc.).

            **Secrets:** `CARGO_REGISTRY_TOKEN` and `PYPI_API_TOKEN` are
            available in the environment if you need to publish directly
            (`cargo publish`, `twine upload`). Prefer the existing
            workflow path if it exists — it's set up the way the
            maintainer wants. Fall back to direct publish only if the
            workflow path is broken.

            ## 4 — Watch the publish through

            Don't declare victory on `git push`. Watch the publish
            workflow runs (`gh run watch <id>` or poll `gh run list`)
            until they finish. If they fail, read the logs, fix the
            cause, push again, watch again. Loop until both crates.io
            and PyPI confirm the new versions are live:
              - `curl -s https://crates.io/api/v1/crates/<crate>/versions | jq '.versions[0].num'`
              - `curl -s https://pypi.org/pypi/gamfit/json | jq -r '.info.version'`
            Both must equal the version you just bumped to before you
            consider the run complete. Note the final state — a brief
            comment on a representative shipped issue, or the release
            commit message — so the maintainer can see at a glance that the
            release succeeded.

            If the publish fails for a real reason (e.g. crates.io
            rejects because the version was already taken — bump again
            and retry; PyPI rejects because of a metadata problem — fix
            the metadata in `main` and bump again), keep grinding until
            it ships. Removing publish blockers is part of the job.

            Have fun. Take your time. Get it perfect.

      - name: Print Claude transcript
        if: always()
        run: bash .github/scripts/print-claude-transcript.sh '${{ steps.claude.outputs.execution_file }}'
