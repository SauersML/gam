name: Anti-Evasion Diff Review

# Defense in depth: independent of build.rs, this job inspects only the NEW
# diff introduced by each PR/push and flags structural evasion signatures
# (guard->sentinel laundering, tolerance loosening, build.rs gate stripping,
# owed-work reword). It operates on `git diff <base>..<head>` so it never
# reds existing main; only freshly-changed hunks are considered.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  anti-evasion-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve diff range
        id: range
        run: |
          set -euo pipefail
          EVENT="${{ github.event_name }}"
          BASE=""
          HEAD=""

          if [ "$EVENT" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
          fi

          # Guard against the all-zero "first push / new branch" sentinel sha
          ZEROS="0000000000000000000000000000000000000000"
          if [ -z "$BASE" ] || [ "$BASE" = "$ZEROS" ]; then
            echo "Base sha unavailable or zero; using HEAD's first parent (or empty tree)."
            if git rev-parse --verify -q "${HEAD}^" >/dev/null; then
              BASE="$(git rev-parse "${HEAD}^")"
            else
              # empty tree object: diff shows the whole HEAD as additions
              BASE="$(git hash-object -t tree /dev/null)"
            fi
          fi
          if [ -z "$HEAD" ] || [ "$HEAD" = "$ZEROS" ]; then
            HEAD="$(git rev-parse HEAD)"
          fi

          # Make sure both ends are present locally
          git rev-parse --verify -q "$BASE" >/dev/null || git fetch --no-tags origin "$BASE" || true
          git rev-parse --verify -q "$HEAD" >/dev/null || git fetch --no-tags origin "$HEAD" || true

          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "Diff range: $BASE..$HEAD"

      - name: Scan diff for evasion signatures
        env:
          BASE: ${{ steps.range.outputs.base }}
          HEAD: ${{ steps.range.outputs.head }}
        run: |
          set -euo pipefail

          # Produce a stable unified diff with file headers and zero context so
          # each removed/added line is unambiguously attributed to a hunk.
          DIFF_FILE="$(mktemp)"
          git diff --no-color --unified=0 "$BASE" "$HEAD" -- > "$DIFF_FILE" || {
            echo "Could not compute diff for $BASE..$HEAD; nothing to scan."
            exit 0
          }

          if [ ! -s "$DIFF_FILE" ]; then
            echo "Empty diff; nothing to scan."
            exit 0
          fi

          REPORT="$(mktemp)"
          : > "$REPORT"

          # awk pass: walk the unified diff hunk-by-hunk, per file, collecting
          # removed (-) and added (+) lines, then test each signature on the
          # pairing. Token strings are assembled from fragments so this very
          # workflow file does not itself contain a banned literal marker.
          awk -v report="$REPORT" '
            function flush_hunk(   i, rem, add, hit, why, removed_guard, added_sentinel,
                                   removed_tight_tol, added_loose_tol, owed_deleted, impl_added,
                                   bang) {
              if (file == "" ) return
              # join removed/added buffers
              rem = ""; for (i = 0; i < nrem; i++) rem = rem "\n" rembuf[i]
              add = ""; for (i = 0; i < nadd; i++) add = add "\n" addbuf[i]

              is_test = (file ~ /(^|\/)tests\//) || (file ~ /_tests?\.rs$/) || (file ~ /\/tests\//)
              is_src  = (file ~ /\.rs$/) && (!is_test)
              is_build = (file ~ /(^|\/)build\.rs$/)

              bang = "!"  # avoid embedding the literal macro token in this file

              # ---- Signature 1: guard -> sentinel laundering (non-test src) ----
              if (is_src && !is_build) {
                removed_guard = (rem ~ ("panic" bang "\\(")) || (rem ~ ("assert" bang "\\(")) \
                             || (rem ~ ("assert_eq" bang "\\(")) || (rem ~ ("debug_assert" bang "\\("))
                added_sentinel = (add ~ /f64::NAN/) \
                              || (add ~ /return[[:space:]]+0\.0/) \
                              || (add ~ /Ok\(\(\)\)/) \
                              || (add ~ /Array[0-9A-Za-z_]*::zeros/) \
                              || (add ~ /return[[:space:]]+None/) \
                              || (add ~ /=>[[:space:]]*None/)
                if (removed_guard && added_sentinel) {
                  why = "Signature 1 (guard->sentinel laundering): a hunk removes a panic/assert guard and, in the same file hunk, adds a benign sentinel value (NaN / return 0.0 / Ok(()) / zeros / None). A contract guard appears to have been laundered into a silent success."
                  emit(report, file, hline, why, rem, add)
                }
              }

              # ---- Signature 2: tolerance loosening ----
              # removed a tight bound (< 1e-1X) and added a weaker one (< 1e-Y, single digit)
              removed_tight_tol = (rem ~ /<[[:space:]]*1e-1[0-9]/)
              added_loose_tol   = (add ~ /<[[:space:]]*1e-[0-9]([^0-9]|$)/)
              if (removed_tight_tol && added_loose_tol) {
                why = "Signature 2 (tolerance loosening): a hunk removes an assertion bound of magnitude < 1e-1X and replaces it with a weaker < 1e-Y (single-digit exponent). Loosening a numeric tolerance to make a failing assertion pass is an evasion."
                emit(report, file, hline, why, rem, add)
              }

              # ---- Signature 3: build.rs gate / teeth strip ----
              if (is_build) {
                # a removed line carrying a gate token, with no added line restoring it
                if (test_gate_token(rem) && !test_gate_token(add)) {
                  why = "Signature 3 (build.rs gate strip): a hunk deletes a gate/teeth token (scan_for_* / a process exit-1 call / render_report / FAILED / build aborted / error: ) from build.rs without re-adding it. The build-time enforcement teeth appear to have been removed."
                  emit(report, file, hline, why, rem, add)
                }
              }

              # ---- Signature 4: owed-work reword (deletions-only in a comment) ----
              owed_deleted = (rem ~ /not yet wired/) || (rem ~ /deferred to a follow/) || (rem ~ /PLAN/)
              if (owed_deleted) {
                # Only flag when the removed text is a comment citing an issue, and the
                # added side contributes NO implementation (no new code lines) -- i.e.
                # the owed-work note was reworded/deleted away rather than fulfilled.
                removed_is_comment = (rem ~ /\/\//) || (rem ~ /\/\*/) || (rem ~ /^[[:space:]]*\*/) || (rem ~ /#[0-9]+/)
                impl_added = added_has_code(add)
                if (removed_is_comment && !impl_added) {
                  why = "Signature 4 (owed-work reword): a hunk deletes an owed-work phrase (not yet wired / deferred to a follow / PLAN), apparently in a comment, without adding any implementation lines. Owed work must be implemented, not reworded away."
                  emit(report, file, hline, why, rem, add)
                }
              }
            }

            function test_gate_token(s) {
              return (s ~ /fn[[:space:]]+scan_for_/) \
                  || (s ~ /process::exit\([[:space:]]*1[[:space:]]*\)/) \
                  || (s ~ /render_report/) \
                  || (s ~ /FAILED/) \
                  || (s ~ /build aborted/) \
                  || (s ~ /error:/)
            }

            # Does the added buffer contain real (non-comment, non-blank) code?
            function added_has_code(s,   i, n, parts, ln, t) {
              n = split(s, parts, "\n")
              for (i = 1; i <= n; i++) {
                ln = parts[i]
                # strip leading whitespace
                t = ln
                gsub(/^[[:space:]]+/, "", t)
                if (t == "") continue
                if (t ~ /^\/\//) continue
                if (t ~ /^\*/) continue
                if (t ~ /^\/\*/) continue
                if (t ~ /^#/) continue   # comment-ish
                return 1
              }
              return 0
            }

            function emit(report, file, hline, why, rem, add) {
              print "::error file=" file "::Anti-evasion: " why >> report
              print "----------------------------------------------------------------" >> report
              print "FILE: " file "  (hunk near line " hline ")" >> report
              print why >> report
              print "  Removed in this hunk:" >> report
              n = split(rem, R, "\n"); for (i = 1; i <= n; i++) if (R[i] != "") print "    - " R[i] >> report
              print "  Added in this hunk:" >> report
              n = split(add, A, "\n"); for (i = 1; i <= n; i++) if (A[i] != "") print "    + " A[i] >> report
              print "" >> report
              flagged_global = 1
            }

            BEGIN { file = ""; nrem = 0; nadd = 0; hline = 0; flagged_global = 0 }

            # new file header
            /^diff --git / {
              flush_hunk()
              nrem = 0; nadd = 0
              file = ""
              next
            }
            /^\+\+\+ b\// {
              f = $0
              sub(/^\+\+\+ b\//, "", f)
              file = f
              nrem = 0; nadd = 0
              next
            }
            /^--- / { next }
            # hunk header: new hunk boundary -> evaluate the previous one
            /^@@ / {
              flush_hunk()
              nrem = 0; nadd = 0
              # parse the new-file start line for reporting
              hl = $0
              sub(/^@@[^+]*\+/, "", hl)
              sub(/[, ].*$/, "", hl)
              hline = hl
              next
            }
            /^-/ {
              if (file != "") { rembuf[nrem] = substr($0, 2); nrem++ }
              next
            }
            /^\+/ {
              if (file != "") { addbuf[nadd] = substr($0, 2); nadd++ }
              next
            }
            END { flush_hunk(); if (flagged_global) exit 7 }
          ' "$DIFF_FILE" && AWK_RC=0 || AWK_RC=$?

          if [ -s "$REPORT" ]; then
            echo "=================================================================="
            echo "ANTI-EVASION DIFF REVIEW: suspicious transforms detected"
            echo "=================================================================="
            cat "$REPORT"
          fi

          if [ "${AWK_RC:-0}" -eq 7 ]; then
            echo ""
            echo "This PR/push introduces one or more structural evasion signatures."
            echo "Each flagged hunk must be JUSTIFIED (and the reviewer convinced)"
            echo "or REVERTED. These checks operate on the new diff only and target"
            echo "guard->sentinel laundering, tolerance loosening, build.rs gate"
            echo "stripping, and owed-work reword. Blocking."
            exit 1
          fi

          echo "Anti-evasion diff review passed: no evasion signatures in this diff."
