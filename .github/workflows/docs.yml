name: docs

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate scheduled runs on recent changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Event ${{ github.event_name }} is not a schedule; running."
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          latest=$(git log -1 --format=%ct)
          now=$(date +%s)
          age_min=$(( (now - latest) / 60 ))
          window=1560
          if [ "$age_min" -lt "$window" ]; then
            echo "Last commit ${age_min}m ago (< ${window}m); running scheduled job."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Last commit ${age_min}m ago (>= ${window}m); nothing changed, skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
  build:
    needs: gate
    if: ${{ github.event_name != 'schedule' || needs.gate.outputs.run == 'true' }}
    name: mkdocs build --strict
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install system deps for Material social cards
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev

      - name: Install docs requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Build site (strict)
        env:
          CI: "true"
        run: mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamfit-docs-site
          path: site/
          if-no-files-found: error
          retention-days: 14
