name: Python Contracts

# Fast Python full-fit contract checks, decoupled from the heavy Rust suite.
#
# The "Rust CI" workflow (test.yml) runs its Python pytest steps only AFTER the
# full Rust nextest suite in the same job, so a Python-only contract (e.g. the
# curv #1464 sign-recovery or the by-variable #1513 predict-clip guard) is not
# observable until hours into that run. This workflow builds just the maturin
# wheel and runs the targeted Python contract tests, so a fix to a Python-facing
# contract verifies in ~20-30 min instead of being hostage to the Rust suite.
# It is also the intended fast home for wiring in the orphaned Python contract
# tests tracked by #1512.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "tests/test_bug_hunt_numeric_by_variable_clamped_to_training_range_at_predict.py"
      - "tests/test_bug_hunt_curv_smooth_hyperbolic_recovered_as_spherical.py"
      - "tests/test_bug_hunt_poisson_zero_count_fit_unpredictable_mean.py"
      - "src/inference/model.rs"
      - "src/inference/predict/mod.rs"
      - "src/inference/predict/standard.rs"
      - "src/terms/smooth/spatial_optimization.rs"
      - ".github/workflows/python-contracts.yml"

concurrency:
  group: python-contracts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  # Warm the dependency compile across runs via the GitHub Actions sccache
  # backend, so the maturin wheel build does not recompile the full dep closure
  # (faer/ndarray/nalgebra/arrow/…) on every run. setup-rust-ci enables the
  # RUSTC_WRAPPER only after a backend-reachability probe, so a cache outage
  # degrades to a cold-but-green build rather than a hard failure.
  SCCACHE_GHA_ENABLED: "true"

jobs:
  python-contracts:
    name: Python contracts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # build.rs human-author gate needs the real last build.rs editor; a
          # shallow clone makes git log return HEAD and false-fails the gate.
          fetch-depth: 0

      - name: Setup Rust CI
        uses: ./.github/actions/setup-rust-ci
        with:
          free-disk-space: 'true'
          # Cache the compiled `target/` (deps + prior gam/gam-pyffi objects)
          # across runs so the maturin wheel build is incremental: a cold run
          # populates the cache, subsequent runs restore it and recompile only
          # the crates whose sources changed (~3-5 min instead of ~13). This is
          # the dominant cost of the fast Python-contract verification.
          cache-targets: 'true'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install maturin
        run: python -m pip install --upgrade pip "maturin>=1.7,<2"

      - name: Build and install gam extension (maturin build + wheel install)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          maturin build --release -i python3 -o dist
          python -m pip install --force-reinstall dist/*.whl

      - name: Install Python test extras
        run: |
          python -m pip install \
            'pytest>=8' 'numpy>=1.26' 'pandas>=2.0' 'pyarrow>=14' \
            'matplotlib>=3.8' 'scikit-learn>=1.4'

      - name: Run numeric by-variable predict-clip contract (#1513)
        # s(x, by=z): the numeric by-multiplier must not be axis-clipped to its
        # training range at predict time, so the prediction stays affine in z.
        # Guards the collect_by_variable_numeric_axes exemption in model.rs.
        #
        # Run from runner.temp, NOT the repo root: the maturin wheel installs
        # gamfit (incl. the compiled gamfit._rust) into site-packages, but the
        # source tree's ./gamfit has no compiled _rust, so `python -m pytest`
        # from the repo root imports the source package and fails with
        # `ModuleNotFoundError: gamfit._rust`. Running from a directory without
        # ./gamfit makes the installed wheel win the import.
        working-directory: ${{ runner.temp }}
        run: python -m pytest "$GITHUB_WORKSPACE/tests/test_bug_hunt_numeric_by_variable_clamped_to_training_range_at_predict.py" -v --tb=short

      - name: Run curv() constant-curvature sign-recovery contract (#1464)
        # Hyperbolic (kappa*<0) data must not be recovered as spherical; the
        # Python full-fit path must honor the sign-correct kappa-fair fast-path
        # pin in spatial_optimization.rs. Matches the Rust e2e owed_1464.rs guard.
        #
        # Run from runner.temp, NOT the repo root: the maturin wheel installs
        # gamfit (incl. the compiled gamfit._rust) into site-packages, but the
        # source tree's ./gamfit has no compiled _rust, so `python -m pytest`
        # from the repo root imports the source package and fails with
        # `ModuleNotFoundError: gamfit._rust`. Running from a directory without
        # ./gamfit makes the installed wheel win the import.
        working-directory: ${{ runner.temp }}
        run: python -m pytest "$GITHUB_WORKSPACE/tests/test_bug_hunt_curv_smooth_hyperbolic_recovered_as_spherical.py" -v --tb=short

      - name: Run all-zero-count predictable-mean contract (#1515)
        # A Poisson/NB GAM fitted on identically-zero counts must stay
        # predictable: the response-scale posterior mean overflows on the
        # near-singular flat-likelihood Hessian, so predict must fall back to
        # the finite plug-in mean g^-1(eta_hat) instead of returning None.
        working-directory: ${{ runner.temp }}
        run: python -m pytest "$GITHUB_WORKSPACE/tests/test_bug_hunt_poisson_zero_count_fit_unpredictable_mean.py" -v --tb=short
