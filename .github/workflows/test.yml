name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare source bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Bundle source workspace
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git -czf "${RUNNER_TEMP}/ci-source.tar.gz" -C "${GITHUB_WORKSPACE}" .

      - name: Upload source workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-source
          path: ${{ runner.temp }}/ci-source.tar.gz
          if-no-files-found: error

  fmt:
    name: Rustfmt
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Download source workspace
        id: source-download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ci-source
          path: ${{ runner.temp }}/ci-source

      - name: Restore source workspace
        id: source-restore
        shell: bash
        run: |
          set -euo pipefail
          src="${RUNNER_TEMP}/ci-source/ci-source.tar.gz"
          if [ -f "${src}" ]; then
            tar -xzf "${src}" -C "${GITHUB_WORKSPACE}"
            echo "restored=true" >> "${GITHUB_OUTPUT}"
          else
            echo "restored=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Fallback checkout
        if: ${{ steps.source-restore.outputs.restored != 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  clippy:
    name: Clippy
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Download source workspace
        id: source-download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ci-source
          path: ${{ runner.temp }}/ci-source

      - name: Restore source workspace
        id: source-restore
        shell: bash
        run: |
          set -euo pipefail
          src="${RUNNER_TEMP}/ci-source/ci-source.tar.gz"
          if [ -f "${src}" ]; then
            tar -xzf "${src}" -C "${GITHUB_WORKSPACE}"
            echo "restored=true" >> "${GITHUB_OUTPUT}"
          else
            echo "restored=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Fallback checkout
        if: ${{ steps.source-restore.outputs.restored != 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Lint
        run: cargo +nightly clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Download source workspace
        id: source-download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ci-source
          path: ${{ runner.temp }}/ci-source

      - name: Restore source workspace
        id: source-restore
        shell: bash
        run: |
          set -euo pipefail
          src="${RUNNER_TEMP}/ci-source/ci-source.tar.gz"
          if [ -f "${src}" ]; then
            tar -xzf "${src}" -C "${GITHUB_WORKSPACE}"
            echo "restored=true" >> "${GITHUB_OUTPUT}"
          else
            echo "restored=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Fallback checkout
        if: ${{ steps.source-restore.outputs.restored != 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          cargo +nightly test --all-features -- --nocapture 2>&1 | tee /tmp/cargo-test.log

          # Treat runtime optimizer/model-path degradations as hard failures even when tests return 0.
          forbidden='P-IRLS INNER LOOP FAILED|Perfect or quasi-perfect separation detected|all candidate seeds failed|no stationary candidate found|BFGS fallback failed|Newton failed \(|falling back to BFGS|Line search stopped early|marking as non-stationary|non-stationary solution|range penalty block contains non-finite entries'
          if grep -nE "$forbidden" /tmp/cargo-test.log; then
            echo "::error::Forbidden runtime error signatures were found in test output."
            exit 1
          fi
