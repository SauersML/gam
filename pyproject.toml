[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "gam"
version = "0.1.15"
description = "Formula-first Python bindings for the gam Rust engine"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "SauersML" }]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Rust",
  "Topic :: Scientific/Engineering",
]
dependencies = []

[project.optional-dependencies]
test = [
  "pytest>=8",
  "numpy>=1.26",
  "pandas>=2.0",
  "pyarrow>=14",
  "matplotlib>=3.8",
  "scikit-learn>=1.4",
]
numpy = ["numpy>=1.26"]
pandas = ["pandas>=2.0", "pyarrow>=14"]
plot = ["matplotlib>=3.8"]
sklearn = ["scikit-learn>=1.4", "numpy>=1.26"]
type = [
  "mypy>=1.18",
  "numpy>=1.26",
  "pandas>=2.0",
  "pandas-stubs",
  "pyarrow>=14",
  "polars>=1",
  "matplotlib>=3.8",
  "scikit-learn>=1.4",
  "scikit-learn-stubs",
  "scipy-stubs",
  "pytest>=8",
  "types-requests",
]
all = [
  "numpy>=1.26",
  "pandas>=2.0",
  "pyarrow>=14",
  "matplotlib>=3.8",
  "scikit-learn>=1.4",
]

[tool.maturin]
manifest-path = "crates/gam-pyffi/Cargo.toml"
module-name = "gam._rust"
python-source = "python"

[tool.mypy]
python_version = "3.10"
strict = true
mypy_path = "python"
files = ["python", "tests", "scripts", "bench"]
exclude = [
  "^bench/\\.venv/",
]
