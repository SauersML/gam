[profile.release]
lto = "thin"
codegen-units = 1

# Test profile — strip full DWARF and only keep line tables. With ~300
# integration test targets under `tests/`, the default `debug = true` profile
# emits ~150–500 MB of DWARF per linked test binary; on a vanilla ubuntu-latest
# runner the link stage exhausts the ~30 GB the workflow frees after wiping
# preinstalled toolchains, surfacing as `linking with cc failed: exit status:
# 1` / `No space left on device`. `line-tables-only` keeps backtraces
# resolvable to file:line and panic locations intact while cutting each test
# binary by roughly 5–10×, which is what drives the disk back below the
# ceiling and makes the link reliable rather than relying on whatever the
# preinstalled-toolchain wipe yields on a given runner image.
[profile.test]
debug = "line-tables-only"
# Optimize the WORKSPACE crates in test builds, not just the dependencies below.
# The heaviest single `#[test]` solver fits — the #979 survival marginal-slope
# and #1593 competing-risks CIF regressions — spend their time in the gam-*
# workspace numerical crates (orchestration, survival/joint-Newton, REML/PIRLS,
# the per-row Hessian assembly), NOT in third-party kernels. Cargo's
# `package."*"` glob (below) only reaches dependencies, so leaving the base test
# profile at opt-level 0 left that workspace hot path unoptimized; on slower CI
# runners those fits ran long enough to cross nextest's 600s per-test kill and
# fail as opaque SIGKILL timeouts. opt-level 2 here keeps numerical results
# identical (Rust does not enable fast-math, and the dependency kernels were
# already optimized) and does NOT reintroduce the DWARF disk cliff — that is
# governed by `debug` above, independent of opt-level — so it is a pure runtime
# win that lets those solver-bound tests finish and self-report well inside the
# per-test cap.
opt-level = 2

# Dev/`maturin develop` profile — same rationale as [profile.test]. Cargo's
# default dev profile emits full DWARF (`debug = 2`), which is what lets
# `target/` balloon to ~30 GB (the dep + crate object files carry the bulk of
# it). `line-tables-only` keeps backtraces resolvable to file:line and panic
# locations while cutting the bulk of the debuginfo, so the dev target stays
# a few GB instead of tens.
[profile.dev]
debug = "line-tables-only"

# Dependencies carry most numeric inner loops in DEV builds
# (faer/matrixmultiply GEMM tiles, ndarray kernels, rayon): compile THEM
# optimized while the workspace crate stays cheap for edit/compile iteration.
# The dev profile keeps the workspace crate at Cargo's default opt level so
# local `maturin develop` / `cargo build` iteration does not materialize a huge
# optimized `gam` artifact; the numeric dependency kernels below still compile
# optimized, which is the hot-loop win without the iteration tax.
[profile.dev.package."*"]
opt-level = 2

# Test builds optimize the workspace crates too (see opt-level on [profile.test]
# above); this glob additionally optimizes the third-party numeric kernels, so
# the whole test hot path — workspace solver code plus dependency kernels — runs
# optimized.
[profile.test.package."*"]
opt-level = 2

# Iteration profile — drops `lto=thin` and uses 16 codegen units to cut
# rebuild time from ~5 min to ~90 s while keeping `opt-level = 3`. Use via
# `cargo build --profile release-dev --bin gam`. Runtime perf is typically
# ~85–95% of full release (LTO is the main loss); good enough for local
# timing comparisons that aren't differentiating sub-10% perf wins.
[profile.release-dev]
inherits = "release"
lto = false
codegen-units = 16
debug = false

# PyPI wheel profile — tuned for MAXIMUM runtime performance on large-scale
# workloads, accepting longer CI build times in exchange.
#
#   * `lto = "fat"` — whole-program LTO across all crates including
#     dependencies. Squeezes out cross-crate inlining that thin-LTO
#     misses; large-scale numerics gain ~5–10 % over thin-LTO from
#     better inlining of `faer` / `ndarray` inner loops into the
#     custom-family hot paths.
#
#   * `codegen-units = 1` — single codegen unit per crate. Forces the
#     full crate to be optimized as one IR module so monomorphization
#     constants and per-call autovec opportunities aren't fragmented
#     across parallel codegen workers. Empirically ~2–3 % runtime
#     improvement at large scale over `codegen-units = 16`, on top
#     of the LTO win.
#
#   * `opt-level = 3` — pinned explicitly. It is also the `release`
#     default, but the dev/test profiles drop dependencies to
#     `opt-level = 2`, so pinning documents that the SHIPPED numeric
#     hot loops are built at max scalar/autovec optimization.
#
#   * `panic = "unwind"` — MUST stay unwind, NOT abort. PyO3 wraps every
#     `#[pyfunction]`/`#[pymethods]` entry point in `catch_unwind` to turn
#     a Rust panic into a Python `PanicException` at the FFI boundary. With
#     `panic = "abort"` a panic anywhere in the engine would SIGABRT the
#     host interpreter instead of raising a catchable Python exception — a
#     crash-vs-exception behavior change. The unwind-table removal (faster +
#     smaller) is therefore deliberately DECLINED at this FFI boundary.
#
#   * `strip = true` — strip both the symbol table and debuginfo from the
#     shipped `cdylib`: smaller wheel, zero runtime cost (release carries no
#     line tables anyway). Maturin's `--strip` is kept as a redundant
#     post-link strip.
#
# Combined cost: cold-cache wheel builds go from ~12 min to ~22 min on
# the slowest runner (macos-15-intel). NOTE: sccache caches per-crate
# codegen but NOT the final whole-program fat-LTO link, so warm rebuilds
# still pay the fat-LTO link each run (a few minutes) — slower than the
# thin-LTO warm path. For PyPI consumers who pip-install once and run
# large-scale fits for hours, the runtime win is the production lever; the
# build-time hit is amortized to ~zero. When a faster turnaround is needed
# during development, dispatch the workflow with `scope=x86` to skip the
# slow macOS + Windows + aarch64 matrices entirely.
#
# This is a DEDICATED profile (not a change to `[profile.release]`) so the
# CLI release binary (build-release-all.yml, disk-tight CUDA runner), the
# nextest/test builds, benches, fuzz, and large_scale `--release` builds
# all keep thin-LTO — only the shipped wheel pays the fat-LTO build cost.
# Selected by pypi-wheels.yml via `--profile release-pypi`.
[profile.release-pypi]
inherits = "release"
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "unwind"
debug = false
strip = true
