[profile.release]
lto = "thin"
codegen-units = 1

# Test profile — strip full DWARF and only keep line tables. With ~300
# integration test targets under `tests/`, the default `debug = true` profile
# emits ~150–500 MB of DWARF per linked test binary; on a vanilla ubuntu-latest
# runner the link stage exhausts the ~30 GB the workflow frees after wiping
# preinstalled toolchains, surfacing as `linking with cc failed: exit status:
# 1` / `No space left on device`. `line-tables-only` keeps backtraces
# resolvable to file:line and panic locations intact while cutting each test
# binary by roughly 5–10×, which is what drives the disk back below the
# ceiling and makes the link reliable rather than relying on whatever the
# preinstalled-toolchain wipe yields on a given runner image.
[profile.test]
debug = "line-tables-only"

# Dev/`maturin develop` profile — same rationale as [profile.test]. Cargo's
# default dev profile emits full DWARF (`debug = 2`), which is what lets
# `target/` balloon to ~30 GB (the dep + crate object files carry the bulk of
# it). `line-tables-only` keeps backtraces resolvable to file:line and panic
# locations while cutting the bulk of the debuginfo, so the dev target stays
# a few GB instead of tens.
[profile.dev]
debug = "line-tables-only"

# Dependencies carry most numeric inner loops in dev builds
# (faer/matrixmultiply GEMM tiles, ndarray kernels, rayon): compile THEM
# optimized while the workspace crate stays cheap for edit/compile iteration.
# Test builds keep the workspace crate at Cargo's default opt level so local
# runners do not materialize a huge optimized `gam` test artifact; the numeric
# dependency kernels below still compile optimized, which is the hot-loop win
# without the disk cliff.
[profile.dev.package."*"]
opt-level = 2

[profile.test.package."*"]
opt-level = 2

# Iteration profile — drops `lto=thin` and uses 16 codegen units to cut
# rebuild time from ~5 min to ~90 s while keeping `opt-level = 3`. Use via
# `cargo build --profile release-dev --bin gam`. Runtime perf is typically
# ~85–95% of full release (LTO is the main loss); good enough for local
# timing comparisons that aren't differentiating sub-10% perf wins.
[profile.release-dev]
inherits = "release"
lto = false
codegen-units = 16
debug = false

# PyPI wheel profile — tuned for MAXIMUM runtime performance on large-scale
# workloads, accepting longer CI build times in exchange.
#
#   * `lto = "fat"` — whole-program LTO across all crates including
#     dependencies. Squeezes out cross-crate inlining that thin-LTO
#     misses; large-scale numerics gain ~5–10 % over thin-LTO from
#     better inlining of `faer` / `ndarray` inner loops into the
#     custom-family hot paths.
#
#   * `codegen-units = 1` — single codegen unit per crate. Forces the
#     full crate to be optimized as one IR module so monomorphization
#     constants and per-call autovec opportunities aren't fragmented
#     across parallel codegen workers. Empirically ~2–3 % runtime
#     improvement at large scale over `codegen-units = 16`, on top
#     of the LTO win.
#
# Combined cost: cold-cache wheel builds go from ~12 min to ~22 min on
# the slowest runner (macos-15-intel). The Swatinem/rust-cache hit on
# warm rebuilds keeps the typical-case at ~4 min. For PyPI consumers
# who pip-install once and run large-scale fits for hours, the runtime win
# is the production lever; the build-time hit is amortized to ~zero.
# When a faster turnaround is needed during development, dispatch the
# workflow with `linux_only=true` to skip the slow macOS + Windows
# matrices entirely.
[profile.release-pypi]
inherits = "release"
lto = "fat"
codegen-units = 1
debug = false
strip = "debuginfo"
