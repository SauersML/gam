[package]
name = "gam"
version = "0.1.12"
edition = "2024"
rust-version = "1.93"
autobins = false
default-run = "gam"
description = "Generalized penalized likelihood engine"
license = "Apache-2.0"

[package.metadata.cargo-machete]
ignored = ["grep", "walkdir"]

[lib]
path = "src/lib.rs"

[lints.rust]
warnings = "deny"

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
comfy-table = "7.2.2"
rayon = "1.11.0"
rand = "0.10.0"
rand08 = { package = "rand", version = "0.8.5" }
polya-gamma = "0.5.3"
indicatif = "0.18.4"
ndarray = { version = "0.17.2", features = ["serde", "rayon"] }
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
opt = "0.1.0"
log = "0.4.29"
csv = "1.4.0"
faer = "0.24.0"
dyn-stack = "0.13.2"
serde_json = "1.0.149"
ratatui = "0.30.0"
crossterm = "0.29.0"
rand_distr = "0.6.0"
tempfile = "3.27.0"
approx = "0.5.1"
zip = { version = "8.2.0", default-features = false, features = ["deflate"] }
statrs = "0.18.0"
pest = "2.8.6"
pest_derive = "2.8.6"

[dependencies.general-mcmc]
package = "general-mcmc"
version = "0.9.0"
default-features = false

[dev-dependencies]
num-dual = "0.13.6"
autodiff = "0.7.0"
ad_trait = "0.2.2"

[build-dependencies]
walkdir = "2.5.0"
grep = "0.4.1"

[[bin]]
name = "gam"
path = "src/main.rs"
