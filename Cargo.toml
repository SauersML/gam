[package]
name = "gam"
version = "0.3.123"
edition = "2024"
rust-version = "1.93"
autobins = false
description = "Generalized penalized likelihood engine"
license = "AGPL-3.0-or-later"
# Limit the published `.crate` to source + bench harnesses + license + readme.
# Without this, `bench/large_scale/` (>1 GB of benchmark data) is bundled
# into the package and crates.io rejects the upload at the 10 MiB limit.
# Patterns are gitignore-style; leading `/` anchors to crate root.
include = [
    "/src/**/*.rs",
    "/src/**/*.pest",
    "/bench/cargo_benches/**/*.rs",
    "/build.rs",
    "/Cargo.toml",
    "/rust-toolchain.toml",
    "/README.md",
    "/LICENSE",
]

[package.metadata.cargo-machete]
ignored = ["grep", "walkdir"]

[lib]
path = "src/lib.rs"

[workspace]
# A `gam-core` leaf-crate split was attempted under #1521 but reverted: with the
# entire high-churn engine still living in `gam`, a `gam-core` leaf produced no
# rebuild cut (a families/solver/terms edit still recompiles all of `gam`) while
# adding a `publish = false` path-dependency under a publishable crate. The
# measured first cut is the opposite direction — peel upper leaves (predict, CLI)
# off a temporarily-monolithic engine. See the #1521 thread for the plan.
members = [
    "crates/gam-data",
    "crates/gam-spec",
    "crates/gam-inference",
    "crates/gam-cli",
    "crates/gam-math",
    "crates/gam-predict",
    "crates/gam-problem",
    "crates/gam-pyffi",
    "crates/gam-runtime",
]
resolver = "3"

[lints.rust]
warnings = "deny"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
comfy-table = "7.2.2"
rayon = "1.12.0"
rand = "0.10.1"
ndarray = { version = "0.17.2", features = ["serde", "rayon"] }
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
opt = "0.5.2"
log = "0.4.29"
libloading = "0.8.9"
csv = "1.4.0"
faer = "0.24.0"
memmap2 = "0.9.10"
dyn-stack = "0.13.2"
# `float_roundtrip` makes the JSON parser bit-exact for f64: serialization
# (ryu) is already shortest-round-trippable, but the DEFAULT parser can be off
# by 1 ULP on some values, so a saved model could predict infinitesimally
# differently than the in-memory fit. Required for bit-for-bit model
# persistence (e.g. the #1034 spline-scan smoother state).
serde_json = { version = "1.0.149", features = ["float_roundtrip"] }
ratatui = "0.30.0"
crossterm = "0.29.0"
rand_distr = "0.6.0"
statrs = "0.18.0"
libm = "0.2.16"
gam-data = { path = "crates/gam-data" }
gam-math = { path = "crates/gam-math" }
gam-problem = { path = "crates/gam-problem" }
gam-spec = { path = "crates/gam-spec" }
gam-runtime = { path = "crates/gam-runtime" }
pest = "2.8.6"
pest_derive = "2.8.6"
arrow = { version = "54", default-features = false, features = ["ffi"] }
parquet = { version = "54", default-features = false, features = ["arrow", "snap", "zstd", "lz4"] }
wide = "0.7"
smallvec = "1"
sha2 = "0.10.8"
sysinfo = { version = "0.32", default-features = false, features = ["system"] }

[target.'cfg(target_os = "linux")'.dependencies]
cudarc = { version = "0.19.6", default-features = false, features = ["std", "driver", "runtime", "nvrtc", "cublas", "cublaslt", "cusparse", "cusolver", "cusolvermg", "curand", "nvtx", "cupti", "fallback-dynamic-loading", "cuda-12080"] }

[dependencies.general-mcmc]
package = "general-mcmc"
version = "0.9"
default-features = false

[dev-dependencies]
num-dual = "0.13.6"
autodiff = "0.7.0"
ad_trait = "0.3.0"
criterion = "0.8"
tempfile = "3.27.0"
approx = "0.5.1"
# The prediction engine (predict_gamwith_uncertainty, PredictUncertaintyOptions,
# InferenceCovarianceMode, MeanIntervalMethod, ...) was peeled out of `gam` into
# the upper-leaf `gam-predict` crate. `gam-predict` depends on `gam`, so it
# cannot be a normal dependency, but the integration tests that exercise
# prediction need it: a dev-dependency that points back at the owning crate is
# the standard, cycle-free way to give the test build access to a peeled-off
# leaf.
gam-predict = { path = "crates/gam-predict" }

