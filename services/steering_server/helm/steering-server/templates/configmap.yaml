apiVersion: v1
kind: Secret
metadata:
  name: {{ include "steering-server.fullname" . }}-config
type: Opaque
stringData:
  local.toml: |
    [database]
    url = "{{ .Values.config.databaseUrl }}"

    [auth]
    bootstrap_user = "{{ .Values.config.bootstrapUser }}"
    bootstrap_api_key = "{{ .Values.secret.bootstrapApiKey }}"

    [rate_limit]
    default_limit = "300/minute"
    steer_limit = "60/minute"

    [telemetry]
    service_name = "steering-server"
    otlp_endpoint = "{{ .Values.config.otlpEndpoint }}"

    [queue]
    run_inline = {{ .Values.config.queueRunInline }}
