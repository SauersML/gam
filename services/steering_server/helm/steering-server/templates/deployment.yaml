apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "steering-server.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "steering-server.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "steering-server.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "steering-server.name" . }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: steering-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config/local.toml
              subPath: local.toml
      volumes:
        - name: config
          secret:
            secretName: {{ include "steering-server.fullname" . }}-config
